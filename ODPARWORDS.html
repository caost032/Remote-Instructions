            function getFontInfo() {
                if (GRID_SIZE >= 15) return { font: FONT_5, w: 3, h: 5, gap: 2 };
                if (GRID_SIZE >= 8) return { font: FONT_3, w: 3, h: 3, gap: 1 };
                return null;
            }

            function wordPixelWidth(word) {
                const fi = getFontInfo();
                if (!fi) return Infinity;
                let width = 0;
                for (let ch of word.toUpperCase()) {
                    width += fi.w + fi.gap;
                }
                return width - fi.gap;
            }

            function linePixelHeight() {
                const fi = getFontInfo();
                return fi ? fi.h : 0;
            }

            // Divide un texto largo en líneas que quepan en el grid
            function wrapText(text, maxWidth) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                for (let word of words) {
                    const testLine = currentLine ? currentLine + ' ' + word : word;
                    if (wordPixelWidth(testLine) <= maxWidth) {
                        currentLine = testLine;
                    } else {
                        if (currentLine) lines.push(currentLine);
                        // si la palabra sola es más ancha que el grid, la troceamos en sílabas visuales
                        if (wordPixelWidth(word) > maxWidth) {
                            let chunk = '';
                            for (let ch of word) {
                                const testChunk = chunk + ch;
                                if (wordPixelWidth(testChunk) <= maxWidth) {
                                    chunk = testChunk;
                                } else {
                                    lines.push(chunk);
                                    chunk = ch;
                                }
                            }
                            if (chunk) lines.push(chunk);
                        } else {
                            currentLine = word;
                        }
                    }
                }
                if (currentLine) lines.push(currentLine);
                return lines;
            }

            function messageToCoords(message, offsetX, offsetY, maxWidth) {
                const fi = getFontInfo();
                if (!fi) return [];
                const { font, w, h, gap } = fi;
                const lines = wrapText(message, maxWidth);
                const coords = [];
                let lineY = offsetY;
                for (let line of lines) {
                    let cx = offsetX + Math.floor((maxWidth - wordPixelWidth(line)) / 2);
                    for (let ch of line.toUpperCase()) {
                        const matrix = font[ch] || font[' '];
                        for (let row = 0; row < matrix.length; row++) {
                            for (let col = 0; col < matrix[row].length; col++) {
                                if (matrix[row][col] === 1) {
                                    coords.push({ x: cx + col, y: lineY + row });
                                }
                            }
                        }
                        cx += w + gap;
                    }
                    lineY += h + 1; // espacio entre líneas
                }
                return coords;
            }

            function messageBlockHeight(message, maxWidth) {
                const lines = wrapText(message, maxWidth);
                const fi = getFontInfo();
                if (!fi) return 0;
                return lines.length * (fi.h + 1) - 1;
            }

            // ========== GENERACIÓN DE COLECCIONABLES CON MENSAJES ==========
            function generateCollectibles() {
                collectibles = [];
                premiumCollectibles = [];
                const fi = getFontInfo();
                if (!fi || GRID_SIZE < 6) {
                    // fallback aleatorio
                    const normalCount = 5 + Math.floor(Math.random() * 4);
                    for (let i = 0; i < normalCount; i++) {
                        let x, y;
                        do {
                            x = Math.floor(Math.random() * GRID_SIZE);
                            y = Math.floor(Math.random() * GRID_SIZE);
                        } while ((x === player.x && y === player.y) || collectibles.some(c => c.x === x && c.y === y) || premiumCollectibles.some(c => c.x === x && c.y === y));
                        collectibles.push({ x, y });
                    }
                    if (Math.random() < 0.6) {
                        const premiumCount = Math.random() < 0.65 ? 4 : 2;
                        for (let i = 0; i < premiumCount; i++) {
                            let x, y;
                            do {
                                x = Math.floor(Math.random() * GRID_SIZE);
                                y = Math.floor(Math.random() * GRID_SIZE);
                            } while ((x === player.x && y === player.y) || collectibles.some(c => c.x === x && c.y === y) || premiumCollectibles.some(c => c.x === x && c.y === y));
                            premiumCollectibles.push({ x, y });
                        }
                    }
                    return;
                }

                // Obtener mensaje personalizado para esta oleada
                const message = CUSTOM_MESSAGES[(wave - 1) % CUSTOM_MESSAGES.length];
                const maxWidth = GRID_SIZE - 2; // margen de 1 celda a cada lado
                const blockHeight = messageBlockHeight(message, maxWidth);
                const startX = 1;
                const startY = Math.floor((GRID_SIZE - blockHeight) / 2);

                const messageCoords = messageToCoords(message, startX, startY, maxWidth);
                const playerPos = { x: player.x, y: player.y };
                const validCoords = messageCoords.filter(c => !(c.x === playerPos.x && c.y === playerPos.y)
                    && c.x >= 0 && c.x < GRID_SIZE && c.y >= 0 && c.y < GRID_SIZE);

                premiumCollectibles = validCoords;

                // Añadir algunos puntos normales extra para que no esté vacío
                const extraNormal = Math.max(0, Math.floor(GRID_SIZE * 1.2) - premiumCollectibles.length);
                for (let i = 0; i < extraNormal; i++) {
                    let x, y;
                    let attempts = 0;
                    do {
                        x = Math.floor(Math.random() * GRID_SIZE);
                        y = Math.floor(Math.random() * GRID_SIZE);
                        attempts++;
                        if (attempts > 1000) break;
                    } while (
                        (x === player.x && y === player.y) ||
                        premiumCollectibles.some(c => c.x === x && c.y === y) ||
                        collectibles.some(c => c.x === x && c.y === y)
                    );
                    if (attempts <= 1000) collectibles.push({ x, y });
                }
            }

            function updateUI() {
                document.getElementById('score').textContent = String(score).padStart(6, '0');
                document.getElementById('highScore').textContent = String(highScore).padStart(6, '0');
                document.getElementById('waveSpan').textContent = wave;
                document.getElementById('evadedSpan').textContent = evadedThisWave;
            }

            function checkCollectibles() {
                let magnetRadius = 0;
                for (let ef of activeEffects)
                    if (ef.type.startsWith('magnet') && ef.radius > magnetRadius) magnetRadius = ef.radius;

                function inRange(cx, cy) {
                    if (magnetRadius === 0) return (cx === player.x && cy === player.y);
                    const dx = Math.abs(cx - player.x),
                        dy = Math.abs(cy - player.y);
                    if (magnetRadius >= 999) return dx <= GRID_SIZE && dy <= GRID_SIZE;
                    return dx <= magnetRadius && dy <= magnetRadius;
                }

                for (let i = collectibles.length - 1; i >= 0; i--) {
                    if (inRange(collectibles[i].x, collectibles[i].y)) {
                        if (magnetRadius > 0 && (collectibles[i].x !== player.x || collectibles[i].y !== player.y)) {
                            if (collectibles[i].x < player.x) collectibles[i].x++;
                            else if (collectibles[i].x > player.x) collectibles[i].x--;
                            if (collectibles[i].y < player.y) collectibles[i].y++;
                            else if (collectibles[i].y > player.y) collectibles[i].y--;
                        }
                        if (collectibles[i].x === player.x && collectibles[i].y === player.y) {
                            score += 8;
                            scoreSinceLastDoubleBonus += 8;
                            createExplosion(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2, 20, '#ffd700');
                            createFloatingText(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2, "🥰");
                            playNormalCollect();
                            collectibles.splice(i, 1);
                            updateUI();
                            if (collectibles.length === 0 && premiumCollectibles.length === 0) completeWave();
                            return;
                        }
                    }
                }
                for (let i = premiumCollectibles.length - 1; i >= 0; i--) {
                    if (inRange(premiumCollectibles[i].x, premiumCollectibles[i].y)) {
                        if (magnetRadius > 0 && (premiumCollectibles[i].x !== player.x || premiumCollectibles[i].y !== player.y)) {
                            if (premiumCollectibles[i].x < player.x) premiumCollectibles[i].x++;
                            else if (premiumCollectibles[i].x > player.x) premiumCollectibles[i].x--;
                            if (premiumCollectibles[i].y < player.y) premiumCollectibles[i].y++;
                            else if (premiumCollectibles[i].y > player.y) premiumCollectibles[i].y--;
                        }
                        if (premiumCollectibles[i].x === player.x && premiumCollectibles[i].y === player.y) {
                            score += 20;
                            scoreSinceLastDoubleBonus += 20;
                            premiumCollectedSinceLastTripleBonus++;
                            if (score > highScore) {
                                highScore = score;
                                localStorage.setItem('odparHighScore', highScore);
                            }
                            createExplosion(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2, 30, '#ff44ff', 1.2);
                            createExplosion(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2, 15, '#ffffff');
                            premiumFlash = 40;
                            playerGlow = 50;
                            createFloatingText(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2, "🥰", true);
                            playPremiumCollect();
                            premiumCollectibles.splice(i, 1);
                            updateUI();
                            if (collectibles.length === 0 && premiumCollectibles.length === 0) completeWave();
                            return;
                        }
                    }
                }
                for (let i = powerUpsOnMap.length - 1; i >= 0; i--) { if (powerUpsOnMap[i].x === player.x && powerUpsOnMap[i].y === player.y) { tryActivatePowerUp(powerUpsOnMap[i]); return; } }
            }

            function completeWave() {
                if (gameOver) return;
                playLevelComplete();
                wave++;
                evadedThisWave = 0;
                if (wave > 1) {
                    let newSize;
                    if ((wave - 1) % 5 === 0) {
                        newSize = 50 + Math.floor(Math.random() * 11);
                    } else {
                        newSize = 40 + Math.floor(Math.random() * 11);
                    }
                    GRID_SIZE = newSize;
                    resizeGameElements();
                    playerDrawX = player.x * CELL_SIZE + CELL_SIZE / 2;
                    playerDrawY = player.y * CELL_SIZE + CELL_SIZE / 2;
                    glitchActive = true;
                    glitchTimer = 40;
                    glitchIntensity = 1;
                    playerGlow = 50;
                    createExplosion(playerDrawX, playerDrawY, 55, '#00ffff', 2.0);
                    createExplosion(playerDrawX, playerDrawY, 35, '#ffffff', 1.4);
                    createFloatingText(playerDrawX, playerDrawY - 65, `¡NUEVO TAMAÑO: ${GRID_SIZE}!`, false, false);
                    playSound(1200, 80, 'sine', 0.6);
                    setTimeout(() => playSound(1800, 120, 'sawtooth', 0.5), 80);
                }
                bonusZoneCurrentWaveCount = 0;
                doubleBonusZoneCurrentWaveCount = 0;
                tripleBonusZoneCurrentWaveCount = 0;
                updateDifficulty();
                updateUI();
                createWaveCompleteText(wave - 1);
                generatePowerUps();
                registerTimeout(() => { if (!gameOver) { if (!safeZone) generateSafeZone(); if (Math.random() < 0.45 || (Date.now() - lastBossTime > enemySpawnConfig.boss.interval)) triggerBossWave(); } }, 500);
            }

            // ========== MOVIMIENTO ==========
            function executeMove(dir) {
                let newX = player.x,
                    newY = player.y;
                switch (dir) {
                    case 'up': newY--; break;
                    case 'down': newY++; break;
                    case 'left': newX--; break;
                    case 'right': newX++; break;
                    case 'up-left': newX--; newY--; break;
                    case 'up-right': newX++; newY--; break;
                    case 'down-left': newX--; newY++; break;
                    case 'down-right': newX++; newY++; break;
                }
                if (newX < 0 || newX >= GRID_SIZE || newY < 0 || newY >= GRID_SIZE) return false;
                moving = true;
                let startX = playerDrawX,
                    startY = playerDrawY;
                let endX = newX * CELL_SIZE + CELL_SIZE / 2,
                    endY = newY * CELL_SIZE + CELL_SIZE / 2;
                player.x = newX;
                player.y = newY;
                const speedActive = activeEffects.some(e => e.type === 'speed');
                let duration = Math.max(MIN_MOVE_DELAY, speedActive ? currentMoveDelay / 2 : currentMoveDelay);
                let animStart = performance.now();
                function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
                function animateMove(now) {
                    let elapsed = now - animStart,
                        t = Math.min(1, elapsed / duration),
                        ease = easeInOutCubic(t);
                    playerDrawX = startX + (endX - startX) * ease;
                    playerDrawY = startY + (endY - startY) * ease;
                    if (t < 1) requestAnimationFrame(animateMove);
                    else {
                        playerDrawX = endX;
                        playerDrawY = endY;
                        moving = false;
                        lastMoveTimestamp = performance.now();
                        if (currentMoveDelay > MIN_MOVE_DELAY) currentMoveDelay = Math.max(MIN_MOVE_DELAY, currentMoveDelay * 0.9);
                        startNextMove();
                    }
                }
                requestAnimationFrame(animateMove);
                playMoveSound();
                startMotor();
                switch (dir) {
                    case 'up': targetTiltX = -0.3; targetTiltZ = 0; break;
                    case 'down': targetTiltX = 0.3; targetTiltZ = 0; break;
                    case 'left': targetTiltZ = -0.4; targetTiltX = 0; break;
                    case 'right': targetTiltZ = 0.4; targetTiltX = 0; break;
                    case 'up-left': targetTiltX = -0.2; targetTiltZ = -0.3; break;
                    case 'up-right': targetTiltX = -0.2; targetTiltZ = 0.3; break;
                    case 'down-left': targetTiltX = 0.2; targetTiltZ = -0.3; break;
                    case 'down-right': targetTiltX = 0.2; targetTiltZ = 0.3; break;
                }
                setTimeout(() => { targetTiltX = 0; targetTiltZ = 0; }, 200);
                if (rotationResetTimer) clearTimeout(rotationResetTimer);
                switch (dir) {
                    case 'up': canvas.style.transform = 'rotateX(48deg)'; break;
                    case 'right': canvas.style.transform = 'rotateX(40deg) rotateY(8deg)'; break;
                    case 'left': canvas.style.transform = 'rotateX(40deg) rotateY(-8deg)'; break;
                    case 'down': canvas.style.transform = 'rotateX(35deg)'; break;
                    case 'up-right': canvas.style.transform = 'rotateX(46deg) rotateY(7deg)'; break;
                    case 'up-left': canvas.style.transform = 'rotateX(46deg) rotateY(-7deg)'; break;
                    case 'down-right': canvas.style.transform = 'rotateX(37deg) rotateY(7deg)'; break;
                    case 'down-left': canvas.style.transform = 'rotateX(37deg) rotateY(-7deg)'; break;
                }
                rotationResetTimer = setTimeout(() => { canvas.style.transform = 'rotateX(40deg)'; }, 200);
                switch (dir) {
                    case 'up': targetAngle = 0; break;
                    case 'right': targetAngle = Math.PI / 2; break;
                    case 'down': targetAngle = Math.PI; break;
                    case 'left': targetAngle = -Math.PI / 2; break;
                    case 'up-right': targetAngle = Math.PI / 4; break;
                    case 'up-left': targetAngle = -Math.PI / 4; break;
                    case 'down-right': targetAngle = 3 * Math.PI / 4; break;
                    case 'down-left': targetAngle = -3 * Math.PI / 4; break;
                }
                let backAngle;
                switch (dir) {
                    case 'up': backAngle = Math.PI / 2; break;
                    case 'down': backAngle = -Math.PI / 2; break;
                    case 'left': backAngle = 0; break;
                    case 'right': backAngle = Math.PI; break;
                    case 'up-right': backAngle = -3 * Math.PI / 4; break;
                    case 'up-left': backAngle = 3 * Math.PI / 4; break;
                    case 'down-right': backAngle = -Math.PI / 4; break;
                    case 'down-left': backAngle = Math.PI / 4; break;
                }
                for (let i = 0; i < 6; i++) {
                    let offX = (Math.random() - 0.5) * 12,
                        offY = (Math.random() - 0.5) * 12;
                    createSpark(playerDrawX + offX, playerDrawY + offY, backAngle + (Math.random() - 0.5) * 0.8);
                }
                const nowInSafe = isInSafeZone();
                if (nowInSafe && !wasInSafeZone) {
                    playSafeZoneEnter();
                    createExplosion(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2, 20, '#00ffcc', 1.2);
                }
                wasInSafeZone = nowInSafe;
                checkCollectibles();
                return true;
            }

            function startNextMove() {
                if (moving || gameOver) return;
                let nextDir = pendingDirection || currentDirection;
                if (!nextDir) return;
                pendingDirection = null;
                if (currentDirection !== nextDir) currentMoveDelay = 110;
                currentDirection = nextDir;
                executeMove(currentDirection);
            }

            function startMove(dir) {
                if (gameOver) { resetGame(); return; }
                if (moving) { pendingDirection = dir; return; }
                if (currentDirection !== dir) currentMoveDelay = 110;
                currentDirection = dir;
                executeMove(dir);
            }

            function cancelCurrentMovement() {
                if (moving) pendingDirection = null;
                currentDirection = null;
                pendingDirection = null;
                stopMotor();
                currentMoveDelay = 110;
            }

            function resetGame() {
                gameOver = false;
                powerUpsOnMap = [];
                activeEffects = [];
                hasReviveTotem = false;
                invulnerableUntil = 0;
                clearAllTimeouts();
                cancelCurrentMovement();
                GRID_SIZE = INITIAL_GRID_SIZE;
                resizeGameElements();
                moving = false;
                pendingDirection = null;
                particles = [];
                sparkParticles = [];
                floatingTexts = [];
                safeZone = null;
                safeZoneTimer = 0;
                wasInSafeZone = false;
                bonusZone = null;
                bonusZoneTimer = 0;
                doubleBonusZone = null;
                doubleBonusZoneTimer = 0;
                lastDoubleBonusTick = 0;
                lastDoubleBonusSpawnTime = 0;
                evadedSinceLastDoubleBonus = 0;
                scoreSinceLastDoubleBonus = 0;
                tripleBonusZone = null;
                tripleBonusZoneTimer = 0;
                lastTripleBonusTick = 0;
                lastTripleBonusSpawnTime = 0;
                premiumCollectedSinceLastTripleBonus = 0;
                bossesEvadedSinceLastTripleBonus = 0;
                bonusZoneCurrentWaveCount = 0;
                doubleBonusZoneCurrentWaveCount = 0;
                tripleBonusZoneCurrentWaveCount = 0;
                score = 0;
                wave = 1;
                evadedThisWave = 0;
                lastBossTime = Date.now();
                premiumFlash = 0;
                playerGlow = 0;
                nextNormalSpawnTime = Date.now() + 3000;
                currentDirection = null;
                targetAngle = 0;
                currentPlayerAngle = 0;
                targetTiltX = 0;
                currentTiltX = 0;
                targetTiltZ = 0;
                currentTiltZ = 0;
                currentMoveDelay = 150;
                lastHumTime = 0;
                updateDifficulty();
                updateUI();
                if (rotationResetTimer) clearTimeout(rotationResetTimer);
                canvas.style.transform = 'rotateX(40deg)';
                stopMotor();
            }

            function draw() {
                const grad = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 80, canvas.width / 2, canvas.height / 2, canvas.width / 1.5);
                grad.addColorStop(0, '#0a1428');
                grad.addColorStop(1, '#03060c');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (premiumFlash > 0) {
                    ctx.fillStyle = `rgba(255,0,255,${Math.min(0.35, premiumFlash/45)})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    premiumFlash--;
                }
                ctx.save();
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 1;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    let pos = i * CELL_SIZE;
                    ctx.beginPath();
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, pos);
                    ctx.lineTo(canvas.width, pos);
                    ctx.stroke();
                }
                ctx.restore();
                drawSafeZone();
                drawBonusZone();
                drawDoubleBonusZone();
                drawTripleBonusZone();
                drawPowerUpsOnMap();
                for (let c of collectibles) {
                    let px = c.x * CELL_SIZE + CELL_SIZE / 2,
                        py = c.y * CELL_SIZE + CELL_SIZE / 2;
                    ctx.fillStyle = '#ffcc33';
                    ctx.beginPath();
                    ctx.arc(px, py, CELL_SIZE * 0.33, 0, Math.PI * 2);
                    ctx.fill();
                }
                const pulse = Math.sin(Date.now() / 100) * 0.12 + 0.4;
                for (let c of premiumCollectibles) {
                    let px = c.x * CELL_SIZE + CELL_SIZE / 2,
                        py = c.y * CELL_SIZE + CELL_SIZE / 2;
                    ctx.fillStyle = '#ff44ff';
                    ctx.beginPath();
                    ctx.arc(px, py, CELL_SIZE * (pulse + 0.22), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#cc22ff';
                    ctx.beginPath();
                    ctx.arc(px, py, CELL_SIZE * 0.34, 0, Math.PI * 2);
                    ctx.fill();
                }
                for (let e of enemies) e.draw();
                drawWallAlerts();
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    if (particles[i].life <= 0) particles.splice(i, 1);
                }
                for (let i = sparkParticles.length - 1; i >= 0; i--) {
                    sparkParticles[i].update();
                    sparkParticles[i].draw();
                    if (sparkParticles[i].life <= 0) sparkParticles.splice(i, 1);
                }
                drawPlayer();
                drawActiveEffectsHUD();
                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    floatingTexts[i].update();
                    floatingTexts[i].draw();
                    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
                }
                if (!moving) {
                    drawGlitchEffect();
                    playerDrawX = player.x * CELL_SIZE + CELL_SIZE / 2;
                    playerDrawY = player.y * CELL_SIZE + CELL_SIZE / 2;
                }
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.85)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.font = '900 42px "Press Start 2P", monospace';
                    ctx.fillStyle = '#ff4466';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);
                    ctx.font = '18px "Press Start 2P", monospace';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText('Toca cualquier botón', canvas.width / 2, canvas.height / 2 + 20);
                    ctx.fillText('para REINICIAR', canvas.width / 2, canvas.height / 2 + 55);
                }
            }

            // ========== CONTROLES ==========
            function createButton(svg) {
                const btn = document.createElement('div');
                btn.className = 'boton';
                btn.innerHTML = svg;
                return btn;
            }

            function createEmptyButton() {
                const btn = document.createElement('div');
                btn.className = 'boton vacio';
                return btn;
            }
            const svgUp = `<svg viewBox="0 0 24 24"><path d="M12 5l7 8h-4v6h-6v-6H5l7-8z"/></svg>`;
            const svgDown = `<svg viewBox="0 0 24 24"><path d="M12 19l-7-8h4V5h6v6h4l-7 8z"/></svg>`;
            const svgLeft = `<svg viewBox="0 0 24 24"><path d="M5 12l8-7v4h6v6h-6v4l-8-7z"/></svg>`;
            const svgRight = `<svg viewBox="0 0 24 24"><path d="M19 12l-8 7v-4H5v-6h6V5l8 7z"/></svg>`;
            const svgUpLeft = `<svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 6v8M6 6h8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
            const svgUpRight = `<svg viewBox="0 0 24 24"><path d="M18 6L6 18M18 6v8M18 6h-8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
            const svgDownLeft = `<svg viewBox="0 0 24 24"><path d="M6 18l12-12M6 18v-8M6 18h8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
            const svgDownRight = `<svg viewBox="0 0 24 24"><path d="M18 18L6 6M18 18v-8M18 18h-8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

            const upLeftBtn = createButton(svgUpLeft),
                upBtn = createButton(svgUp),
                upRightBtn = createButton(svgUpRight);
            const leftBtn = createButton(svgLeft),
                centerEmpty = createEmptyButton(),
                rightBtn = createButton(svgRight);
            const downLeftBtn = createButton(svgDownLeft),
                downBtn = createButton(svgDown),
                downRightBtn = createButton(svgDownRight);
            const centerbotones = document.getElementById('centerbotones');
            centerbotones.innerHTML = '';
            const f1 = document.createElement('section');
            f1.className = 'fila-botones';
            f1.appendChild(upLeftBtn);
            f1.appendChild(upBtn);
            f1.appendChild(upRightBtn);
            const f2 = document.createElement('section');
            f2.className = 'fila-botones';
            f2.appendChild(leftBtn);
            f2.appendChild(centerEmpty);
            f2.appendChild(rightBtn);
            const f3 = document.createElement('section');
            f3.className = 'fila-botones';
            f3.appendChild(downLeftBtn);
            f3.appendChild(downBtn);
            f3.appendChild(downRightBtn);
            centerbotones.appendChild(f1);
            centerbotones.appendChild(f2);
            centerbotones.appendChild(f3);

            const buttonMap = new Map([
                [upLeftBtn, 'up-left'],
                [upBtn, 'up'],
                [upRightBtn, 'up-right'],
                [leftBtn, 'left'],
                [rightBtn, 'right'],
                [downLeftBtn, 'down-left'],
                [downBtn, 'down'],
                [downRightBtn, 'down-right']
            ]);

            function activateButton(btn, dir) {
                if (currentActiveBtn === btn) return;
                if (currentActiveBtn) currentActiveBtn.classList.remove('activo');
                currentActiveBtn = btn;
                startMove(dir);
                btn.classList.add('activo');
            }

            function deactivateAll() {
                if (currentActiveBtn) currentActiveBtn.classList.remove('activo');
                currentActiveBtn = null;
                cancelCurrentMovement();
            }

            function getButtonAt(x, y) { const el = document.elementFromPoint(x, y); for (let [btn, dir] of buttonMap) { if (btn.contains(el) || el === btn) return { btn, dir }; } return null; }

            function handleStart(x, y) { const d = getButtonAt(x, y); if (d) activateButton(d.btn, d.dir); }

            function handleMove(x, y) {
                const d = getButtonAt(x, y);
                if (d) activateButton(d.btn, d.dir);
                else deactivateAll();
            }
            document.addEventListener('touchstart', e => { e.preventDefault(); if (e.touches.length > 0) handleStart(e.touches[e.touches.length - 1].clientX, e.touches[e.touches.length - 1].clientY); }, { passive: false });
            document.addEventListener('touchmove', e => { e.preventDefault(); if (e.touches.length > 0) handleMove(e.touches[e.touches.length - 1].clientX, e.touches[e.touches.length - 1].clientY); }, { passive: false });
            document.addEventListener('touchend', e => {
                if (e.touches.length === 0) deactivateAll();
                else if (e.touches.length > 0) handleStart(e.touches[e.touches.length - 1].clientX, e.touches[e.touches.length - 1].clientY);
            });
            document.addEventListener('touchcancel', deactivateAll);
            document.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
            document.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
            document.addEventListener('mouseup', deactivateAll);
            document.addEventListener('keydown', e => {
                if (gameOver) { resetGame(); return; }
                switch (e.key.toLowerCase()) {
                    case 'arrowup': case 'w': startMove('up'); break;
                    case 'arrowdown': case 's': startMove('down'); break;
                    case 'arrowleft': case 'a': startMove('left'); break;
                    case 'arrowright': case 'd': startMove('right'); break;
                    case 'q': startMove('up-left'); break;
                    case 'e': startMove('up-right'); break;
                    case 'z': startMove('down-left'); break;
                    case 'c': startMove('down-right'); break;
                }
            });

            let nextNormalSpawnTime = Date.now() + 4000;

            function gameLoop() {
                if (!gameOver) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        enemies[i].update();
                        if (enemies[i].isOffScreen()) {
                            evadedThisWave++;
                            evadedSinceLastDoubleBonus++;
                            if (enemies[i].isBoss) bossesEvadedSinceLastTripleBonus++;
                            updateUI();
                            enemies.splice(i, 1);
                        }
                    }
                    checkEnemyCollision();
                    updateZones();
                    updateBonusScore();
                    updateDoubleBonusScore();
                    updateTripleBonusScore();
                    updateActiveEffects();
                    const now = Date.now();
                    if (safeZone && now - lastHumTime > 2100 && Math.random() < 0.3) {
                        playSafeZoneHum();
                        lastHumTime = now;
                    }
                    if (now >= nextNormalSpawnTime && !gameOver) {
                        let count = enemySpawnConfig.normal.baseCount + Math.floor(Math.random() * (enemySpawnConfig.normal.countVariance + 1));
                        for (let i = 0; i < count; i++) {
                            const dirs = ['down', 'up', 'left', 'right'];
                            spawnEnemy(dirs[Math.floor(Math.random() * 4)], false);
                        }
                        const interval = enemySpawnConfig.normal.minInterval + Math.random() * (enemySpawnConfig.normal.maxInterval - enemySpawnConfig.normal.minInterval);
                        nextNormalSpawnTime = now + interval;
                    }
                    if (now - lastBossTime > enemySpawnConfig.boss.interval && !gameOver) {
                        if (Math.random() < 0.7) triggerBossWave();
                        else lastBossTime = now;
                    }
                }
                draw();
                requestAnimationFrame(gameLoop);
            }

            generateCollectibles();
            updateUI();
            updateDifficulty();
            gameLoop();
            console.log("%cODPAR v1.21.0 – ¡Mensajes personalizados activados!", "color:#FFD700; font-size:18px");
        })();
    </script>
</body>
</html>
