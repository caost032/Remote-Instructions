      function drawMessageCollectibles() {
        const now = Date.now();
        for (let cell of messageCollectibles) {
          const px = cell.x * CELL_SIZE + CELL_SIZE / 2,
            py = cell.y * CELL_SIZE + CELL_SIZE / 2;
          let scale = 1,
            alpha = 1,
            offsetX = 0,
            offsetY = 0;
          const eff = parseEffectsString(cell.effects);
          const ep = cell.effectParams || {};
          if (eff.pulseAmplitude) scale += Math.sin(now * 0.003 * (eff.pulseSpeed || 0.3)) * eff.pulseAmplitude;
          if (eff.chaosOffsetMax) {
            offsetX = (Math.random() - 0.5) * (ep.chaosOffsetMax || eff.chaosOffsetMax);
            offsetY = (Math.random() - 0.5) * (ep.chaosOffsetMax || eff.chaosOffsetMax);
          }
          if (eff.stealthAlphaMin !== undefined) {
            alpha = Math.sin(now * 0.002 * (eff.stealthSpeed || 0.4)) * 0.5 + 0.5;
            alpha = Math.max(eff.stealthAlphaMin, alpha);
          }
          if (eff.blinkMinAlpha !== undefined) alpha = Math.sin(now * 0.006 * (eff.blinkSpeed || 0.2)) > 0 ? 1 : (eff.blinkMinAlpha || 0.3);
          if (eff.rotateAmplitude) scale *= 1 + Math.sin(now * 0.004 * (eff.rotateSpeed || 0.02)) * (eff.rotateAmplitude || 0.15);
          // animación de entrada
          if (cell.entranceStyle && cell.entranceStyle !== "none") {
            const age = now - cell.entranceDelay;
            if (age < 0) continue;
            const t = Math.min(1, age / 400);
            if (cell.entranceStyle === "fadeIn") alpha *= t;
            else if (cell.entranceStyle === "scaleUp") scale *= 0.2 + 0.8 * t;
            else if (cell.entranceStyle === "spiral") {
              const a = (1 - t) * Math.PI * 4,
                r = (1 - t) * 100;
              offsetX += Math.cos(a) * r;
              offsetY += Math.sin(a) * r;
            }
          }
          const s = CELL_SIZE * 0.34 * scale;
          // color dinámico
          let cellColor = cell.color;
          if (cell.fillColor === "rainbow" || cell.fillColor === "rainbow_fast" || cell.fillColor === "rainbow_slow") {
            const spd = cell.fillColor === "rainbow_fast" ? 0.5 : (cell.fillColor === "rainbow_slow" ? 0.1 : (cell.rainbowSpeed || 0.5));
            cellColor = `hsl(${(now*spd+(cell.x+cell.y)*5)%360},90%,55%)`;
          } else if (cell.fillColor === "palette" && cell.palette) {
            const pal = PALETTES[cell.palette];
            if (pal) cellColor = pal[(cell.x + cell.y + Math.floor(now / 200)) % pal.length];
          }
          ctx.save();
          ctx.globalAlpha = alpha;
          // glow
          const gr = (ep.glowRadius !== undefined ? ep.glowRadius : eff.glowRadius) || 0;
          if (gr > 0) {
            const glowR = CELL_SIZE * gr * 0.4;
            const grd = ctx.createRadialGradient(px + offsetX, py + offsetY, 0, px + offsetX, py + offsetY, glowR);
            const glowColor = ep.glowColor || eff.glowColor || '#ffffff';
            // Convierte cualquier color a hexadecimal con canal alpha
ctx.fillStyle = glowColor;
const solidColor = ctx.fillStyle; // formato rgb() o #hex
const rgb = solidColor.startsWith('#') ? solidColor : solidColor.slice(4, -1).split(',').map(Number);
if (Array.isArray(rgb)) {
  grd.addColorStop(0, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.53)`);
} else {
  grd.addColorStop(0, glowColor + '88'); // solo si ya es #hex
}
            grd.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(px + offsetX, py + offsetY, glowR, 0, Math.PI * 2);
            ctx.fill();
          }
          // orbitas boss
          if (cell.effects && cell.effects.includes('boss')) {
            const oa = now * 0.004 + cell.x * 0.5;
            for (let i = 0; i < 3; i++) {
              const a = oa + i * Math.PI * 2 / 3;
              ctx.fillStyle = 'rgba(255,255,100,0.6)';
              ctx.beginPath();
              ctx.arc(px + Math.cos(a) * s * 1.5, py + Math.sin(a) * s * 1.5, 2, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.fillStyle = cellColor || MESSAGE_CONFIG.defaultFillColor;
          ctx.beginPath();
          ctx.arc(px + offsetX, py + offsetY, s, 0, Math.PI * 2);
          ctx.fill();
          if (cell.strokeColor?.mode === "fixed") {
            ctx.strokeStyle = cell.strokeColor.value;
            ctx.lineWidth = cell.strokeColor.width || 1;
            ctx.stroke();
          }
          ctx.restore();
        }
      }
      
      // ═══════════════════════════════════════
      // JUGADOR
      // ═══════════════════════════════════════
      function drawPlayer() {
        const px = playerDrawX,
          py = playerDrawY + Math.sin(Date.now() * 0.005) * 3;
        const size = CELL_SIZE * 0.72;
        const invulnerable = Date.now() < invulnerableUntil;
        const blink = invulnerable && Math.floor(Date.now() / 100) % 2 === 0;
        let angleDiff = targetAngle - currentPlayerAngle;
        angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
        currentPlayerAngle += angleDiff * 0.15;
        currentTiltX += (targetTiltX - currentTiltX) * 0.2;
        currentTiltZ += (targetTiltZ - currentTiltZ) * 0.2;
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(currentPlayerAngle);
        ctx.transform(1, currentTiltZ * 0.15, currentTiltX * 0.15, 1, 0, 0);
        if (blink) ctx.globalAlpha = 0.5;
        const hasShield = activeEffects.some(e => e.type === 'shield');
        if (hasShield) {
          ctx.beginPath();
          ctx.arc(0, 0, size * 1.1, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(170,221,255,0.2)';
          ctx.fill();
          ctx.strokeStyle = '#aaddff';
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }
        // radio del imán
        if (activeEffects.some(e => e.type.startsWith('magnet'))) {
          const magnet = activeEffects.find(e => e.type.startsWith('magnet'));
          const radius = POWERUP_CONFIG.types[magnet.type]?.radius || 0;
          const step = CELL_SIZE * (radius >= 999 ? 2 : radius * 0.8);
          ctx.strokeStyle = '#44ffcc';
          ctx.lineWidth = 1.2;
          ctx.globalAlpha = 0.25;
          ctx.beginPath();
          ctx.arc(0, 0, step, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, 0, step * 0.75, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = blink ? 0.5 : 1;
        }
        // nave
        ctx.beginPath();
        ctx.moveTo(0, -size * 0.85);
        ctx.lineTo(-size * 0.55, size * 0.4);
        ctx.lineTo(0, size * 0.2);
        ctx.lineTo(size * 0.55, size * 0.4);
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,0,0,0)';
        ctx.fill();
        ctx.strokeStyle = 'skyblue';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // alas
        ctx.beginPath();
        ctx.moveTo(-size * 0.5, size * 0.1);
        ctx.lineTo(-size * 0.95, size * 0.5);
        ctx.lineTo(-size * 0.45, size * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(size * 0.5, size * 0.1);
        ctx.lineTo(size * 0.95, size * 0.5);
        ctx.lineTo(size * 0.45, size * 0.5);
        ctx.closePath();
        ctx.fill();
        // cabina
        ctx.beginPath();
        ctx.arc(0, -size * 0.25, size * 0.2, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(150,220,255,0.6)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // tótem de revivir
        if (hasReviveTotem) {
          ctx.fillStyle = '#88ff88';
          ctx.beginPath();
          ctx.arc(size * 0.55, -size * 0.65, size * 0.15, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(size * 0.55, -size * 0.65, size * 0.07, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
        // glow del jugador
        if (playerGlow > 0) {
          ctx.fillStyle = `rgba(180,255,255,${playerGlow/45})`;
          ctx.beginPath();
          ctx.arc(px, py, CELL_SIZE * 1.3, 0, Math.PI * 2);
          ctx.fill();
          playerGlow--;
        }
        // agujero negro visual
        if (player.blackHoleActive) {
          ctx.save();
          ctx.strokeStyle = '#8800ff';
          ctx.lineWidth = 3;
          ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.01) * 0.4;
          for (let r = 1; r <= 3; r++) {
            ctx.beginPath();
            ctx.arc(px, py, CELL_SIZE * r * 0.6, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }
      }
      
      function drawActiveEffectsHUD() {
        if (!activeEffects.length) return;
        let y = 40;
        const x = CANVAS_SIZE - 20,
          now = Date.now();
        ctx.save();
        ctx.font = '14px "Press Start 2P",monospace';
        ctx.textAlign = 'right';
        for (let ef of activeEffects) {
          const info = POWERUP_TYPES[ef.type];
          if (!info) continue;
          const left = Math.ceil(Math.max(0, ef.expires - now) / 1000);
          const text = (info.name || ef.type).slice(0, 4) + (info.level ? ' ' + info.level : '') + (ef.expires > now ? ' ' + left + 's' : '');
          ctx.fillStyle = info.color || '#ffffff';
          ctx.fillText(text, x - 10, y);
          y += 22;
        }
        ctx.restore();
      }
      
      function drawGlitchEffect() {
        if (!glitchActive || glitchTimer <= 0) return;
        glitchTimer--;
        const intensity = glitchIntensity * (glitchTimer / 2);
        ctx.save();
        ctx.globalAlpha = Math.min(1, intensity);
        for (let i = 0; i < 6; i++) {
          const offset = (Math.random() - 0.5) * 18 * intensity;
          const sliceY = Math.random() * CANVAS_SIZE,
            sliceH = 8 + Math.random() * 22;
          ctx.drawImage(canvas, 0, sliceY, CANVAS_SIZE, sliceH, offset, sliceY, CANVAS_SIZE, sliceH);
        }
        if (!AccessibilityOptions.reduceFlashes && Math.random() < 0.4) {
          ctx.fillStyle = Math.random() < 0.1 ? '#00ffff' : '#ff00ff';
          ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        }
        ctx.restore();
        if (glitchTimer <= 0) {
          glitchActive = false;
          glitchIntensity = 0;
        }
      }
      
      // ═══════════════════════════════════════
      // LÓGICA DE COLECCIONABLES
      // ═══════════════════════════════════════
      function collectCell(cell, isPremium = false) {
        const px = cell.x * CELL_SIZE + CELL_SIZE / 2,
          py = cell.y * CELL_SIZE + CELL_SIZE / 2;
        if (isPremium) {
          const totalCells = messageCollectibles.length + 1;
          const collectedCount = totalCells - messageCollectibles.length;
          let pts = calculatePointsPerCell(currentWaveConfig, comboCount, totalCells, collectedCount, { x: cell.x, y: cell.y }, GRID_SIZE);
          if (doublePointsActive) pts *= 2;
          if (isInZone("comboZone")) pts = Math.floor(pts * (ZONE_CONFIG.comboZone.comboMultiplier || 2));
          score += pts;
          scoreSinceLastDoubleBonus += pts;
          premiumCollectedSinceLastTripleBonus++;
          totalMessageCellsCollected++;
          totalCellsCollected++;
          localStorage.setItem('odparTotalCells', totalMessageCellsCollected.toString());
          createExplosion(px, py, 20, '#ff88ff');
          createFloatingText(px, py, pts, true);
          playPremiumCollect();
          messageCollectibles = messageCollectibles.filter(c => c !== cell);
          comboCount++;
          chainMultiplier = Math.min(5, 1 + Math.floor(comboCount / 5));
          if (comboCount > maxCombo) maxCombo = comboCount;
        } else {
          let pts = doublePointsActive ? 16 : 8;
          score += pts;
          scoreSinceLastDoubleBonus += pts;
          createExplosion(px, py, 15, '#ffd700');
          createFloatingText(px, py, pts);
          playNormalCollect();
          collectibles = collectibles.filter(c => c !== cell);
        }
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('odparHighScore', highScore);
        }
        updateUI();
      }
      
      function moveCellTowardsPlayer(cell, magnetRadius) {
        if (magnetRadius >= 999) {
          cell.x = player.x;
          cell.y = player.y;
          return;
        }
        cell.x += Math.sign(player.x - cell.x);
        cell.y += Math.sign(player.y - cell.y);
      }
      
      function checkCollectibles() {
        let magnetRadius = 0;
        for (let ef of activeEffects)
          if (ef.type.startsWith('magnet') && (POWERUP_CONFIG.types[ef.type]?.radius || 0) > magnetRadius)
            magnetRadius = POWERUP_CONFIG.types[ef.type].radius || 0;
        
        function inRange(cx, cy) {
          if (magnetRadius === 0) return (cx === player.x && cy === player.y);
          const dx = Math.abs(cx - player.x),
            dy = Math.abs(cy - player.y);
          if (magnetRadius >= 999) return true;
          return dx <= magnetRadius && dy <= magnetRadius;
        }
        
        for (let i = collectibles.length - 1; i >= 0; i--) {
          if (inRange(collectibles[i].x, collectibles[i].y)) {
            if (magnetRadius > 0 && (collectibles[i].x !== player.x || collectibles[i].y !== player.y))
              moveCellTowardsPlayer(collectibles[i], magnetRadius);
            if (collectibles[i].x === player.x && collectibles[i].y === player.y) {
              collectCell(collectibles[i], false);
              if (collectibles.length === 0 && messageCollectibles.length === 0) completeWave();
              return;
            }
          }
        }
        for (let i = messageCollectibles.length - 1; i >= 0; i--) {
          const cell = messageCollectibles[i];
          if (inRange(cell.x, cell.y)) {
            if (magnetRadius > 0 && (cell.x !== player.x || cell.y !== player.y)) moveCellTowardsPlayer(cell, magnetRadius);
            if (cell.x === player.x && cell.y === player.y) {
              collectCell(cell, true);
              if (messageCollectibles.length === 0 && currentWaveMessage) {
                const elapsed = Date.now() - waveStartTime;
                let bonus = calculateCompletionBonus(currentWaveConfig, comboCount, comboCount, elapsed);
                if (doublePointsActive) bonus *= 2;
                if (currentWaveConfig.bonusOnCompleteEnabled !== false && bonus > 0) {
                  score += bonus;
                  if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('odparHighScore', highScore);
                  }
                  createExplosion(CANVAS_SIZE / 2, CANVAS_SIZE / 2, 50, '#ffd700', 2.5);
                  floatingTexts.push(new FloatingText(CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 40, `MSG +${bonus}`, '#FFD700', true, true, true));
                  playTripleBonusCollect();
                  updateUI();
                }
                if (collectibles.length === 0) completeWave();
              }
              return;
            }
          }
        }
        for (let i = powerUpsOnMap.length - 1; i >= 0; i--) {
          if (powerUpsOnMap[i].x === player.x && powerUpsOnMap[i].y === player.y) {
            const cfg = POWERUP_CONFIG.types[powerUpsOnMap[i].type];
            if (cfg?.instantActivate) tryActivatePowerUp(powerUpsOnMap[i]);
            else tryStoreOrActivatePowerUp(powerUpsOnMap[i]);
            return;
          }
        }
      }
      
      function checkEnemyCollision() {
        if (isInSafeZone() || Date.now() < invulnerableUntil) return false;
        if (isInGhostZone() || player.phaseActive) { totalGhostPassthrough++; return false; }
        for (let enemy of enemies) {
          const cells = enemy.getOccupiedCells();
          for (let cell of cells) {
            if (cell.x < 0 || cell.x >= GRID_SIZE || cell.y < 0 || cell.y >= GRID_SIZE) continue;
            if (player.x === cell.x && player.y === cell.y) {
              // 1º escudo
              const shieldIdx = activeEffects.findIndex(ef => ef.type === 'shield');
              if (shieldIdx !== -1) {
                activeEffects.splice(shieldIdx, 1);
                totalShieldsBroken++;
                const idx = enemies.indexOf(enemy);
                if (idx !== -1) {
                  createExplosion(enemy.x * CELL_SIZE + CELL_SIZE / 2, enemy.y * CELL_SIZE + CELL_SIZE / 2, 25, '#aaddff');
                  enemies.splice(idx, 1);
                }
                createFloatingText(playerDrawX, playerDrawY - 20, "ESCUDO ROTO", true);
                SPECIAL_SOUNDS.shieldBreak();
                invulnerableUntil = Date.now() + 800;
                return false;
              }
              // 2º revive
              if (hasReviveTotem) {
                hasReviveTotem = false;
                totalRevivesUsed++;
                revivesUsedThisGame++;
                enemies = [];
                createExplosion(playerDrawX, playerDrawY, 50, '#88ff88', 2.2);
                createFloatingText(CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 50, "REVIVIDO", true, true);
                invulnerableUntil = Date.now() + 1500;
                checkAchievements();
                return false;
              }
              // 3º game over
              gameOver = true;
              createExplosion(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2, 50, '#ff0000', 1.5);
              playHitSound();
              return true;
            }
          }
        }
        return false;
      }
      
      function generateCollectibles() {
        collectibles = [];
        messageCollectibles = [];
        const normalCount = Math.max(3, Math.floor(GRID_SIZE * 0.1));
        for (let i = 0; i < normalCount; i++) {
          let x, y, attempts = 0;
          do {
            x = Math.floor(Math.random() * GRID_SIZE);
            y = Math.floor(Math.random() * GRID_SIZE);
            attempts++;
          }
          while (attempts < 400 && ((x === player.x && y === player.y) || collectibles.some(c => c.x === x && c.y === y)));
          if (attempts < 400) collectibles.push({ x, y });
        }
        if (currentWaveMessage && GRID_SIZE >= 8) {
          const coords = messageToCoordsAdvanced(currentWaveMessage, currentWaveConfig, GRID_SIZE);
          for (let c of coords) {
            if (c.x >= 0 && c.x < GRID_SIZE && c.y >= 0 && c.y < GRID_SIZE && !(c.x === player.x && c.y === player.y)) {
              if (!collectibles.some(p => p.x === c.x && p.y === c.y) && !powerUpsOnMap.some(p => p.x === c.x && p.y === c.y))
                messageCollectibles.push(c);
            }
          }
        }
      }
      
      function updateDifficulty() {
        const w = Math.min(wave, 30);
        enemySpawnConfig.normal.minInterval = Math.max(800, 1800 - w * 22);
        enemySpawnConfig.normal.maxInterval = Math.max(1200, 3200 - w * 40);
        enemySpawnConfig.normal.baseCount = 1 + Math.floor(w / 7);
        enemySpawnConfig.normal.countVariance = 1 + Math.floor(w / 10);
        enemySpawnConfig.normal.speed = Math.min(ENEMY_CONFIG.maxSpeedCap, 0.062 + w * 0.0032);
        enemySpawnConfig.boss.interval = Math.max(10000, 22000 - w * 300);
        enemySpawnConfig.boss.speed = Math.min(0.11, 0.058 + w * 0.0018);
        ENEMY_CONFIG.baseSpeedNormal = enemySpawnConfig.normal.speed;
        ENEMY_CONFIG.baseSpeedBoss = enemySpawnConfig.boss.speed;
      }
      
      function applyOleadaModifiers(config) {
        if (!config) return;
        if (config.enemySpeedMultiplier && config.enemySpeedMultiplier !== 1) {
          enemySpawnConfig.normal.speed *= config.enemySpeedMultiplier;
          enemySpawnConfig.boss.speed *= config.enemySpeedMultiplier;
          ENEMY_CONFIG.baseSpeedNormal = enemySpawnConfig.normal.speed;
          ENEMY_CONFIG.baseSpeedBoss = enemySpawnConfig.boss.speed;
        }
        if (config.spawnRateMultiplier && config.spawnRateMultiplier !== 1) {
          enemySpawnConfig.normal.minInterval = Math.max(300, enemySpawnConfig.normal.minInterval * config.spawnRateMultiplier);
          enemySpawnConfig.normal.maxInterval = Math.max(500, enemySpawnConfig.normal.maxInterval * config.spawnRateMultiplier);
        }
        if (config.powerUpSpawnRate && config.powerUpSpawnRate !== 1) POWERUP_CONFIG.spawnCount = Math.ceil(3 * config.powerUpSpawnRate);
        safeZoneDisabledForWave = config.safeZoneDisabled || false;
        doublePointsActive = config.doublePoints || false;
        if (config.bossRush)
          for (let i = 0; i < 3; i++) timers.add(() => { if (!gameOver) triggerBossWave(); }, 2000 + i * 1500);
        if (config.invulnerableOnWaveStart) invulnerableUntil = Date.now() + config.invulnerableOnWaveStart;
        if (config.playerGlowOnStart) playerGlow = config.playerGlowOnStart;
        if (config.glitchIntensity) glitchIntensity = config.glitchIntensity;
        if (config.specialSound && SPECIAL_SOUNDS[config.specialSound]) SPECIAL_SOUNDS[config.specialSound]();
      }
      
      function resizeGameElements() {
        CELL_SIZE = CANVAS_SIZE / GRID_SIZE;
        player.x = Math.floor(GRID_SIZE / 2);
        player.y = Math.floor(GRID_SIZE / 2);
        playerDrawX = player.x * CELL_SIZE + CELL_SIZE / 2;
        playerDrawY = player.y * CELL_SIZE + CELL_SIZE / 2;
        moving = false;
        pendingDirection = null;
        currentDirection = null;
        enemies = [];
        wallAlerts = [];
        generateCollectibles();
        lastBossTime = Date.now();
        powerUpsOnMap = [];
        updateUI();
      }
      
      function updateUI() {
        const scoreEl = document.getElementById('score');
        const hiEl = document.getElementById('highScore');
        const waveEl = document.getElementById('waveSpan');
        const evEl = document.getElementById('evadedSpan');
        if (scoreEl) scoreEl.textContent = String(score).padStart(6, '0');
        if (hiEl) hiEl.textContent = String(highScore).padStart(6, '0');
        if (waveEl) waveEl.textContent = wave;
        if (evEl) evEl.textContent = evadedThisWave;
        const weatherEl = document.getElementById('hud-weather');
        const comboEl = document.getElementById('hud-combo');
        const effectsEl = document.getElementById('hud-effects');
        const inventoryEl = document.getElementById('hud-inventory');
        if (weatherEl) weatherEl.textContent = currentWeather?.name || 'Despejado';
        if (comboEl) comboEl.textContent = chainMultiplier > 1 ? `x${chainMultiplier} COMBO` : '';
        if (effectsEl) effectsEl.textContent = activeEffects.filter(e => e.expires > Date.now()).map(e => { const info = POWERUP_TYPES[e.type]; return info ? (info.name || e.type).slice(0, 4) : e.type.slice(0, 4); }).join(' ') || '';
        if (inventoryEl) inventoryEl.textContent = playerInventory.length > 0 ? playerInventory.map(p => `[${(POWERUP_TYPES[p.type]?.name||p.type).slice(0,4).toUpperCase()}]`).join(' ') : '';
      }
      
      // ═══════════════════════════════════════
      // WAVE EVENTS
      // ═══════════════════════════════════════
      const WAVE_EVENTS = {
        10: { type: "doubleScore", message: "PUNTUACION DOBLE!", duration: 15000 },
        20: { type: "bossRush", message: "EMBOSCADA!", count: 8 },
        25: { type: "megabomb", message: "MEGABOMBA!" },
        30: { type: "legendary", message: "TODO GRATUITO!", duration: 20000 },
        40: { type: "weather", weather: "snow", message: "VENTISCA!" },
        50: { type: "ultimate", message: "MODO ULTIMATE!" }
      };
      
      function triggerWaveEvent(wvNum) {
        const event = WAVE_EVENTS[wvNum];
        if (!event) return;
        floatingTexts.push(new FloatingText(CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 60, event.message, '#FFD700', true, true, false));
        switch (event.type) {
          case 'doubleScore':
            doublePointsActive = true;
            timers.add(() => { doublePointsActive = false; }, event.duration || 15000);
            break;
          case 'bossRush':
            for (let i = 0; i < (event.count || 8); i++) timers.add(() => { if (!gameOver) spawnEnemy('boss', ['down', 'up', 'left', 'right'][i % 4]); }, i * 300);
            break;
          case 'megabomb':
            enemies = [];
            createExplosion(CANVAS_SIZE / 2, CANVAS_SIZE / 2, 60, '#ff6644', 2.5);
            SPECIAL_SOUNDS.megaExplosion();
            break;
          case 'legendary': {
            const origCosts = {};
            ['magnetCommon', 'magnetEpic', 'bombNormal'].forEach(t => {
              if (POWERUP_CONFIG.types[t]) {
                origCosts[t] = POWERUP_CONFIG.types[t].cost;
                POWERUP_CONFIG.types[t].cost = 0;
              }
            });
            timers.add(() => { Object.keys(origCosts).forEach(t => { POWERUP_CONFIG.types[t].cost = origCosts[t]; }); }, event.duration || 20000);
          }
          break;
          case 'weather':
            applyWeather(event.weather);
            break;
          case 'ultimate':
            Object.keys(POWERUP_CONFIG.types).forEach(t => { if (POWERUP_CONFIG.types[t].enabled && !['revive', 'bombNormal', 'bombLegendary'].includes(t)) activeEffects.push({ type: t, expires: Date.now() + 20000, radius: POWERUP_CONFIG.types[t].radius || 0 }); });
            doublePointsActive = true;
            SPECIAL_SOUNDS.levelUp();
            break;
        }
        updateUI();
      }
      
      // ═══════════════════════════════════════
      // COMPLETE WAVE
      // ═══════════════════════════════════════
      function completeWave() {
        if (gameOver) return;
        if (comboCount > maxCombo) maxCombo = comboCount;
        chainMultiplier = 1;
        lastWaveCompletionTime = Date.now() - waveStartTime;
        if (currentWaveConfig?.bossRush) {
          totalBossWavesSurvived++;
          localStorage.setItem('odparBossWaves', totalBossWavesSurvived.toString());
        }
        checkAchievements();
        totalWavesCompleted++;
        wave++;
        evadedThisWave = 0;
        comboCount = 0;
        waveStartTime = Date.now();
        currentWaveConfig = getMessageConfig(wave);
        currentWaveMessage = currentWaveConfig.text;
        updateDifficulty();
        applyOleadaModifiers(currentWaveConfig);
        WaveStateMachine.start(wave);
        const oldSize = GRID_SIZE;
        let newSize;
        if (wave > 1) {
          if (MESSAGE_CONFIG.autoGrid && currentWaveMessage) {
            newSize = calculateGridSizeForMessage(currentWaveMessage, currentWaveConfig.mapSizeMode || "fittext");
            if (newSize < 18 && Math.random() < 0.5) newSize += Math.floor(Math.random() * 5);
          } else {
            newSize = (wave % 5 === 0) ? 20 + Math.floor(Math.random() * 11) : 10 + Math.floor(Math.random() * 11);
          }
          newSize = Math.max(MESSAGE_CONFIG.gridMin, Math.min(MESSAGE_CONFIG.gridMax, newSize));
        } else newSize = INITIAL_GRID_SIZE;
        GRID_SIZE = newSize;
        adjustZonesToNewGrid(oldSize, newSize);
        resizeGameElements();
        playerDrawX = player.x * CELL_SIZE + CELL_SIZE / 2;
        playerDrawY = player.y * CELL_SIZE + CELL_SIZE / 2;
        glitchActive = true;
        glitchTimer = 40;
        glitchIntensity = currentWaveConfig.glitchIntensity ?? 1;
        playerGlow = currentWaveConfig.playerGlowOnStart || 50;
        createExplosion(playerDrawX, playerDrawY, 55, '#00ffff', 2.0);
        createExplosion(playerDrawX, playerDrawY, 35, '#ffffff', 1.4);
        createFloatingText(playerDrawX, playerDrawY - 65, `GRID: ${GRID_SIZE}!`, false, false);
        playLevelComplete();
        zones = [];
        zoneTimers = {};
        zoneScoreAccumulator = 0;
        evadedSinceLastDoubleBonus = 0;
        scoreSinceLastDoubleBonus = 0;
        premiumCollectedSinceLastTripleBonus = 0;
        bossesEvadedSinceLastTripleBonus = 0;
        updateUI();
        generatePowerUps();
        updateWeatherSchedule(wave);
        if (WAVE_EVENTS[wave]) timers.add(() => triggerWaveEvent(wave), 1000);
        // tienda 25% de probabilidad
        if (Math.random() < 0.25) { openShop(); }
        saveGame();
      }

      // TIENDA

        paused = true;
        shopOpen = true;

      // ═══════════════════════════════════════
      // PAUSA - OVERLAY DE LOGROS
      // ═══════════════════════════════════════
      function drawPauseOverlay() {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        ctx.fillStyle = '#ffffff';
        ctx.font = '12px "Press Start 2P",monospace';

        let newX = player.x,
          newY = player.y;
        switch (dir) {
          case 'up':
            newY--;

          case 'down':
            newY++;
            break;
          case 'left':
            newX--;
            break;
          case 'right':
            newX++;
            break;
          case 'up-left':
            newX--;
            newY--;
            break;
          case 'up-right':
            newX++;
            newY--;
            break;
          case 'down-left':
            newX--;
            newY++;
            break;
          case 'down-right':
            newX++;
            newY++;
            break;
        }
        if (newX < 0 || newX >= GRID_SIZE || newY < 0 || newY >= GRID_SIZE) return false;

        player.y = newY;
        const speedActive = activeEffects.some(e => e.type === 'speed') || isInSpeedZone();
        const spMult = player.speedMultiplier || 1;
        let duration = Math.max(MIN_MOVE_DELAY, speedActive ? currentMoveDelay / (spMult * 2) : currentMoveDelay / spMult);
        const animStart = performance.now();
        
        function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
        
        function animateMove(now) {
          const elapsed = now - animStart,
            t = Math.min(1, elapsed / duration),
            ease = easeInOutCubic(t);

          else {
            playerDrawX = endX;
            playerDrawY = endY;
            moving = false;

            if (currentMoveDelay > MIN_MOVE_DELAY) currentMoveDelay = Math.max(MIN_MOVE_DELAY, currentMoveDelay * 0.9);

function handleShopClick(clientX, clientY) {
    if (!shopOpen) return false;

    // Convertir coordenadas de la ventana a coordenadas del canvas
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_SIZE / rect.width;   // canvas.width físico (560)
    const scaleY = CANVAS_SIZE / rect.height;
    const canvasX = (clientX - rect.left) * scaleX;
    const canvasY = (clientY - rect.top) * scaleY;

    // Verificar botón cerrar
    const closeRect = window._shopCloseRect;
    if (closeRect && canvasX >= closeRect.x && canvasX <= closeRect.x + closeRect.w &&
        canvasY >= closeRect.y && canvasY <= closeRect.y + closeRect.h) {
        shopOpen = false;
        paused = false;
        return true;
    }

    // Verificar artículos
    const items = window._shopItems || [];
    for (let item of items) {
        if (item.rect && canvasX >= item.rect.x && canvasX <= item.rect.x + item.rect.w &&
            canvasY >= item.rect.y && canvasY <= item.rect.y + item.rect.h) {
            if (score >= item.cost) {
                score -= item.cost;
                item.action();
                updateUI();
                audioManager.playSfx(600, 80, 'triangle', 0.5);
            }
            return true;
        }
    }
    return false; // Si no tocó nada, no hacemos nada (no cerramos)
}

});
      document.addEventListener('touchmove', e => { e.preventDefault(); if (e.touches.length > 0) handleMove(e.touches[e.touches.length - 1].clientX, e.touches[e.touches.length - 1].clientY); }, { passive: false });
      document.addEventListener('touchend', e => {
        if (e.touches.length === 0) deactivateAll();
        else handleStart(e.touches[e.touches.length - 1].clientX, e.touches[e.touches.length - 1].clientY);
      });
      document.addEventListener('touchcancel', deactivateAll);
      
      document.addEventListener('mousemove', e => { if (e.buttons > 0) handleMove(e.clientX, e.clientY); });
      document.addEventListener('mouseup', deactivateAll);
      
      document.addEventListener('keydown', e => {
        audioManager.resume();
        // tienda
        if (shopOpen) {
          if (e.key === 'Enter' && window._shopItems) {
            const it = window._shopItems[0];
            if (it && score >= it.cost) {
              score -= it.cost;
              it.effect();
              updateUI();
            }
          }
          if (e.key === 'Escape') {
            shopOpen = false;
            paused = false;
            window._shopItems = null;
          }
          return;
        }
        // pausa
        if (e.key === 'p' || e.key === 'P') { if (!gameOver) { paused = !paused; } return; }
        if (paused) {
          if (e.key === 'ArrowUp') { pauseAchPage = Math.max(0, pauseAchPage - 1); return; }
          if (e.key === 'ArrowDown') { pauseAchPage++; return; }
          if (e.key === 'Enter') { paused = false; return; }
          return;
        }
        // inventario
        if (e.key === ' ' && !gameOver && playerInventory.length > 0) {
          const pu = playerInventory.shift();
          activateInventoryPowerUp(pu);
          return;
        }
        // debug
        if (e.key === 'F1') { debugMode = !debugMode; return; }
        if (debugMode) {
          if (e.key === 'F2') { spawnEnemy('boss', 'down'); return; }
          if (e.key === 'F3') {
            const ws = Object.keys(WEATHER_TYPES);
            applyWeather(ws[Math.floor(Math.random() * ws.length)]);
            return;
          }
          if (e.key === 'F4') {
            score += 1000;
            updateUI();
            return;
          }
          if (e.key === 'F5') { activeEffects.push({ type: 'shield', expires: Date.now() + 10000 }); return; }
        }
        if (gameOver) { resetGame(); return; }
        switch (e.key.toLowerCase()) {
          case 'arrowup':
          case 'w':
            startMove('up');
            break;
          case 'arrowdown':
          case 's':
            startMove('down');
            break;
          case 'arrowleft':
          case 'a':
            startMove('left');
            break;
          case 'arrowright':
          case 'd':
            startMove('right');
            break;
          case 'q':
            startMove('up-left');
            break;
          case 'e':
            startMove('up-right');
            break;
          case 'z':
            startMove('down-left');
            break;
          case 'c':
            startMove('down-right');
            break;
        }
      });
      
      // Gamepad
      function pollGamepad() {
        const gp = navigator.getGamepads?.()[0];
        if (gp && !gameOver && !paused && !shopOpen) {
          if (gp.axes[0] < -0.5) startMove('left');
          if (gp.axes[0] > 0.5) startMove('right');
          if (gp.axes[1] < -0.5) startMove('up');
          if (gp.axes[1] > 0.5) startMove('down');
          if (gp.buttons[0]?.pressed && playerInventory.length > 0) {
            const pu = playerInventory.shift();
            activateInventoryPowerUp(pu);
          }
          if (gp.buttons[9]?.pressed && !gameOver) paused = !paused;
        }
      }
      // Botón flotante para usar inventario (móvil)
const invBtn = document.createElement('div');
invBtn.style.cssText = 'position:absolute; bottom:20px; right:20px; width:48px; height:48px; background:#ffaa00; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; font-weight:bold; z-index:100; cursor:pointer; box-shadow:0 4px 8px rgba(0,0,0,0.5);';
invBtn.textContent = '⚡';
document.body.appendChild(invBtn);

invBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!gameOver && playerInventory.length > 0) {
    const pu = playerInventory.shift();
    activateInventoryPowerUp(pu);
  }
});
invBtn.addEventListener('mousedown', (e) => {
  if (!gameOver && playerInventory.length > 0) {
    const pu = playerInventory.shift();
    activateInventoryPowerUp(pu);
  }
});
      
      // ═══════════════════════════════════════
      // INICIO
      // ═══════════════════════════════════════
      currentWaveConfig = getMessageConfig(1);
      currentWaveMessage = currentWaveConfig.text;
      let loaded = false;
      try { loaded = loadGame(); } catch (e) {}
      if (!loaded) {
        resetGame();
      } else {
        WaveStateMachine.start(wave);
        generateCollectibles();
        updateUI();
      }
      updateDifficulty();
      requestAnimationFrame(gameLoop);
      setInterval(pollGamepad, 50);
      
      console.log('%cODPAR PREMIUM v4.0 ULTIMATE', 'color:#FFD700;font-size:20px;font-weight:bold');
      console.log('%c9 Climas | 9 Enemigos | 9 Zonas | 22 Power-ups | 25 Logros | Audio Manager | Timer Manager | Particle Pool | Delta Time | Guardado v4', 'color:#00ffcc;font-size:11px');
      console.log('Debug: P para pausa, F1 para debug overlay');
    })();
  </script>
