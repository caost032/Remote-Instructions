<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ODPAR PREMIUM v4.0 ULTIMATE</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      
    
    }
    
    body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      height: 100vh;
      font-family: 'Press Start 2P', 'Courier New', monospace;
    }
    
    .display {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at 30% 20%, #0a0f1a, #000000);
      perspective: 1000px;
    }
    
    .pantalla {
      width: 100%;
      max-width: 560px;
      height: 60vh;
      max-height: 520px;
      background: transparent;
      perspective: 800px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      position: relative;
    }
    
    canvas {
      image-rendering: pixelated;
      width: 85%;
      height: 85%;
      max-width: 560px;
      max-height: 560px;
      transform: rotateX(40deg);
      transition: transform 1s ease-out;
    }
    
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      pointer-events: none;
      z-index: 10;
      gap: 4px;
    }
    
    .hud-item {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 3px 7px;
      border-radius: 4px;
      min-width: 80px;
      text-align: right;
      white-space: nowrap;
    }
    
    #scoreDisplay {
      display: flex;
      gap: 10px;
    }
    
    .botones {
      width: 100%;
      max-width: 560px;
      height: 50%;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5px;
    }
    
    .centerbotones {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      max-width: 400px;
      gap: 3%;
    }
    
    .fila-botones {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 30%;
      gap: 4%;
      background: transparent;
    }
    
    .boton {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 28%;
      height: 100%;
      background: #0a0f1a;
      border-bottom: solid lightcyan 8px;
      border-radius: 20%;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
      transition: all 0.05s linear;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-touch-callout: none;
    }
    
    .boton.activo {
      transform: translateY(4px);
      border-bottom-width: 4px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      background: #1a2a3a;
    }
    
    .boton svg {
      width: 65%;
      height: 65%;
      fill: #bbffff;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
      pointer-events: none;
    }
    
    .boton.vacio {
      background: transparent;
      border: none;
      box-shadow: none;
      pointer-events: none;
      cursor: default;
    }
    
    .boton.vacio svg {
      display: none;
    }
    
    @media (max-width: 550px) {
      .hud-item {
        font-size: 7px;
        padding: 2px 5px;
      }
      
      .boton {
        width: 27%;
        border-bottom-width: 6px;
      }
    }
  </style>
</head>

      // ═══════════════════════════════════════
      // AUDIO MANAGER
      // ═══════════════════════════════════════
      class AudioManager {
        constructor() {
          try {
            this.ctx = new(window.AudioContext || window.webkitAudioContext)();
          } catch (e) { this.ctx = null; }
          if (!this.ctx) { this.isSuspended = true; return; }
          this.masterGain = this.ctx.createGain();
          this.masterGain.gain.value = 0.5;
          this.masterGain.connect(this.ctx.destination);
          this.activeOscillators = [];
          this.ambientNodes = {};
          this._masterFilter = null;
          this.isSuspended = true;
        }
        resume() {
          if (!this.ctx) return Promise.resolve();
          if (this.ctx.state === 'suspended') return this.ctx.resume().then(() => { this.isSuspended = false; });
          this.isSuspended = false;
          return Promise.resolve();
        }
        playSfx(freq, durationMs, type = 'square', volume = 0.3, delayMs = 0) {
          if (this.isSuspended || !this.ctx) return;
          try {
            const now = this.ctx.currentTime + delayMs / 1000;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(Math.max(10, freq), now);
            gain.gain.setValueAtTime(volume, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + Math.max(0.01, durationMs / 1000));
            osc.connect(gain);
            gain.connect(this.masterGain);
            osc.start(now);
            osc.stop(now + durationMs / 1000 + 0.05);
            this.activeOscillators.push({ osc, gain });
            setTimeout(() => { this.activeOscillators = this.activeOscillators.filter(o => o.osc !== osc); }, durationMs + delayMs + 300);
          } catch (e) {}
        }
        generateNoiseBuffer(noiseType = 'white', durationSec = 2) {
          if (!this.ctx) return null;
          const bufferSize = this.ctx.sampleRate * durationSec;
          const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            if (noiseType === 'white') data[i] = Math.random() * 2 - 1;
            else if (noiseType === 'pink') data[i] = (Math.random() + Math.random() + Math.random()) / 3 * 2 - 1;
            else data[i] = ((i > 0 ? data[i - 1] : 0) + Math.random() * 0.2 - 0.1) * 0.98;
          }
          return buffer;
        }
        playAmbient(name, volume = 0.1, noiseType = 'white') {
          if (this.isSuspended || !this.ctx) return;
          this.stopAmbient(name, 0);
          try {
            const buffer = this.generateNoiseBuffer(noiseType, 3);
            if (!buffer) return;
            const source = this.ctx.createBufferSource();
            const gain = this.ctx.createGain();
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800;
            source.buffer = buffer;
            source.loop = true;
            gain.gain.setValueAtTime(0, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(volume, this.ctx.currentTime + 1);
            source.connect(filter);
            filter.connect(gain);
            gain.connect(this.masterGain);
            source.start();
            this.ambientNodes[name] = { source, gain, filter };
          } catch (e) {}
        }
        stopAmbient(name, fadeMs = 1000) {
          const node = this.ambientNodes[name];
          if (!node || !this.ctx) return;
          try {
            const endTime = this.ctx.currentTime + fadeMs / 1000;
            node.gain.gain.linearRampToValueAtTime(0, endTime);
            setTimeout(() => { try { node.source.stop(); } catch (e) {} delete this.ambientNodes[name]; }, fadeMs + 100);
          } catch (e) { delete this.ambientNodes[name]; }
        }
        setFilter(type, frequency, Q = 1) {
          if (!this.ctx) return;
          try {
            if (!this._masterFilter) {
              this._masterFilter = this.ctx.createBiquadFilter();
              this.masterGain.disconnect();
              this.masterGain.connect(this._masterFilter);
              this._masterFilter.connect(this.ctx.destination);
            }
            this._masterFilter.type = type;
            this._masterFilter.frequency.linearRampToValueAtTime(frequency, this.ctx.currentTime + 0.5);
            this._masterFilter.Q.value = Q;
          } catch (e) {}
        }
        clearFilter() {
          if (!this.ctx || !this._masterFilter) return;
          try {
            this.masterGain.disconnect();
            this._masterFilter.disconnect();
            this.masterGain.connect(this.ctx.destination);
            this._masterFilter = null;
          } catch (e) {}
        }
        vibrate(pattern) {
          if (navigator.vibrate && AccessibilityOptions.vibrationEnabled)
          try { navigator.vibrate(pattern); } catch(e) {};
        }
        stopAll() {
          this.activeOscillators.forEach(o => { try { o.osc.stop(); } catch (e) {} });
          this.activeOscillators = [];
          Object.keys(this.ambientNodes).forEach(n => this.stopAmbient(n, 0));
          this.clearFilter();
        }
      }

      // ═══════════════════════════════════════

      class TimerManager {
        constructor() { this.timers = []; }
        add(callback, delayMs) {
          const timer = { callback, delay: delayMs, elapsed: 0, done: false, id: Math.random() + Date.now() };
          this.timers.push(timer);
          return timer.id;
        }
        cancel(id) { const t = this.timers.find(t => t.id === id); if (t) t.done = true; }
        update(dt) {
          for (let i = this.timers.length - 1; i >= 0; i--) {
            const t = this.timers[i];
            if (t.done) { this.timers.splice(i, 1); continue; }
            t.elapsed += dt * 1000;
            if (t.elapsed >= t.delay) { try { t.callback(); } catch (e) { console.warn('Timer err:', e); } t.done = true; }
          }
        }
        clearAll() { this.timers = []; }

      class ParticlePool {
        constructor(maxSize) {
          this.pool = [];
          this.active = [];
          for (let i = 0; i < maxSize; i++)
            this.pool.push({ x: 0, y: 0, vx: 0, vy: 0, life: 0, color: '#fff', size: 2, type: 'square', gravity: 0.05 });
        }
        spawn(x, y, color, type = 'square', count = 1, sizeBoost = 1) {
          for (let i = 0; i < count; i++) {
            const p = this.pool.pop();
            if (!p) return;
            p.x = x;
            p.y = y;
            p.vx = (Math.random() - 0.5) * 5;
            p.vy = (Math.random() - 0.5) * 5 - 2;
            p.life = 1;
            p.color = color;
            p.size = (Math.random() * 5 + 2) * sizeBoost;
            p.type = type;
            p.gravity = 0.05;
            this.active.push(p);
          }
        }
        updateAndDraw(ctx) {
          for (let i = this.active.length - 1; i >= 0; i--) {
            const p = this.active[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += p.gravity;
            p.life -= 0.02;
            if (p.life <= 0) {
              this.pool.push(p);
              this.active.splice(i, 1);
              continue;
            }
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            if (p.type === 'square') ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            else {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          }
        }
        clear() {
          this.active.forEach(p => this.pool.push(p));
          this.active = [];
        }
      }

      function deepClone(obj) {
        try { return JSON.parse(JSON.stringify(obj)); } catch (e) { return {}; }
      }
      
      function initWeatherParticles(weather) {
        if (!weather || !weather.particles) return;
        const p = weather.particles;
        const count = p.count || 60;
        switch (p.type) {
          case "rain":
            weather._drops = Array.from({ length: count }, () => ({
              x: Math.random() * CANVAS_SIZE,
              y: Math.random() * CANVAS_SIZE,
              speed: (p.speed?.min || 6) + Math.random() * ((p.speed?.max || 12) - (p.speed?.min || 6)),
              length: (p.length?.min || 8) + Math.random() * ((p.length?.max || 15) - (p.length?.min || 8)),
              opacity: (p.opacity?.min || 0.1) + Math.random() * ((p.opacity?.max || 0.3) - (p.opacity?.min || 0.1))
            }));
            break;
          case "snow":
            weather._flakes = Array.from({ length: count }, () => ({
              x: Math.random() * CANVAS_SIZE,
              y: Math.random() * CANVAS_SIZE,
              speed: (p.speed?.min || 0.5) + Math.random() * ((p.speed?.max || 2) - (p.speed?.min || 0.5)),
              size: (p.size?.min || 2) + Math.random() * ((p.size?.max || 6) - (p.size?.min || 2)),
              opacity: (p.opacity?.min || 0.3) + Math.random() * ((p.opacity?.max || 0.6) - (p.opacity?.min || 0.3)),
              drift: (Math.random() - 0.5) * 0.5
            }));
            break;
          case "stars":
            weather._stars = Array.from({ length: count }, () => ({
              x: Math.random() * CANVAS_SIZE,
              y: Math.random() * CANVAS_SIZE,
              size: (p.size?.min || 1) + Math.random() * ((p.size?.max || 2.5) - (p.size?.min || 1)),
              twinkle: Math.random() * Math.PI * 2,
              speed: (p.speed?.min || 0.02) + Math.random() * ((p.speed?.max || 0.08) - (p.speed?.min || 0.02))
            }));
            break;
          case "fog":
            weather._fogParticles = Array.from({ length: count }, () => ({
              x: Math.random() * CANVAS_SIZE,
              y: 200 + Math.random() * 200,
              size: (p.size?.min || 40) + Math.random() * ((p.size?.max || 120) - (p.size?.min || 40)),
              speed: (p.speed?.min || 0.3) + Math.random() * ((p.speed?.max || 0.7) - (p.speed?.min || 0.3)),
              opacity: (p.opacity?.min || 0.03) + Math.random() * ((p.opacity?.max || 0.06) - (p.opacity?.min || 0.03))
            }));
            break;
          default:
            weather._genericParticles = Array.from({ length: count }, () => ({
              x: Math.random() * CANVAS_SIZE,
              y: Math.random() * CANVAS_SIZE,
              vx: (Math.random() - 0.5) * 1.5,
              vy: -(0.3 + Math.random() * 1.2),
              size: 1.5 + Math.random() * 2,
              opacity: (p.opacity?.min || 0.1) + Math.random() * ((p.opacity?.max || 0.4) - (p.opacity?.min || 0.1)),
              life: 100 + Math.random() * 200,
              color: p.type === "fireflies" ? "#ff4400" : "#ff88ff"
            }));
        }
      }
      
      function updateWeatherParticles(weather, dt, fadeAlpha) {
        if (!weather || !weather.particles) return;
        switch (weather.particles.type) {
          case "rain":
            if (!weather._drops) initWeatherParticles(weather);
            if (!weather._drops) return;
            for (let d of weather._drops) {
              d.y += d.speed * dt * 60;
              d.x -= d.speed * 0.2 * dt * 60;
              if (d.y > CANVAS_SIZE + 20) {
                d.y = -20;
                d.x = Math.random() * (CANVAS_SIZE + 20);
              }
              if (d.x < -20) d.x = CANVAS_SIZE + 20;
              d.currentOpacity = d.opacity * fadeAlpha;
            }
            break;
          case "snow":
            if (!weather._flakes) initWeatherParticles(weather);
            if (!weather._flakes) return;
            for (let fl of weather._flakes) {
              fl.y += fl.speed * dt * 60;
              fl.x += (fl.drift + Math.sin(Date.now() * 0.001 + fl.x * 0.1) * 0.3) * dt * 60;
              if (fl.y > CANVAS_SIZE + 10) {
                fl.y = -10;
                fl.x = Math.random() * CANVAS_SIZE;
              }
              fl.currentOpacity = fl.opacity * fadeAlpha;
            }
            break;
          case "stars":
            if (!weather._stars) initWeatherParticles(weather);
            if (!weather._stars) return;
            for (let st of weather._stars) {
              st.twinkle += st.speed * dt * 60;
              st.currentAlpha = (0.3 + Math.sin(st.twinkle) * 0.3 + 0.3) * fadeAlpha;
            }
            break;
          case "fog":
            if (!weather._fogParticles) initWeatherParticles(weather);
            if (!weather._fogParticles) return;
            for (let fg of weather._fogParticles) {
              fg.x += fg.speed * dt * 60;
              if (fg.x > CANVAS_SIZE + fg.size) fg.x = -fg.size;
              fg.currentOpacity = fg.opacity * fadeAlpha;
            }
            break;
          default:
            if (!weather._genericParticles) initWeatherParticles(weather);
            if (!weather._genericParticles) return;
            for (let gp of weather._genericParticles) {
              gp.x += gp.vx * dt * 60;
              gp.y += gp.vy * dt * 60;
              gp.life -= dt * 60;
              if (gp.y < -20 || gp.life <= 0) {
                gp.y = CANVAS_SIZE + Math.random() * 20;
                gp.x = Math.random() * CANVAS_SIZE;
                gp.life = 100 + Math.random() * 200;
              }
              gp.currentOpacity = gp.opacity * fadeAlpha * Math.min(1, gp.life / 100);
            }
        }
      }
      
      function applyWeather(type) {
        if (!WEATHER_TYPES[type]) type = "none";
        if (currentWeather && currentWeather.name === WEATHER_TYPES[type].name) return;
        previousWeather = currentWeather ? deepClone(currentWeather) : null;
        if (previousWeather && previousWeather.particles) initWeatherParticles(previousWeather);
        currentWeather = deepClone(WEATHER_TYPES[type]);
        weatherTransition = 0;
        weatherTransitionTimer = WEATHER_CONFIG.transitionDuration;
        if (currentWeather.particles) initWeatherParticles(currentWeather);
        // contadores
        if (type === "rain") totalRainWaves++;
        if (type === "eclipse") totalEclipseWaves++;
        if (type === "thunderstorm") totalThunderstormWaves++;
        if (type === "snow") totalSnowWaves++;
        if (type === "fog") totalFogWaves++;
        if (type === "nebula") totalNebulaWaves++;
        if (type === "inferno") totalInfernoWaves++;
        // audio ambiental
        ['rain_loop', 'snow_wind', 'wind_loop'].forEach(n => audioManager.stopAmbient(n));
        if (currentWeather.soundscape?.ambientLoop) {
          audioManager.playAmbient(currentWeather.soundscape.ambientLoop, currentWeather.soundscape.ambientVolume || 0.12, 'white');
        }
        if (type === 'eclipse') audioManager.setFilter('lowpass', 600);
        else audioManager.clearFilter();
      }
      
      function updateWeather(dt) {
        if (weatherTransitionTimer > 0) {
          weatherTransition = Math.min(1, weatherTransition + (dt * 1000) / WEATHER_CONFIG.transitionDuration);
          weatherTransitionTimer -= dt * 1000;
        }
        if (currentWeather) updateWeatherParticles(currentWeather, dt, weatherTransition);
        if (previousWeather && previousWeather.particles) {
          updateWeatherParticles(previousWeather, dt, Math.max(0, 1 - weatherTransition));
          if (weatherTransition >= 1) previousWeather = null;
        }
        if (currentWeather?.soundscape?.randomSounds) {
          for (let rs of currentWeather.soundscape.randomSounds) {
            if (Math.random() < (rs.probability || 0) * dt * 60 && SPECIAL_SOUNDS[rs.sound]) {
              SPECIAL_SOUNDS[rs.sound]();
            }
          }
        }
      }
      
      function drawWeatherParticlesOfType(weather, alpha) {
        if (!weather || !weather.particles) return;
        const ctx2 = ctx;
        switch (weather.particles.type) {
          case "rain":
            if (!weather._drops) return;
            ctx2.save();
            for (let d of weather._drops) {
              const op = (d.currentOpacity || 0) * alpha;
              if (op <= 0) continue;
              ctx2.strokeStyle = `rgba(100,180,255,${op})`;
              ctx2.lineWidth = 1;
              ctx2.beginPath();
              ctx2.moveTo(d.x, d.y);
              ctx2.lineTo(d.x + (d.length || 10) * 0.3, d.y + (d.length || 10));
              ctx2.stroke();
            }
            ctx2.restore();
            break;
          case "snow":
            if (!weather._flakes) return;
            ctx2.save();
            for (let fl of weather._flakes) {
              const op = (fl.currentOpacity || 0) * alpha;
              if (op <= 0) continue;
              ctx2.fillStyle = `rgba(255,255,255,${op})`;
              ctx2.beginPath();
              ctx2.arc(fl.x, fl.y, fl.size || 3, 0, Math.PI * 2);
              ctx2.fill();
            }
            ctx2.restore();
            break;
          case "stars":
            if (!weather._stars) return;
            ctx2.save();
            for (let st of weather._stars) {
              const op = (st.currentAlpha || 0) * alpha;
              if (op <= 0) continue;
              ctx2.fillStyle = `rgba(255,255,220,${op})`;
              ctx2.beginPath();
              ctx2.arc(st.x, st.y, st.size || 1.5, 0, Math.PI * 2);
              ctx2.fill();
            }
            ctx2.restore();
            break;
          case "fog":
            if (!weather._fogParticles) return;
            ctx2.save();
            for (let fg of weather._fogParticles) {
              const op = (fg.currentOpacity || 0) * alpha;
              if (op <= 0) continue;
              const grd = ctx2.createRadialGradient(fg.x, fg.y, fg.size * 0.3, fg.x, fg.y, fg.size);
              grd.addColorStop(0, `rgba(200,210,230,${op})`);
              grd.addColorStop(1, 'rgba(200,210,230,0)');
              ctx2.fillStyle = grd;
              ctx2.fillRect(fg.x - fg.size, fg.y - fg.size, fg.size * 2, fg.size * 2);
            }
            ctx2.restore();
            break;
          default:
            if (!weather._genericParticles) return;
            ctx2.save();
            for (let gp of weather._genericParticles) {
              const op = (gp.currentOpacity || 0) * alpha;
              if (op <= 0) continue;
              ctx2.fillStyle = `rgba(${gp.color==="#ff4400"?"255,68,0":"255,136,255"},${op})`;
              ctx2.beginPath();
              ctx2.arc(gp.x, gp.y, gp.size || 2, 0, Math.PI * 2);
              ctx2.fill();
            }
            ctx2.restore();
        }
      }
      
      function drawWeather() {
        const t = weatherTransition;
        const cw = currentWeather || WEATHER_TYPES.none;
        const pw = previousWeather;
        // vignette
        if (cw.lighting?.vignette > 0) {
          const center = CANVAS_SIZE / 2;
          const grad = ctx.createRadialGradient(center, center, center * 0.7, center, center, center * 1.1);
          grad.addColorStop(0, 'transparent');
          grad.addColorStop(1, `rgba(0,0,0,${cw.lighting.vignette*t})`);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        }
        // luz ambiental
        if (cw.lighting?.ambientAlpha > 0) {
          ctx.fillStyle = cw.lighting.ambientColor || '#000000';
          ctx.globalAlpha = (cw.lighting.ambientAlpha || 0) * t;
          ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
          ctx.globalAlpha = 1;
        }
        // flash relámpago (respeta accesibilidad)
        if (!AccessibilityOptions.reduceFlashes && cw.lighting?.flashFrequency > 0 && Math.random() < cw.lighting.flashFrequency) {
          ctx.fillStyle = cw.lighting.flashColor || '#ffffff';
          ctx.globalAlpha = 0.5;
          ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
          ctx.globalAlpha = 1;
        }
        // partículas previous (fade out)
        if (pw && pw.particles && t < 1) drawWeatherParticlesOfType(pw, Math.max(0, 1 - t));
        // partículas current (fade in)
        if (cw.particles) drawWeatherParticlesOfType(cw, t);
      }
      
      function updateWeatherSchedule(wv) {
        let best = null,
          bestPriority = -1;
        for (let rule of WEATHER_SCHEDULE) {
          let priority = 0,
            matched = false;
          if (rule.wave !== undefined && rule.wave === wv) {
            priority = 10;
            matched = true;
          }
          else if (rule.from !== undefined && wv >= rule.from && wv <= rule.to) {
            priority = 5;
            matched = true;
          }
          else if (rule.every !== undefined && wv % rule.every === 0) {
            priority = 3;
            matched = true;
          }
          if (matched && priority > bestPriority) {
            bestPriority = priority;
            best = rule;
          }
        }
        if (best) {
          let type = best.type;
          if (best.randomPool) type = best.randomPool[Math.floor(Math.random() * best.randomPool.length)];
          applyWeather(type);
          if (best.duration) {
            timers.add(() => {
              if (currentWeather?.name === WEATHER_TYPES[type]?.name) applyWeather(WEATHER_CONFIG.defaultWeather);
            }, best.duration * 30000);
          }
        } else if (wv > 20 && Math.random() < 0.25) {
          const pool = ["snow", "fog", "nebula", "rain", "eclipse", "inferno"];
          applyWeather(pool[Math.floor(Math.random() * pool.length)]);
        }
      }
      // ═══════════════════════════════════════
      // TIPOS DE ENEMIGOS
      // ═══════════════════════════════════════
      const ENEMY_CONFIG = {
        baseSpeedNormal: 0.058,
        baseSpeedBoss: 0.065,
        maxSpeedCap: 0.18,
        defaultAlertTimeMs: 420,
        bossAlertTimeMs: 700,
        barraVidaMaxDist: 5
      };
      
      const ENEMY_TYPES = {
        grunt: { name: "Soldado", size: 1, speedMultiplier: 1, health: 1, color: "#ff6644", scoreValue: 10, pattern: "linear", boss: false, visualEffect: "none" },
        runner: { name: "Corredor", size: 1, speedMultiplier: 1.6, health: 1, color: "#ffff44", scoreValue: 20, pattern: "linear", boss: false, visualEffect: "trail", abilities: ["dash"] },
        tank: { name: "Tanque", size: 2, speedMultiplier: 0.6, health: 3, color: "#888888", scoreValue: 50, pattern: "linear", boss: false, visualEffect: "glow", immuneTo: ["freeze", "timeSlow"] },
        ghost: { name: "Fantasma", size: 1, speedMultiplier: 1.2, health: 1, color: "#aaddff", scoreValue: 30, pattern: "homing", boss: false, visualEffect: "pulse", abilities: ["phase"] },
        exploder: { name: "Explosivo", size: 1, speedMultiplier: 0.9, health: 1, color: "#ff4400", scoreValue: 25, pattern: "linear", boss: false, visualEffect: "blink", onDefeat: "explosion" },
        splitter: { name: "Divisor", size: 2, speedMultiplier: 0.7, health: 2, color: "#cc00cc", scoreValue: 60, pattern: "sine", boss: false, visualEffect: "none", onDefeat: "spawnMinions", onDefeatParams: { minionType: "grunt", count: 2 } },
        boss: {
          name: "Jefe",
          size: 2,
          speedMultiplier: 1,
          health: 4,
          color: "#ff77ff",
          scoreValue: 200,
          pattern: "linear",
          boss: true,
          visualEffect: "boss",
          onDefeat: "dropPowerUp",
          onDefeatParams: { powerUpType: "magnetEpic" },
          phases: [{ healthPercent: 1.0, pattern: "linear", speedMult: 1 }, { healthPercent: 0.5, pattern: "zigzag", speedMult: 1.3 }, { healthPercent: 0.25, pattern: "homing", speedMult: 1.6 }]
        },
        hunter: { name: "Cazador", size: 1, speedMultiplier: 1.1, health: 2, color: "#ff0000", scoreValue: 40, pattern: "homing", boss: false, visualEffect: "trail" },
        staticEnemy: { name: "Estático", size: 1, speedMultiplier: 1, health: 1, color: "#00ffff", scoreValue: 15, pattern: "randomWalk", boss: false, visualEffect: "glitch" }
      };
      
      class Enemy {
        constructor(typeKey, dir) {
          const type = ENEMY_TYPES[typeKey] || ENEMY_TYPES.grunt;
          this.type = typeKey;
          this.name = type.name;
          this.dir = dir;
          this.sizeMultiplier = type.size || 1;
          this.health = type.health || 1;
          this.maxHealth = type.health || 1;
          this.color = type.color || "#ff6644";
          this.scoreValue = type.scoreValue || 10;
          this.pattern = type.pattern || "linear";
          this.patternParams = type.patternParams || {};
          this.abilities = [...(type.abilities || [])];
          this.onDefeat = type.onDefeat || "none";
          this.onDefeatParams = type.onDefeatParams || {};
          this.immuneTo = [...(type.immuneTo || [])];
          this.visualEffect = type.visualEffect || "none";
          this.boss = type.boss || false;
          this.phases = type.phases || null;
          this.currentPhase = 0;
          this.frozen = false;
          this.slowApplied = false;
          this.progress = 0;
          this.offsetX = 0;
          this.offsetY = 0;
          this._lastRecalc = 0;
          this._rwTimer = 0;
          this._rwAngle = 0;
          this._burstCooldown = 0;
          this._dashCd = 0;
          this.speed = (type.boss ? ENEMY_CONFIG.baseSpeedBoss : ENEMY_CONFIG.baseSpeedNormal) * (type.speedMultiplier || 1);
          
          const maxIndex = GRID_SIZE - (this.sizeMultiplier - 1);
          if (dir === 'down') {
            this.x = Math.floor(Math.random() * maxIndex);
            this.y = -(this.sizeMultiplier - 1);
          }
          else if (dir === 'up') {
            this.x = Math.floor(Math.random() * maxIndex);
            this.y = GRID_SIZE;
          }
          else if (dir === 'right') {
            this.y = Math.floor(Math.random() * maxIndex);
            this.x = -(this.sizeMultiplier - 1);
          }
          else {
            this.y = Math.floor(Math.random() * maxIndex);
            this.x = GRID_SIZE;
          }
        }
        
        update(dt) {
          if (this.frozen) return;
          // fases del boss
          if (this.phases && this.health < this.maxHealth) {
            for (let i = this.phases.length - 1; i >= 0; i--) {
              if (this.health / this.maxHealth <= this.phases[i].healthPercent) {
                if (this.currentPhase !== i) {
                  this.currentPhase = i;
                  this.pattern = this.phases[i].pattern;
                  this.speed = ENEMY_CONFIG.baseSpeedBoss * (ENEMY_TYPES[this.type]?.speedMultiplier || 1) * this.phases[i].speedMult;
                }
                break;
              }
            }
          }
          let spd = this.speed;
          if (currentWeather?.enemyModifiers?.speedMultiplier) spd *= currentWeather.enemyModifiers.speedMultiplier;
          if (this.slowApplied) spd *= 0.4;
          this.progress += spd * dt * 60;
          
          switch (this.pattern) {
            case "linear":
              if (this.dir === 'down') this.y = -(this.sizeMultiplier - 1) + this.progress;
              else if (this.dir === 'up') this.y = GRID_SIZE - this.progress;
              else if (this.dir === 'right') this.x = -(this.sizeMultiplier - 1) + this.progress;
              else this.x = GRID_SIZE - this.progress;
              break;
            case "zigzag": {
              const amp = 2,
                freq = 0.1;
              const shift = Math.sin(this.progress * freq) * amp * dt * 60;
              if (this.dir === 'down') {
                this.y = -(this.sizeMultiplier - 1) + this.progress;
                this.x += shift;
              }
              else if (this.dir === 'up') {
                this.y = GRID_SIZE - this.progress;
                this.x += shift;
              }
              else if (this.dir === 'right') {
                this.x = -(this.sizeMultiplier - 1) + this.progress;
                this.y += shift;
              }
              else {
                this.x = GRID_SIZE - this.progress;
                this.y += shift;
              }
              break;
            }
            case "sine": {
              const amp = 1.5,
                freq = 0.05;
              this.offsetX = Math.sin(this.progress * freq) * amp;
              if (this.dir === 'down') this.y = -(this.sizeMultiplier - 1) + this.progress;
              else if (this.dir === 'up') this.y = GRID_SIZE - this.progress;
              else if (this.dir === 'right') this.x = -(this.sizeMultiplier - 1) + this.progress;
              else this.x = GRID_SIZE - this.progress;
              break;
            }
            case "homing": {
              if (Date.now() - this._lastRecalc > 300) {
                let tx = player.x,
                  ty = player.y;
                if (window.decoys?.length > 0 && !this.boss) {
                  let cd = Infinity;
                  for (let dec of window.decoys) {
                    const d = Math.abs(dec.x - this.x) + Math.abs(dec.y - this.y);
                    if (d < cd) {
                      cd = d;
                      tx = dec.x;
                      ty = dec.y;
                    }
                  }
                }
                const dx = tx - this.x,
                  dy = ty - this.y,
                  dist = Math.sqrt(dx * dx + dy * dy) || 1;
                this._targetX = this.x + dx / dist;
                this._targetY = this.y + dy / dist;
                this._lastRecalc = Date.now();
              }
              if (this._targetX !== undefined) {
                const turn = 0.03;
                this.x += (this._targetX - this.x) * turn * dt * 60;
                this.y += (this._targetY - this.y) * turn * dt * 60;
              }
              break;
            }
            case "randomWalk": {
              if (this._rwTimer <= 0) {
                this._rwAngle = Math.random() * Math.PI * 2;
                this._rwTimer = 500 + Math.random() * 500;
              }
              this._rwTimer -= dt * 1000;
              this.x += Math.cos(this._rwAngle) * spd * 0.5 * dt * 60;
              this.y += Math.sin(this._rwAngle) * spd * 0.5 * dt * 60;
              break;
            }
          }
          // habilidades
          if (this.abilities.includes('dash')) {
            this._dashCd -= dt * 1000;
            if (this._dashCd <= 0) {
              this.progress += spd * 3;
              this._dashCd = 4000;
            }
          }
        }
        
        getOccupiedCells() {
          const cells = [],
            cx = Math.round(this.x + this.offsetX),
            cy = Math.round(this.y + this.offsetY);
          for (let dx = 0; dx < this.sizeMultiplier; dx++)
            for (let dy = 0; dy < this.sizeMultiplier; dy++)
              cells.push({ x: cx + dx, y: cy + dy });
          return cells;
        }
        
        isOffScreen() {
          const margin = (this.sizeMultiplier - 1) + 0.8;
          if (this.dir === 'down') return this.y > GRID_SIZE + margin;
          if (this.dir === 'up') return this.y < -margin;
          if (this.dir === 'right') return this.x > GRID_SIZE + margin;
          return this.x < -margin;
        }
        
        draw() {
          const offX = this.sizeMultiplier === 2 ? CELL_SIZE / 2 : 0,
            offY = this.sizeMultiplier === 2 ? CELL_SIZE / 2 : 0;
          const px = (this.x + this.offsetX) * CELL_SIZE + CELL_SIZE / 2 + offX;
          const py = (this.y + this.offsetY) * CELL_SIZE + CELL_SIZE / 2 + offY;
          const size = this.boss ? CELL_SIZE * 1.35 : CELL_SIZE * 0.6;
          
          ctx.save();
          // efectos visuales
          if (this.visualEffect === "trail") {
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(px - this.dirX() * 8, py - this.dirY() * 8, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
          if (this.visualEffect === "glow") {
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 12;
          }
          if (this.visualEffect === "pulse") { ctx.globalAlpha = Math.sin(Date.now() * 0.005) * 0.2 + 0.8; }
          if (this.visualEffect === "blink") { ctx.globalAlpha = Math.sin(Date.now() * 0.01) > 0 ? 1 : 0.3; }
          if (this.visualEffect === "glitch") {
            const off = (Math.random() - 0.5) * 4;
            ctx.translate(off, 0);
          }
          
          let angle = 0;
          if (this.dir === 'up') angle = 0;
          if (this.dir === 'right') angle = Math.PI / 2;
          if (this.dir === 'down') angle = Math.PI;
          if (this.dir === 'left') angle = -Math.PI / 2;
          
          ctx.translate(px, py);
          ctx.rotate(angle);
          const tipY = -size * 0.85,
            baseY = size * 0.5,
            baseX = size * 0.65;
          ctx.beginPath();
          ctx.moveTo(0, tipY);
          ctx.lineTo(-baseX, baseY);
          ctx.lineTo(baseX, baseY);
          ctx.closePath();
          ctx.lineWidth = this.boss ? 2.5 : 2;
          ctx.strokeStyle = this.color;
          ctx.stroke();
          
          // orbitas boss
          if (this.visualEffect === "boss") {
            const orbitAngle = Date.now() * 0.004;
            for (let i = 0; i < 3; i++) {
              const a = orbitAngle + i * Math.PI * 2 / 3;
              ctx.fillStyle = 'rgba(255,255,100,0.7)';
              ctx.beginPath();
              ctx.arc(Math.cos(a) * size * 1.2, Math.sin(a) * size * 1.2, 3, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.restore();
          
          // barra de vida
          if (this.maxHealth > 1) {
            const dist = Math.abs(this.x - player.x) + Math.abs(this.y - player.y);
            if (dist < ENEMY_CONFIG.barraVidaMaxDist) {
              const bw = CELL_SIZE * 0.6,
                bh = 4;
              const bx = px - bw / 2,
                by = py - size - 10;
              ctx.fillStyle = '#440000';
              ctx.fillRect(bx, by, bw, bh);
              ctx.fillStyle = '#00ff44';
              ctx.fillRect(bx, by, bw * (this.health / this.maxHealth), bh);
            }
          }
        }
        
        dirX() { return this.dir === 'right' ? 1 : this.dir === 'left' ? -1 : 0; }
        dirY() { return this.dir === 'down' ? 1 : this.dir === 'up' ? -1 : 0; }
        
        handleDefeat() {
          switch (this.onDefeat) {
            case "explosion":
              createExplosion(this.x * CELL_SIZE, this.y * CELL_SIZE, 40, '#ff8800', 1.5);
              // daño a enemigos cercanos
              enemies = enemies.filter(e => {
                if (e === this) return true;
                const d = Math.abs(e.x - this.x) + Math.abs(e.y - this.y);
                if (d < 2) { score += e.scoreValue; return false; }
                return true;
              });
              break;
            case "spawnMinions":
              for (let i = 0; i < (this.onDefeatParams.count || 2); i++) {
                const dirs = ['down', 'up', 'left', 'right'];
                timers.add(() => { spawnEnemy(this.onDefeatParams.minionType || 'grunt', dirs[Math.floor(Math.random() * 4)]); }, i * 400);
              }
              break;
            case "dropPowerUp":
              generatePowerUpsAt(Math.round(this.x), Math.round(this.y), this.onDefeatParams.powerUpType);
              break;
          }
          if (this.boss) totalBossesDefeated++;
          score += this.scoreValue;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('odparHighScore', highScore);
          }
          checkAchievements();
        }
      }
      
      function spawnEnemy(typeKey, dir) {
        const enemy = new Enemy(typeKey, dir);
        const type = ENEMY_TYPES[typeKey] || ENEMY_TYPES.grunt;
        const delay = (type.boss) ? ENEMY_CONFIG.bossAlertTimeMs : ENEMY_CONFIG.defaultAlertTimeMs;
        addWallAlert(dir, type.boss || type.size > 1, Math.floor(enemy.x), delay);
        if (type.size > 1) addWallAlert(dir, true, Math.floor(enemy.x) + 1, delay);
        timers.add(() => { if (!gameOver) enemies.push(enemy); }, delay);
      }
      
      function triggerBossWave() {
        if (gameOver) return;
        lastBossTime = Date.now();
        const dirs = ['down', 'up', 'left', 'right'];
        dirs.forEach((d, idx) => timers.add(() => { if (!gameOver) spawnEnemy('boss', d); }, idx * 380));
      }
      
      const ENEMY_SCHEDULE = [
        { wave: 1, enemies: [{ type: "grunt", count: 4 }], spawnInterval: 1500 },
        { wave: 5, enemies: [{ type: "grunt", count: 5 }, { type: "runner", count: 2 }], bosses: [{ type: "boss", count: 1, delay: 2000 }] },
        { from: 10, to: 15, enemies: [{ type: "splitter", count: 2 }, { type: "tank", count: 2 }], elites: [{ type: "ghost", count: 1 }] },
        { from: 16, to: 25, enemies: [{ type: "hunter", count: 2 }, { type: "runner", count: 3 }] },
        { from: 26, to: 99, enemies: [{ type: "boss", count: 1 }, { type: "tank", count: 2 }] }
      ];
      
      function getEnemyScheduleForWave(wv) {
        let best = null,
          bestPriority = -1;
        for (let rule of ENEMY_SCHEDULE) {
          let priority = 0,
            matched = false;
          if (rule.wave !== undefined && rule.wave === wv) {
            priority = 10;
            matched = true;
          }
          else if (rule.from !== undefined && wv >= rule.from && wv <= rule.to) {
            priority = 5;
            matched = true;
          }
          else if (rule.every !== undefined && rule.every > 0 && wv % rule.every === 0) {
            priority = 3;
            matched = true;
          }
          if (matched && priority > bestPriority) {
            bestPriority = priority;
            best = rule;
          }
        }
        return best;
      }
      
      const WaveStateMachine = {
        current: 'idle',
        schedule: null,
        start(wv) {
          this.schedule = getEnemyScheduleForWave(wv);
          this.current = this.schedule ? 'SCHEDULED' : 'DYNAMIC';
          if (this.current === 'SCHEDULED') this.executeSchedule();
        },
        executeSchedule() {
          if (!this.schedule) return;
          let delay = 0;
          if (this.schedule.enemies) {
            for (let entry of this.schedule.enemies) {
              for (let i = 0; i < entry.count; i++) {
                const dirs = ['down', 'up', 'left', 'right'],
                  dir = dirs[Math.floor(Math.random() * 4)];
                timers.add(() => { if (!gameOver) spawnEnemy(entry.type, dir); }, delay);
                delay += (this.schedule.spawnInterval || 1500) / entry.count;
              }
            }
          }
          if (this.schedule.bosses) {
            for (let entry of this.schedule.bosses) {
              for (let i = 0; i < entry.count; i++) {
                const dir = ['down', 'up', 'left', 'right'][i % 4];
                timers.add(() => { if (!gameOver) spawnEnemy(entry.type, dir); }, entry.delay || 0);
              }
            }
          }
          if (this.schedule.elites) {
            for (let entry of this.schedule.elites) {
              for (let i = 0; i < entry.count; i++) {
                const dir = ['down', 'up', 'left', 'right'][i % 4];
                timers.add(() => { if (!gameOver) spawnEnemy(entry.type, dir); }, delay);
                delay += 800;
              }
            }
          }
        }
      };
      
      // ═══════════════════════════════════════
      // ZONAS
      // ═══════════════════════════════════════
      const ZONE_CONFIG = {
        safeZone: { duration: 10000, color: "#00ffcc", innerColor: "#00ffff", cooldown: 5000, maxPerWave: 1, disabledByWeather: [], pulseSpeed: 70, icon: "ZS" },
        bonusZone: { duration: 10000, color: "#ffcc00", innerColor: "#ffaa00", pointsPerSecond: 4, maxPerWave: 3, cooldown: 5000, pulseSpeed: 60, icon: "B" },
        doubleBonusZone: { duration: 8000, color: "#ff00ff", innerColor: "#cc00cc", pointsPerSecond: 8, maxPerWave: 3, cooldown: 5000, requireEvaded: 8, requireScore: 150, pulseSpeed: 55, icon: "2x" },
        tripleBonusZone: { duration: 7000, color: "#FFD700", innerColor: "#00FFFF", pointsPerSecond: 12, maxPerWave: 2, cooldown: 5000, requirePremiumCollected: 3, requireBossEvaded: 2, pulseSpeed: 45, icon: "3x" },
        speedZone: { duration: 6000, color: "#ffff44", innerColor: "#aaaa00", maxPerWave: 2, cooldown: 2000, pulseSpeed: 65, icon: ">>" },
        shieldZone: { duration: 5000, color: "#aaddff", innerColor: "#6699cc", grantShieldOnEnter: true, maxPerWave: 2, cooldown: 5000, pulseSpeed: 70, icon: "!" },
        comboZone: { duration: 7000, color: "#ff88ff", innerColor: "#cc44cc", comboMultiplier: 2, maxPerWave: 2, cooldown: 5000, pulseSpeed: 60, icon: "x2" },
        freezeZone: { duration: 5000, color: "#8888ff", innerColor: "#4444aa", freezeEnemiesInRadius: 2, maxPerWave: 2, cooldown: 5000, pulseSpeed: 70, icon: "*" },
        ghostZone: { duration: 4000, color: "#aaaaff", innerColor: "#ffffff", passthrough: true, maxPerWave: 1, cooldown: 5000, pulseSpeed: 65, icon: "~" }
      };
      
      function generateZone(type) {
        const cfg = ZONE_CONFIG[type];
        if (!cfg) return;
        if (zones.filter(z => z.type === type).length >= cfg.maxPerWave) return;
        if (cfg.disabledByWeather && currentWeather && cfg.disabledByWeather.includes(currentWeather.name)) return;
        if (type === "doubleBonusZone" && (evadedSinceLastDoubleBonus < (cfg.requireEvaded || 0) || scoreSinceLastDoubleBonus < (cfg.requireScore || 0))) return;
        if (type === "tripleBonusZone" && (premiumCollectedSinceLastTripleBonus < (cfg.requirePremiumCollected || 0) || bossesEvadedSinceLastTripleBonus < (cfg.requireBossEvaded || 0))) return;
        let posX, posY, attempts = 0;
        do {
          posX = Math.floor(Math.random() * GRID_SIZE);
          posY = Math.floor(Math.random() * GRID_SIZE);
          attempts++;
        }
        while (attempts < 15 && zones.some(z => z.x === posX && z.y === posY));
        zones.push({ type, x: posX, y: posY, expires: Date.now() + cfg.duration, enteredTime: 0, _shieldGranted: false });
      }
      
      function updateZones(dt) {
        const now = Date.now();
        zones = zones.filter(z => z.expires > now);
        // Máximo total de zonas en pantalla
if (zones.length >= 2) return;
        for (let type in ZONE_CONFIG) {
          if (zoneTimers[type] === undefined) zoneTimers[type] = 0;
          zoneTimers[type] += dt * 1000;
          if (zoneTimers[type] >= (ZONE_CONFIG[type].cooldown || 200)) {
            if (Math.random() < 0.35) generateZone(type);
            zoneTimers[type] = 0;
          }
        }
        for (let z of zones) {
          const inZone = (player.x === z.x && player.y === z.y);
          // evolución bonusZone → doubleBonusZone
          if (z.type === "bonusZone" && inZone) {
            z.enteredTime += dt * 1000;
            if (z.enteredTime >= 3000) {
              z.type = "doubleBonusZone";
              z.expires = Date.now() + ZONE_CONFIG.doubleBonusZone.duration;
              z.enteredTime = 0;
              createFloatingText(z.x * CELL_SIZE + CELL_SIZE / 2, z.y * CELL_SIZE + CELL_SIZE / 2 - 20, "EVOLUCION!", true);
              playDoubleBonusCollect();
            }
          }
          // freeze zone
          if (z.type === "freezeZone") {
            const radius = ZONE_CONFIG.freezeZone.freezeEnemiesInRadius || 2;
            for (let enemy of enemies) {
              enemy.frozen = (Math.abs(enemy.x - z.x) + Math.abs(enemy.y - z.y) <= radius);
            }
          }
          // shield zone
          if (z.type === "shieldZone" && inZone && !z._shieldGranted) {
            z._shieldGranted = true;
            activeEffects.push({ type: 'shield', expires: Date.now() + 10000 });
            createFloatingText(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2 - 20, "ESCUDO", true);
            playSafeZoneEnter();
          }
          // puntos por segundo
          if ((z.type === "bonusZone" || z.type === "doubleBonusZone" || z.type === "tripleBonusZone") && inZone) {
            updateZoneScore(z, dt);
          }
        }
      }
      
      let zoneScoreAccumulator = 0;
      
      function updateZoneScore(z, dt) {
        zoneScoreAccumulator += dt;
        const cfg = ZONE_CONFIG[z.type];
        const pps = cfg.pointsPerSecond || 0;
        if (pps > 0 && zoneScoreAccumulator >= 1) {
          const secs = Math.floor(zoneScoreAccumulator);
          zoneScoreAccumulator -= secs;
          let pts = secs * pps;
          if (doublePointsActive) pts *= 2;
          score += pts;
          scoreSinceLastDoubleBonus += pts;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('odparHighScore', highScore);
          }
          updateUI();
          if (z.type === "bonusZone") playBonusCollect();
          if (z.type === "doubleBonusZone") playDoubleBonusCollect();
          if (z.type === "tripleBonusZone") playTripleBonusCollect();
          createFloatingText(player.x * CELL_SIZE + CELL_SIZE / 2, player.y * CELL_SIZE + CELL_SIZE / 2, pts, z.type === "tripleBonusZone", z.type === "tripleBonusZone");
        }
      }
      
      function drawZones() {
        for (let z of zones) {
          const cfg = ZONE_CONFIG[z.type];
          if (!cfg) continue;
          const px = z.x * CELL_SIZE + CELL_SIZE / 2,
            py = z.y * CELL_SIZE + CELL_SIZE / 2;
          const timeLeft = Math.max(0, z.expires - Date.now());
          const ratio = timeLeft / cfg.duration;
          const secs = Math.ceil(timeLeft / 1000);
          const pulse = Math.sin(Date.now() / cfg.pulseSpeed) * 0.15 + 0.88;
          ctx.save();
          ctx.globalAlpha = 0.5 * ratio;
          ctx.fillStyle = cfg.color;
          ctx.beginPath();
          ctx.arc(px, py, CELL_SIZE * 0.75 * pulse, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.8;
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(px, py, CELL_SIZE * 0.68, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = cfg.innerColor;
          ctx.beginPath();
          ctx.arc(px, py, CELL_SIZE * 0.45, 0, Math.PI * 2);
          ctx.fill();
          ctx.font = '900 22px "Press Start 2P",monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#ffffff';
          ctx.strokeStyle = '#003344';
          ctx.lineWidth = 3;
          ctx.strokeText(secs, px, py);
          ctx.fillText(secs, px, py);
          if (cfg.icon) {
            ctx.font = '700 8px "Press Start 2P",monospace';
            ctx.fillStyle = '#ffffffcc';
            ctx.fillText(`[${cfg.icon}]`, px, py + 14);
          }
          ctx.restore();
        }
      }
      
      function isInZone(type) { return zones.some(z => z.type === type && player.x === z.x && player.y === z.y); }
      
      function isInSafeZone() { return isInZone("safeZone"); }
      
      function isInGhostZone() { return isInZone("ghostZone"); }
      
      function isInSpeedZone() { return isInZone("speedZone"); }
      
      function adjustZonesToNewGrid(oldSize, newSize) {
        const ratio = newSize / oldSize;
        zones.forEach(z => {
          z.x = Math.min(newSize - 1, Math.floor(z.x * ratio));
          z.y = Math.min(newSize - 1, Math.floor(z.y * ratio));
        });
      }
      // ═══════════════════════════════════════

      // ═══════════════════════════════════════

      const POWERUP_TYPES = {

      const POWERUP_COMBOS = {
        "speed+magnetCommon": {
          apply: () => {
            messageCollectibles.filter(c => { const d = Math.abs(c.x - player.x) + Math.abs(c.y - player.y); return d <= 3; }).forEach(c => collectCell(c, true));
            createFloatingText(playerDrawX, playerDrawY - 30, "COMBO VELOZ!", true, true);
          }
        },
        "shield+speed": {
          apply: () => {
            activeEffects.push({ type: 'shield', expires: Date.now() + 5000 });

          }
        },
        "timeSlow+freeze": {
          apply: () => {
            enemies.forEach(e => { e.frozen = true; });
            timers.add(() => { enemies.forEach(e => { e.frozen = false; }); }, 3000);
            createFloatingText(playerDrawX, playerDrawY - 30, "CONGELACION!", true, true);
          }
        }
      };
      
      let playerInventory = [],
        lastPowerUpTime = 0;
      
      function getAvailablePowerUpTypes() {
        return Object.entries(POWERUP_CONFIG.types)
          .filter(([k, c]) => c.enabled && (!c.startWave || wave >= c.startWave))
          .map(([k]) => k);
      }
      
      function generatePowerUps() {
        powerUpsOnMap = [];
        if (wave < POWERUP_CONFIG.startWave) return;
        const candidates = getAvailablePowerUpTypes();
        if (!candidates.length) return;
        const weighted = [];
        for (let key of candidates) {
          const w = RARITY_WEIGHTS[POWERUP_CONFIG.types[key].rarity || "common"] || 60;
          for (let j = 0; j < w; j++) weighted.push(key);
        }
        const toSpawn = Math.min(POWERUP_CONFIG.spawnCount, candidates.length);
        for (let i = 0; i < toSpawn; i++) {
          const typeKey = weighted[Math.floor(Math.random() * weighted.length)];
          let x, y, attempts = 0;
          do {
            x = Math.floor(Math.random() * GRID_SIZE);
            y = Math.floor(Math.random() * GRID_SIZE);
            attempts++;
          } while (attempts < 200 && (
              (x === player.x && y === player.y) ||
              collectibles.some(c => c.x === x && c.y === y) ||
              messageCollectibles.some(c => c.x === x && c.y === y) ||
              powerUpsOnMap.some(p => p.x === x && p.y === y)
            ));
          if (attempts < 200) powerUpsOnMap.push({ type: typeKey, x, y, expires: Date.now() + POWERUP_CONFIG.lifetime });
        }
      }
      
      function generatePowerUpsAt(x, y, typeKey) {
        powerUpsOnMap.push({ type: typeKey, x, y, expires: Date.now() + POWERUP_CONFIG.lifetime });
      }
      
      function checkPowerUpCombos(newType) {
        const now = Date.now();
        if (now - lastPowerUpTime < 2000) {
          const recentType = activeEffects[activeEffects.length - 1]?.type;
          if (recentType) {
            const combo = POWERUP_COMBOS[`${recentType}+${newType}`] || POWERUP_COMBOS[`${newType}+${recentType}`];
            if (combo) {
              combo.apply();
              premiumFlash = 30;
            }
          }
        }
        lastPowerUpTime = now;
      }
      
      function applyNewPowerUpEffect(type, freeActivation = false) {
        if (!freeActivation) checkPowerUpCombos(type);
        switch (type) {
          case 'timeSlow':
            enemies.forEach(e => e.slowApplied = true);
            timers.add(() => enemies.forEach(e => e.slowApplied = false), POWERUP_CONFIG.types.timeSlow.duration);
            break;
          case 'doubleScore':
            doublePointsActive = true;
            timers.add(() => { doublePointsActive = false; }, POWERUP_CONFIG.types.doubleScore.duration);
            break;
          case 'freeze':
            enemies.forEach(e => { if (!e.immuneTo?.includes('freeze')) e.frozen = true; });
            timers.add(() => enemies.forEach(e => { e.frozen = false; }), POWERUP_CONFIG.types.freeze.duration);
            break;
          case 'teleporter': {
            const pool = messageCollectibles.length > 0 ? messageCollectibles : collectibles;
            if (pool.length > 0) {
              const t = pool[Math.floor(Math.random() * pool.length)];
              player.x = t.x;
              player.y = t.y;
              playerDrawX = player.x * CELL_SIZE + CELL_SIZE / 2;
              playerDrawY = player.y * CELL_SIZE + CELL_SIZE / 2;
              createExplosion(playerDrawX, playerDrawY, 30, '#00ffff', 1.5);
              SPECIAL_SOUNDS.teleport();
            }
            break;
          }
          case 'starShower':
            for (let i = 0; i < 15; i++) collectibles.push({ x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE) });
            createExplosion(CANVAS_SIZE / 2, CANVAS_SIZE / 2, 40, '#ffdd00', 2);
            SPECIAL_SOUNDS.starPower();
            break;
          case 'clone': {
            const cloneInt = setInterval(() => {
              if (gameOver || !activeEffects.some(e => e.type === 'clone')) { clearInterval(cloneInt); return; }
              const all = [...collectibles, ...messageCollectibles];
              if (all.length > 0) {
                const t = all.reduce((a, b) => {
                  const da = Math.abs(a.x - player.x) + Math.abs(a.y - player.y);
                  const db = Math.abs(b.x - player.x) + Math.abs(b.y - player.y);
                  return da < db ? a : b;
                });
                player.x = t.x;
                player.y = t.y;
                playerDrawX = player.x * CELL_SIZE + CELL_SIZE / 2;
                playerDrawY = player.y * CELL_SIZE + CELL_SIZE / 2;
                checkCollectibles();
              }
            }, 500);
            timers.add(() => clearInterval(cloneInt), POWERUP_CONFIG.types.clone.duration);
            break;
          }
          case 'laser': {
            const dirMap = { up: { dx: 0, dy: -1 }, down: { dx: 0, dy: 1 }, left: { dx: -1, dy: 0 }, right: { dx: 1, dy: 0 } };
            const { dx, dy } = dirMap[currentDirection || 'up'];
            let lx = player.x,
              ly = player.y,
              kills = 0;
            for (let i = 0; i < GRID_SIZE; i++) {
              lx += dx;
              ly += dy;
              if (lx < 0 || lx >= GRID_SIZE || ly < 0 || ly >= GRID_SIZE) break;
              enemies = enemies.filter(enemy => {
                const hit = enemy.getOccupiedCells().some(c => c.x === lx && c.y === ly);
                if (hit) {
                  enemy.health--;
                  if (enemy.health <= 0) {
                    enemy.handleDefeat();
                    createExplosion(enemy.x * CELL_SIZE + CELL_SIZE / 2, enemy.y * CELL_SIZE + CELL_SIZE / 2, 20, '#ff0000');
                    kills++;
                    return false;
                  }
                }
                return true;
              });
            }
            SPECIAL_SOUNDS.laser();
            if (kills >= 10) {
              if (!unlockedAchievements.laserSniper) {
                unlockedAchievements.laserSniper = true;
                const ach = ACHIEVEMENTS.find(a => a.id === 'laserSniper');
                if (ach) {
                  score += ach.reward;
                  showAchievementPopup(ach);
                }
                localStorage.setItem('odparAchievements', JSON.stringify(unlockedAchievements));
              }
            }
            break;
          }
          case 'decoy':
            if (!window.decoys) window.decoys = [];
            window.decoys.push({ x: player.x, y: player.y, expires: Date.now() + 6000 });
            activeEffects.push({ type: 'decoy', expires: Date.now() + 6000 });
            audioManager.playSfx(400, 200, 'triangle', 0.4);
            break;
          case 'blackHole': {
            player.blackHoleActive = true;
            let absorbed = 0;
            const bhInt = setInterval(() => {
              if (!player.blackHoleActive || gameOver) { clearInterval(bhInt); return; }
              for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x,
                  dy = player.y - e.y,
                  d = Math.sqrt(dx * dx + dy * dy);
                if (d < 1.5) {
                  e.health--;
                  if (e.health <= 0) {
                    e.handleDefeat();
                    createExplosion(e.x * CELL_SIZE + CELL_SIZE / 2, e.y * CELL_SIZE + CELL_SIZE / 2, 30, '#8800ff', 1.2);
                    enemies.splice(i, 1);
                    absorbed++;
                  }
                } else {
                  e.x += (dx / d) * 0.3;
                  e.y += (dy / d) * 0.3;
                }
              }
              if (absorbed >= 15 && !unlockedAchievements.blackHoleAch) {
                unlockedAchievements.blackHoleAch = true;
                const ach = ACHIEVEMENTS.find(a => a.id === 'blackHoleAch');
                if (ach) {
                  score += ach.reward;
                  showAchievementPopup(ach);
                }
                localStorage.setItem('odparAchievements', JSON.stringify(unlockedAchievements));
              }
            }, 50);
            timers.add(() => {
              player.blackHoleActive = false;
              clearInterval(bhInt);
            }, 5000);
            SPECIAL_SOUNDS.blackHole();
            break;
          }
          case 'earthquake': {
            const oldSize = GRID_SIZE;
            GRID_SIZE = Math.max(10, GRID_SIZE - 5);
            adjustZonesToNewGrid(oldSize, GRID_SIZE);
            resizeGameElements();
            createFloatingText(CANVAS_SIZE / 2, CANVAS_SIZE / 2, "TERREMOTO!", true, true);
            SPECIAL_SOUNDS.earthquake();
            timers.add(() => {
              const cur = GRID_SIZE;
              GRID_SIZE = oldSize;
              adjustZonesToNewGrid(cur, GRID_SIZE);
              resizeGameElements();
            }, 3000);
            break;
          }
          case 'berserk':
            player.damageMultiplier = 2;
            activeEffects.push({ type: 'berserk', expires: Date.now() + 7000 });
            SPECIAL_SOUNDS.berserk();
            break;
          case 'phase':
            player.phaseActive = true;
            activeEffects.push({ type: 'phase', expires: Date.now() + 4000 });
            SPECIAL_SOUNDS.phase();
            break;
          case 'gridShift':
            messageCollectibles.forEach(c => {
              c.x = Math.max(0, Math.min(GRID_SIZE - 1, c.x + Math.floor((Math.random() - 0.5) * 4)));
              c.y = Math.max(0, Math.min(GRID_SIZE - 1, c.y + Math.floor((Math.random() - 0.5) * 4)));
            });
            createFloatingText(CANVAS_SIZE / 2, CANVAS_SIZE / 2, "REJILLA!", true);
            break;
          case 'lootBox': {
            const pool = ['speed', 'magnetCommon', 'shield', 'timeSlow', 'freeze'];
            applyNewPowerUpEffect(pool[Math.floor(Math.random() * pool.length)], true);

      function getFontInfoForGrid(size) {
        if (size >= 15) return { font: FONT_5, w: 3, h: 5, gap: 2 };
        return { font: FONT_3, w: 3, h: 3, gap: 1 };
      }
      
      function wordPixelWidthFI(word, fi) { let w = 0; for (let ch of word.toUpperCase()) w += fi.w + fi.gap; return Math.max(0, w - fi.gap); }
      
      function wrapTextFI(text, maxWidth, fi) {
        const words = text.split(' '),
          lines = [];
        let cur = '';
        for (let word of words) {
          const test = cur ? cur + ' ' + word : word;
          if (wordPixelWidthFI(test, fi) <= maxWidth) cur = test;
          else {
            if (cur) {
              lines.push(cur);
              cur = '';
            }
            if (wordPixelWidthFI(word, fi) > maxWidth) {
              let chunk = '';
              for (let ch of word) {
                if (wordPixelWidthFI(chunk + ch, fi) <= maxWidth) chunk += ch;
                else {
                  lines.push(chunk);
                  chunk = ch;
                }
              }
              if (chunk) lines.push(chunk);
            } else cur = word;
          }
        }
        if (cur) lines.push(cur);
        return lines;
      }
      
      function calculateGridSizeForMessage(text, mode) {
        const min = MESSAGE_CONFIG.gridMin,
          max = MESSAGE_CONFIG.gridMax;
        if (!text) return min;
        let fi = getFontInfoForGrid(min);
        const words = text.split(' ');
        let maxWordW = 0;
        for (let w of words) maxWordW = Math.max(maxWordW, wordPixelWidthFI(w, fi));
        let neededW = maxWordW + 4;
        if (neededW > min) {
          fi = getFontInfoForGrid(neededW);
          maxWordW = 0;
          for (let w of words) maxWordW = Math.max(maxWordW, wordPixelWidthFI(w, fi));
          neededW = maxWordW + 4;
        }
        const lines = wrapTextFI(text, neededW - 2, fi);
        const blockH = lines.length * (fi.h + 1) - 1,
          neededH = blockH + 4;
        let baseSize = Math.max(neededW, neededH);
        switch (mode) {
          case "expand":
            baseSize = Math.ceil(baseSize * 1.2);
            break;
          case "compact":
            baseSize = Math.max(min, baseSize - 2);
            break;
          case "random":
            baseSize = min + Math.floor(Math.random() * (max - min + 1));
            break;
        }
        return Math.max(min, Math.min(max, baseSize));
      }
      
      function interpolateColor(c1, c2, t) {
        const r1 = parseInt(c1.slice(1, 3), 16),
          g1 = parseInt(c1.slice(3, 5), 16),
          b1 = parseInt(c1.slice(5, 7), 16);
        const r2 = parseInt(c2.slice(1, 3), 16),
          g2 = parseInt(c2.slice(3, 5), 16),
          b2 = parseInt(c2.slice(5, 7), 16);
        const r = Math.round(r1 + (r2 - r1) * t),
          g = Math.round(g1 + (g2 - g1) * t),
          b = Math.round(b1 + (b2 - b1) * t);
        return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
      }
      
      function resolveCellColor(config, x, y, index, gridSize) {
        const mode = config.fillColor || "default";
        switch (mode) {
          case "random":
            return `hsl(${((config._seed||0)+index*37)%360},80%,60%)`;
          case "palette": { const pal = PALETTES[config.palette] || ["#ffffff"]; return pal[index % pal.length]; }
          case "rainbow": { const h = (Date.now() * (config.rainbowSpeed || 0.5) / 10 + index * 5) % 360; return `hsl(${h},90%,55%)`; }
          case "gradientH":
            return interpolateColor(config.gradientStart || "#ffffff", config.gradientEnd || "#000000", x / (gridSize - 1 || 1));
          case "gradientV":
            return interpolateColor(config.gradientStart || "#ffffff", config.gradientEnd || "#000000", y / (gridSize - 1 || 1));
          default:
            return config.fillColor || MESSAGE_CONFIG.defaultFillColor;
        }
      }
      
      function parseEffectsString(str) {
        if (!str) return {};

        return combined;
      }
      
      function messageToCoordsAdvanced(message, config, gridSize) {
        const fi = getFontInfoForGrid(gridSize);
        if (!fi) return [];
        const { font, w, h, gap } = fi;
        const maxWidth = gridSize - 2;
        const lines = wrapTextFI(message, maxWidth, fi);
        const blockH = lines.length * (h + 1) - 1;
        const startY = Math.max(1, Math.floor((gridSize - blockH) / 2));
        const coords = [];
        let lineY = startY;
        for (let line of lines) {
          const lineW = wordPixelWidthFI(line, fi);
          let cx = 1 + Math.floor((maxWidth - lineW) / 2);
          for (let ch of line.toUpperCase()) {
            const matrix = font[ch] || font[' '];
            for (let row = 0; row < matrix.length; row++) {
              for (let col = 0; col < (Array.isArray(matrix[row]) ? matrix[row].length : 1); col++) {
                const bit = Array.isArray(matrix[row]) ? matrix[row][col] : matrix[row];
                if (bit === 1) {
                  const px = cx + col,
                    py = lineY + row;
                  if (px >= 0 && px < gridSize && py >= 0 && py < gridSize) {
                    const index = coords.length;
                    const color = resolveCellColor(config, px, py, index, gridSize);
                    coords.push({
                      x: px,
                      y: py,
                      color,
                      fillColor: config.fillColor,
                      palette: config.palette,
                      rainbowSpeed: config.rainbowSpeed,
                      strokeColor: config.strokeColor || MESSAGE_CONFIG.defaultStrokeColor,
                      effects: config.effects || "none",
                      effectParams: { ...(config.effectParams || {}) },
                      basePoints: config.basePoints || 15,
                      entranceStyle: config.cellEntrance?.style || "none",
                      entranceDelay: Date.now() + index * (config.cellEntrance?.delay || 0)
                    });
                  }
                }
              }
            }
            cx += w + gap;
          }
          lineY += h + 1;
        }
        return coords;
      }
      
      function calculatePointsPerCell(config, comboCount, totalCells, collectedCount, gridPos, gridSize) {
        const bp = config.basePoints || 15;
        const mode = config.pointsPerCell;
        if (typeof mode === 'number') return mode;
        switch (mode) {
          case "random":
            return Math.floor(Math.random() * ((config.pointsRandomMax || 25) - (config.pointsRandomMin || 5) + 1)) + (config.pointsRandomMin || 5);
          case "increasing":
            return bp + collectedCount * 2;
          case "decreasing":
            return bp + (totalCells - collectedCount) * 0.5;
          case "combo":
            return Math.floor(bp * (1 + comboCount * (config.comboMultiplier || 0.1)));
          case "multiplier":
            return Math.floor(bp * (config.multiplier || 2));
          case "edge":
            if (gridPos.x === 0 || gridPos.x === gridSize - 1 || gridPos.y === 0 || gridPos.y === gridSize - 1) return Math.floor(bp * (config.edgeMultiplier || 2.5));
            return bp;
          case "center": {
            const cx = Math.floor(gridSize / 2),
              cy = Math.floor(gridSize / 2);
            if (Math.abs(gridPos.x - cx) <= 1 && Math.abs(gridPos.y - cy) <= 1) return Math.floor(bp * (config.centerMultiplier || 2));
            return bp;
          }
          case "lastStand":
            if (totalCells - collectedCount <= (config.lastStandThreshold || 3)) return Math.floor(bp * (config.lastStandMultiplier || 5));
            return bp;
          default:
            return bp;
        }
      }
      
      function calculateCompletionBonus(config, totalCells, comboCount, elapsed) {
        const mode = config.completionBonus;
        const base = config.completionBonusPoints || 200;
        if (!mode || mode === 0) return 0;
        if (typeof mode === 'number') return mode;
        switch (mode) {
          case "perfect":
            return base;
          case "scale":
            return Math.floor(base * (config.completionBonusMultiplier || 1.5));
          case "speed": { const f = config.completionSpeedFactor || 0.5; const tb = Math.max(0, base - Math.floor(elapsed / 1000) * 5); return tb + Math.floor(base * f); }
          case "overkill":
            if (comboCount >= (config.overkillThreshold || 5)) return base * 3;
            return base;
          default:
            return base;
        }
      }

      class FloatingText {
        constructor(x, y, text, color, isPremium, big = false, isTriple = false) {
          this.x = x;
          this.y = y - 40;
          this.text = text;
          this.color = isTriple ? '#FFD700' : color;
          this.isPremium = isPremium || isTriple;
          this.life = big ? 110 : (isTriple ? 120 : (isPremium ? 100 : 85));
          this.alpha = 1;
          this.vy = -1.8;
          this.scale = big ? 0.65 : (isTriple ? 0.72 : 0.55);
          this.big = big || isTriple;
          this.isTriple = isTriple;
        }
        update() {
          this.y += this.vy;
          this.vy *= 0.975;
          this.life--;
          if (this.scale < (this.big ? 1.0 : 1.05)) this.scale += 0.02;
          this.alpha = Math.max(0, this.life / (this.isTriple ? 120 : (this.big ? 110 : (this.isPremium ? 100 : 85))));
        }
        draw() {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const fs = this.isTriple ? 40 : (this.big ? 34 : Math.floor(38 * this.scale));
          ctx.font = `900 ${fs}px "Press Start 2P","Courier New",monospace`;
          ctx.lineWidth = this.isTriple ? 3 : 2.2;
          ctx.strokeStyle = '#000000';
          ctx.strokeText(this.text, this.x, this.y);
          ctx.fillStyle = this.isTriple ? '#FFD700' : (this.big ? '#FFFFAA' : (this.isPremium ? '#ffccff' : '#ffffcc'));
          ctx.fillText(this.text, this.x, this.y);
          if (this.isTriple) {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(this.text, this.x - 1, this.y - 1);
            ctx.fillStyle = '#FFAA00';
            ctx.fillText(this.text, this.x, this.y);
          }
          ctx.restore();
        }
      }

      function addWallAlert(dir, isBoss, coord, delay) {
        wallAlerts.push({ dir, isBoss, coord, expiryTime: Date.now() + delay });
      }
      
      function drawWallAlerts() {
        const now = Date.now();
        for (let i = wallAlerts.length - 1; i >= 0; i--) {
          const a = wallAlerts[i];
          if (now >= a.expiryTime) { wallAlerts.splice(i, 1); continue; }
          const remaining = (a.expiryTime - now) / (a.isBoss ? ENEMY_CONFIG.bossAlertTimeMs : ENEMY_CONFIG.defaultAlertTimeMs);
          const alpha = Math.min(0.95, remaining * 0.9 + 0.2);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = a.isBoss ? '#ff66ff' : '#ffff44';
          ctx.lineWidth = a.isBoss ? 9 : 6;
          if (a.dir === 'down') {
            const x = a.coord * CELL_SIZE + CELL_SIZE / 2;
            ctx.beginPath();
            ctx.moveTo(x - CELL_SIZE * 1.8, 20);
            ctx.lineTo(x + CELL_SIZE * 1.8, 20);
            ctx.stroke();
          }
          else if (a.dir === 'up') {
            const x = a.coord * CELL_SIZE + CELL_SIZE / 2;
            ctx.beginPath();
            ctx.moveTo(x - CELL_SIZE * 1.8, CANVAS_SIZE - 20);
            ctx.lineTo(x + CELL_SIZE * 1.8, CANVAS_SIZE - 20);
            ctx.stroke();
          }
          else if (a.dir === 'left') {
            const y = a.coord * CELL_SIZE + CELL_SIZE / 2;
            ctx.beginPath();
            ctx.moveTo(CANVAS_SIZE - 20, y - CELL_SIZE * 1.8);
            ctx.lineTo(CANVAS_SIZE - 20, y + CELL_SIZE * 1.8);
            ctx.stroke();
          }
          else if (a.dir === 'right') {
            const y = a.coord * CELL_SIZE + CELL_SIZE / 2;
            ctx.beginPath();
            ctx.moveTo(20, y - CELL_SIZE * 1.8);
            ctx.lineTo(20, y + CELL_SIZE * 1.8);
            ctx.stroke();
          }
          if (a.isBoss) {
            ctx.fillStyle = '#ff66ff';
            ctx.font = 'bold 20px "Press Start 2P",monospace';
            ctx.textAlign = 'center';
            ctx.fillText('BOSS', CANVAS_SIZE / 2, 48);
          }
          ctx.restore();
        }
      }
