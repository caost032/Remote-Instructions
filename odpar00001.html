<style>
* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
body { margin: 0; padding: 0; background: black; overflow: hidden; height: 100vh; font-family: 'Press Start 2P', 'Courier New', monospace; }
.display { display: flex; justify-content: center; align-items: center; flex-direction: column; width: 100%; height: 100vh; background: radial-gradient(circle at 30% 20%, #0a0f1a, #000000); perspective: 1000px; }
.pantalla { width: 100%; max-width: 560px; height: 60vh; max-height: 520px; background: transparent; perspective: 800px; display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; }
canvas { image-rendering: pixelated; width: 85%; height: 85%; max-width: 560px; max-height: 560px; transform: rotateX(40deg); transition: transform 1s ease-out; }
.score-container { position: absolute; width: 100%; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); padding: 6px 12px; text-align: center; font-family: 'Press Start 2P','Courier New',monospace; font-weight: bold; color: orange; z-index: 10; pointer-events: none; white-space: nowrap; font-size: clamp(9px,2.6vw,12px); line-height: 1.4; }
.score-container span { display: inline-block; margin: 0 1px; }
#score { color: white; text-shadow: 0 0 6px #0ff; }
#highScore { color: #ffd700; text-shadow: 0 0 6px #ff0; }
#waveSpan { color: #0ff; text-shadow: 0 0 5px #0ff; }
#evadedSpan { color: #88ff88; text-shadow: 0 0 5px #0f0; }
#msgSpan { color: #ff88ff; text-shadow: 0 0 5px #f0f; font-size: 0.85em; }
.botones { width: 100%; max-width: 560px; height: 50%; background: transparent; display: flex; justify-content: center; align-items: center; padding: 5px; }
.centerbotones { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; max-width: 400px; gap: 3%; }
.fila-botones { display: flex; justify-content: center; align-items: center; width: 100%; height: 30%; gap: 4%; background: transparent; }
.boton { display: flex; justify-content: center; align-items: center; width: 28%; height: 100%; background: #0a0f1a; border-bottom: solid lightcyan 8px; border-radius: 20%; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: all 0.05s linear; cursor: pointer; touch-action: manipulation; -webkit-touch-callout: none; }
.boton.activo { transform: translateY(4px); border-bottom-width: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.5); background: #1a2a3a; }
.boton svg { width: 65%; height: 65%; fill: #bbffff; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); pointer-events: none; }
.boton.vacio { background: transparent; border: none; box-shadow: none; pointer-events: none; cursor: default; }
.boton.vacio svg { display: none; }
@media (max-width: 550px) {
  .score-container { padding: 4px 10px; font-size: 8px; top: 8px; }
  .boton { width: 27%; border-bottom-width: 6px; }
  .fila-botones { gap: 3%; }
  .centerbotones { gap: 2%; }
}
</style>
</head>

// ══════════════════════════════════════════════════════
// HELPERS DE COLOR
// ══════════════════════════════════════════════════════
function interpolateColor(c1, c2, t) {
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), b=Math.round(b1+(b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function resolveCellColor(config, x, y, index, totalCells, gridSize) {
  const mode = config.fillColor || "default";
  switch(mode) {
    case "random": return `hsl(${((config._seed||0)+index*37)%360},80%,60%)`;
    case "palette": {
      const pal = PALETTES[config.palette] || ["#ffffff"];
      if (typeof pal === 'function') return pal(index, totalCells);
      return pal[index % pal.length];
    }
    case "rainbow": {
      const h = (Date.now()*(config.rainbowSpeed||0.5)/10 + index*5) % 360;
      return `hsl(${h},90%,55%)`;
    }
    case "gradientH": return interpolateColor(config.gradientStart, config.gradientEnd, x/(gridSize-1||1));
    case "gradientV": return interpolateColor(config.gradientStart, config.gradientEnd, y/(gridSize-1||1));
    default: return config.fillColor || MESSAGE_CONFIG.defaultFillColor;
  }
}

function parseEffectsString(str) {
  if (!str) return {};
  let combined = {};
  for (let name of str.split('+')) {
    combined = { ...combined, ...(EFFECT_PRESETS[name] || {}) };
  }
  return combined;
}

function resolveEntry(rule) {
  if (!rule) return { text: "" };
  if (rule.random) {
    const txt = rule.random[Math.floor(Math.random() * rule.random.length)];
    return { ...rule, text: txt };
  }
  return rule;
}

function buildDefaultConfig() {
  return {
    text: "",
    fillColor: MESSAGE_CONFIG.defaultFillColor,
    strokeColor: MESSAGE_CONFIG.defaultStrokeColor,
    effects: "none",
    effectParams: {},
    pointsPerCell: 15,
    basePoints: 15,
    comboMultiplier: 0.1,
    multiplier: 2.0,
    edgeMultiplier: 2.5,
    centerMultiplier: 2.0,
    lastStandMultiplier: 5.0,
    lastStandThreshold: 3,
    pointsRandomMin: 5,
    pointsRandomMax: 25,
    completionBonus: MESSAGE_CONFIG.bonusOnComplete,
    completionBonusPoints: MESSAGE_CONFIG.bonusOnComplete,
    completionSpeedFactor: 0.5,
    overkillThreshold: 5,
    mapSizeMode: "fittext",
    enemySpeedMultiplier: 1,
    spawnRateMultiplier: 1,
    powerUpSpawnRate: 1,
    safeZoneDisabled: false,
    bossRush: false,
    doublePoints: false,
    invulnerableOnWaveStart: 0,
    glitchIntensity: 1,
    playerGlowOnStart: 50,
    specialSound: null,
    bonusOnCompleteEnabled: MESSAGE_CONFIG.bonusOnCompleteEnabled,
    _seed: Math.floor(Math.random() * 360),
  };
}

function getMessageConfig(wv) {
  const cfg = MESSAGE_CONFIG;
  const def = buildDefaultConfig();
  if (cfg.mode === "sequential") {
    const txt = cfg.fallbackPool[(wv - 1) % cfg.fallbackPool.length];
    return { ...def, text: txt };
  }
  if (cfg.mode === "random") {
    const txt = cfg.fallbackPool[Math.floor(Math.random() * cfg.fallbackPool.length)];
    return { ...def, text: txt };
  }
  if (cfg.mode === "interval") {
    const im = cfg.intervalMode;
    if (wv < im.startWave) return { ...def, text: "" };
    const rel = wv - im.startWave;
    if (rel % im.every !== 0) return { ...def, text: "" };
    const pool = im.pool;
    const txt = im.poolOrder === "sequential" ?
      pool[Math.floor(rel / im.every) % pool.length] :
      pool[Math.floor(Math.random() * pool.length)];
    return { ...def, text: txt };
  }
  let best = null;
  let bestPriority = -1;
  for (let rule of cfg.MESSAGE_SCHEDULE) {
    let priority = 0;
    let matched = false;
    if (rule.wave !== undefined && rule.wave === wv) {
      priority = 10;
      matched = true;
    } else if (rule.from !== undefined && rule.to !== undefined && wv >= rule.from && wv <= rule.to) {
      priority = 5;
      matched = true;
    } else if (rule.every !== undefined && rule.every > 0 && wv % rule.every === 0) {
      priority = 3;
      matched = true;
    }
    if (matched && priority > bestPriority) {
      bestPriority = priority;
      best = rule;
    }
  }
  if (best) {
    const resolved = resolveEntry(best);
    return { ...def, ...resolved };
  }
  if (cfg.fallback === "none") return { ...def, text: "" };
  if (cfg.fallback === "random") return { ...def, text: cfg.fallbackPool[Math.floor(Math.random() * cfg.fallbackPool.length)] };
  if (cfg.fallback === "sequential") {
    const txt = cfg.fallbackPool[cfg._fallbackIndex % cfg.fallbackPool.length];
    cfg._fallbackIndex++;
    return { ...def, text: txt };
  }
  return { ...def, text: "" };
}

// ══════════════════════════════════════════════════════
// GRID HELPERS
// ══════════════════════════════════════════════════════
function getFontInfoForGrid(size) {
  if (size >= 15) return { font: FONT_5, w: 3, h: 5, gap: 2 };
  return { font: FONT_3, w: 3, h: 3, gap: 1 };
}

function wordPixelWidthFI(word, fi) {
  let width = 0;
  for (let ch of word.toUpperCase()) width += fi.w + fi.gap;
  return Math.max(0, width - fi.gap);
}

function wrapTextFI(text, maxWidth, fi) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (let word of words) {
    const test = cur ? cur + ' ' + word : word;
    if (wordPixelWidthFI(test, fi) <= maxWidth) {
      cur = test;
    } else {
      if (cur) {
        lines.push(cur);
        cur = '';
      }
      if (wordPixelWidthFI(word, fi) > maxWidth) {
        let chunk = '';
        for (let ch of word) {
          if (wordPixelWidthFI(chunk + ch, fi) <= maxWidth) {
            chunk += ch;
          } else {
            lines.push(chunk);
            chunk = ch;
          }
        }
        if (chunk) lines.push(chunk);
      } else {
        cur = word;
      }
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function calculateGridSizeForMessage(text, mode) {
  const min = MESSAGE_CONFIG.gridMin, max = MESSAGE_CONFIG.gridMax;
  if (!text) return mode === "random" ? min + Math.floor(Math.random()*(max-min)) : min;
  let fi = getFontInfoForGrid(min);
  const words = text.split(' ');
  let maxWordW = 0;
  for (let w of words) maxWordW = Math.max(maxWordW, wordPixelWidthFI(w, fi));
  let neededWidth = maxWordW + 4;
  if (neededWidth > min) {
    fi = getFontInfoForGrid(neededWidth);
    maxWordW = 0;
    for (let w of words) maxWordW = Math.max(maxWordW, wordPixelWidthFI(w, fi));
    neededWidth = maxWordW + 4;
  }
  const lines = wrapTextFI(text, neededWidth - 2, fi);
  const blockH = lines.length * (fi.h + 1) - 1;
  const neededH = blockH + 4;
  let baseSize = Math.max(neededWidth, neededH);
  switch(mode) {
    case "expand":  baseSize = Math.ceil(baseSize * 1.2); break;
    case "compact": baseSize = Math.max(min, baseSize - 2); break;
    case "random":  baseSize = min + Math.floor(Math.random()*(max-min+1)); break;
    case "nowrap":  baseSize = Math.min(max, neededWidth); break;
  }
  return Math.max(min, Math.min(max, baseSize));
}

// ══════════════════════════════════════════════════════
// PUNTOS POR CELDA
// ══════════════════════════════════════════════════════
function calculatePointsPerCell(config, comboCount, totalCells, collectedCount, gridPos, gridSize) {
  const bp = config.basePoints || 15;
  const mode = config.pointsPerCell;
  if (typeof mode === 'number') return mode;
  switch(mode) {
    case "random": return Math.floor(Math.random()*((config.pointsRandomMax||25)-(config.pointsRandomMin||5)+1))+(config.pointsRandomMin||5);
    case "increasing": return bp + collectedCount * 2;
    case "decreasing": return bp + (totalCells - collectedCount) * 0.50;
    case "combo":  return Math.floor(bp * (1 + comboCount * (config.comboMultiplier||0.1)));
    case "multiplier": return Math.floor(bp * (config.multiplier||2));
    case "edge":
      if (gridPos.x===0||gridPos.x===gridSize-1||gridPos.y===0||gridPos.y===gridSize-1)
        return Math.floor(bp*(config.edgeMultiplier||2.5));
      return bp;
    case "center": {
      const cx=Math.floor(gridSize/2),cy=Math.floor(gridSize/2);
      if(Math.abs(gridPos.x-cx)<=1&&Math.abs(gridPos.y-cy)<=1) return Math.floor(bp*(config.centerMultiplier||2));
      return bp;
    }
    case "lastStand":
      if(totalCells-collectedCount<=(config.lastStandThreshold||3)) return Math.floor(bp*(config.lastStandMultiplier||5));
      return bp;
    default: return bp;
  }
}

function calculateCompletionBonus(config, totalCells, comboCount, elapsed) {
  const mode = config.completionBonus;
  const base = config.completionBonusPoints || 200;
  if (!mode || mode === 0) return 0;
  if (typeof mode === 'number') return mode;
  switch(mode) {
    case "perfect": return base;
    case "scale":   return Math.floor(base * (config.completionBonusMultiplier || 1.5));
    case "speed": {
      const factor = config.completionSpeedFactor || 0.5;
      const timeBonus = Math.max(0, base - Math.floor(elapsed / 1000) * 5);
      return timeBonus + Math.floor(base * factor);
    }
    case "overkill":
      if (comboCount >= (config.overkillThreshold || 5)) return base * 3;
      return base;
    default: return base;
  }
}

// ══════════════════════════════════════════════════════
// COORDENADAS DE MENSAJE AVANZADO
// ══════════════════════════════════════════════════════
function messageToCoordsAdvanced(message, config, gridSize) {
  const fi = getFontInfoForGrid(gridSize);
  if (!fi) return [];
  const { font, w, h, gap } = fi;
  const maxWidth = gridSize - 2;
  const lines = wrapTextFI(message, maxWidth, fi);
  const blockH = lines.length * (h + 1) - 1;
  const startY = Math.max(1, Math.floor((gridSize - blockH) / 2));
  const coords = [];
  let lineY = startY;
  for (let line of lines) {
    const lineW = wordPixelWidthFI(line, fi);
    let cx = 1 + Math.floor((maxWidth - lineW) / 2);
    for (let ch of line.toUpperCase()) {
      const matrix = font[ch] || font[' '];
      for (let row = 0; row < matrix.length; row++) {
        for (let col = 0; col < (matrix[row].length || 1); col++) {
          const bit = Array.isArray(matrix[row]) ? matrix[row][col] : matrix[row];
          if (bit === 1) {
            const x = cx + col, y = lineY + row;
            if (x >= 0 && x < gridSize && y >= 0 && y < gridSize) {
              const index = coords.length;
              const color = resolveCellColor(config, x, y, index, 0, gridSize);
              coords.push({
                x, y, color,
                fillColor: config.fillColor,
                palette: config.palette,
                rainbowSpeed: config.rainbowSpeed,
                strokeColor: config.strokeColor || MESSAGE_CONFIG.defaultStrokeColor,
                effects: config.effects || "none",
                effectParams: { ...(config.effectParams || {}) },
                basePoints: config.basePoints || 15,
                pointsMode: config.pointsPerCell,
                isEdge: (x===0||x===gridSize-1||y===0||y===gridSize-1),
                isCenter: Math.abs(x-Math.floor(gridSize/2))<=1 && Math.abs(y-Math.floor(gridSize/2))<=1,
              });
            }
          }
        }
      }
      cx += w + gap;
    }
    lineY += h + 1;
  }
  return coords;
}

function resumeAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume().then(() => audioResumed = true);
  else audioResumed = true;
  document.removeEventListener('touchstart', resumeAudio);
  document.removeEventListener('mousedown', resumeAudio);
}
document.addEventListener('touchstart', resumeAudio);
document.addEventListener('mousedown', resumeAudio);

function startMotor() {
  if (!audioResumed || audioCtx.state !== 'running' || isMotorPlaying) return;
  try {
    motorOsc = audioCtx.createOscillator();
    motorGain = audioCtx.createGain();
    motorOsc.type = 'sawtooth';
    motorOsc.frequency.value = 10000;
    motorGain.gain.value = 0.01;
    motorOsc.connect(motorGain);
    motorGain.connect(audioCtx.destination);
    motorOsc.start();
    isMotorPlaying = true;
    if (motorInterval) clearInterval(motorInterval);
    motorInterval = setInterval(() => {
      if (!isMotorPlaying) return;
      motorOsc.frequency.linearRampToValueAtTime(25 + Math.random()*15, audioCtx.currentTime + 0.3);
    }, 2000);
  } catch(e) {}
}

function stopMotor() {
  if (!isMotorPlaying) return;
  try {
    if (motorOsc) { motorOsc.stop(); motorOsc.disconnect(); motorOsc = null; }
    if (motorGain) { motorGain.disconnect(); motorGain = null; }
    if (motorInterval) { clearInterval(motorInterval); motorInterval = null; }
  } catch(e) {}
  isMotorPlaying = false;
}

function playMoveSound() {
  if (!audioResumed || audioCtx.state !== 'running') return;
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = 10000; g.gain.value = 0.1;
    o.connect(g); g.connect(audioCtx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.12);
    o.stop(audioCtx.currentTime + 0.12);
  } catch(e) {}
}

function playSound(freq, duration, type='square', volume=0.3) {
  if (!audioResumed || audioCtx.state !== 'running') return;
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq; g.gain.value = volume;
    o.connect(g); g.connect(audioCtx.destination); o.start();
    setTimeout(() => { g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05); o.stop(); g.disconnect(); o.disconnect(); }, duration);
  } catch(e) {}
}

function clearAllTimeouts() { for (let id of activeTimeouts) clearTimeout(id); activeTimeouts.clear(); }
function registerTimeout(fn, delay) {
  const id = setTimeout(() => { activeTimeouts.delete(id); fn(); }, delay);
  activeTimeouts.add(id); return id;
}

function applyOleadaModifiers(config) {
  if (!config) return;
  if (config.enemySpeedMultiplier && config.enemySpeedMultiplier !== 1) {
    enemySpawnConfig.normal.speed *= config.enemySpeedMultiplier;
    enemySpawnConfig.boss.speed   *= config.enemySpeedMultiplier;
  }
  if (config.spawnRateMultiplier && config.spawnRateMultiplier !== 1) {
    enemySpawnConfig.normal.minInterval *= config.spawnRateMultiplier;
    enemySpawnConfig.normal.maxInterval *= config.spawnRateMultiplier;
  }
  if (config.powerUpSpawnRate && config.powerUpSpawnRate !== 1) {
    POWERUP_CONFIG.spawnCount = Math.ceil(3 * config.powerUpSpawnRate);
  }
  safeZoneDisabledForWave = config.safeZoneDisabled || false;
  doublePointsActive = config.doublePoints || false;
  if (config.bossRush) {
    for (let i = 0; i < 3; i++)
      registerTimeout(() => { if (!gameOver) triggerBossWave(); }, 2000 + i*1500);
  }
  if (config.invulnerableOnWaveStart) invulnerableUntil = Date.now() + config.invulnerableOnWaveStart;
  if (config.playerGlowOnStart) playerGlow = config.playerGlowOnStart;
  if (config.glitchIntensity) glitchIntensity = config.glitchIntensity;
  if (config.specialSound && SPECIAL_SOUNDS[config.specialSound]) SPECIAL_SOUNDS[config.specialSound]();
}

class Particle {
  constructor(x,y,color='skyblue',sizeBoost=1) {
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*5; this.vy=(Math.random()-0.5)*5-2;
    this.life=30+Math.random()*20; this.alpha=1;
    this.size=(Math.random()*5+2)*sizeBoost; this.color=color; this.gravity=1;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vy+=this.gravity; this.life--; this.alpha=Math.max(0,this.life/30); this.size*=0.96; }
  draw() { ctx.save(); ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color; ctx.fillRect(this.x-this.size/2,this.y-this.size/2,this.size,this.size); ctx.restore(); }
}
class Spark {
  constructor(x,y,angle,speed) {
    this.x=x; this.y=y;
    this.vx=Math.cos(angle)*speed*(0.7+Math.random()*0.6);
    this.vy=Math.sin(angle)*speed*(0.7+Math.random()*0.6);
    this.life=16+Math.random()*12; this.alpha=1; this.length=0.5+Math.random()*5; this.width=4+Math.random()*2;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.life--; this.alpha=this.life/20; this.length*=0.92; }
  draw() {
    ctx.save(); ctx.globalAlpha=Math.max(0,this.alpha);
    ctx.translate(this.x,this.y); ctx.rotate(Math.atan2(this.vy,this.vx));
    ctx.fillStyle='#00ddff'; ctx.fillRect(-this.width/2,-this.length/2,this.width,this.length);
    ctx.fillStyle='#88ffff'; ctx.fillRect(-this.width/3,-this.length/3,this.width*0.6,this.length*0.6);
    ctx.restore();
  }
}

function createSpark(x,y,angle) { for(let i=0;i<2;i++) sparkParticles.push(new Spark(x,y,angle,4+Math.random()*3)); }
function createExplosion(x,y,count,color,sizeBoost=1) { const max=150; while(particles.length>=max) particles.shift(); for(let i=0;i<Math.min(count,30);i++) particles.push(new Particle(x,y,color,sizeBoost)); }

class FloatingText {
  constructor(x,y,text,color,isPremium,big=false,isTriple=false) {
    this.x=x; this.y=y-40; this.text=text; this.color=isTriple?'#FFD700':color;
    this.isPremium=isPremium||isTriple; this.life=big?110:(isTriple?120:(isPremium?100:85));
    this.alpha=1; this.vy=-1.8; this.scale=big?0.65:(isTriple?0.72:0.55); this.big=big||isTriple; this.isTriple=isTriple;
  }
  update() {
    this.y+=this.vy; this.vy*=0.975; this.life--;
    if(this.scale<(this.big?1.0:1.05)) this.scale+=0.02;
    this.alpha=Math.max(0,this.life/(this.isTriple?120:(this.big?110:(this.isPremium?100:85))));
  }
  draw() {
    ctx.save(); ctx.globalAlpha=this.alpha; ctx.textAlign='center'; ctx.textBaseline='middle';
    let fontSize=this.isTriple?40:(this.big?34:Math.floor(38*this.scale));
    ctx.font=`900 ${fontSize}px "Press Start 2P","Courier New",monospace`;
    ctx.lineWidth=this.isTriple?3:2.2; ctx.strokeStyle='#000000';
    ctx.strokeText(this.text,this.x,this.y);
    ctx.fillStyle=this.isTriple?'#FFD700':(this.big?'#FFFFAA':(this.isPremium?'#ffccff':'#ffffcc'));
    ctx.fillText(this.text,this.x,this.y);
    if(this.isTriple){ctx.fillStyle='#FFFFFF';ctx.fillText(this.text,this.x-1,this.y-1);ctx.fillStyle='#FFAA00';ctx.fillText(this.text,this.x,this.y);}
    ctx.restore();
  }
}

class Enemy {
  constructor(dir, isBoss=false) {
    this.dir=dir; this.isBoss=isBoss; this.sizeMultiplier=isBoss?2:1;
    this.x=0; this.y=0; this.progress=0;
    this.speed=isBoss?enemySpawnConfig.boss.speed:enemySpawnConfig.normal.speed;
    const maxIndex=GRID_SIZE-(this.sizeMultiplier-1);
    if(dir==='down'){this.x=Math.floor(Math.random()*maxIndex);this.y=-(this.sizeMultiplier-1);}
    else if(dir==='up'){this.x=Math.floor(Math.random()*maxIndex);this.y=GRID_SIZE;}
    else if(dir==='right'){this.y=Math.floor(Math.random()*maxIndex);this.x=-(this.sizeMultiplier-1);}
    else{this.y=Math.floor(Math.random()*maxIndex);this.x=GRID_SIZE;}
  }
  update() {
    this.progress+=this.speed;
    if(this.dir==='down')this.y=-(this.sizeMultiplier-1)+this.progress;
    else if(this.dir==='up')this.y=GRID_SIZE-this.progress;
    else if(this.dir==='right')this.x=-(this.sizeMultiplier-1)+this.progress;
    else this.x=GRID_SIZE-this.progress;
  }
  getOccupiedCells() {
    const cells=[],cx=Math.round(this.x),cy=Math.round(this.y);
    if(this.sizeMultiplier===1)cells.push({x:cx,y:cy});
    else for(let dx=0;dx<2;dx++)for(let dy=0;dy<2;dy++)cells.push({x:cx+dx,y:cy+dy});
    return cells;
  }
  isOffScreen() {
    const margin=(this.sizeMultiplier-1)+0.8;
    if(this.dir==='down')return this.y>GRID_SIZE+margin;
    if(this.dir==='up')return this.y<-margin;
    if(this.dir==='right')return this.x>GRID_SIZE+margin;
    return this.x<-margin;
  }
  draw() {
    let offX=this.sizeMultiplier===2?CELL_SIZE/2:0, offY=this.sizeMultiplier===2?CELL_SIZE/2:0;
    const px=this.x*CELL_SIZE+CELL_SIZE/2+offX, py=this.y*CELL_SIZE+CELL_SIZE/2+offY;
    const size=this.isBoss?CELL_SIZE*1.35:CELL_SIZE*0.6;
    let angle=1;
    switch(this.dir){case'up':angle=0;break;case'right':angle=Math.PI/2;break;case'down':angle=Math.PI;break;case'left':angle=-Math.PI/2;break;}
    ctx.save(); ctx.translate(px,py); ctx.rotate(angle);
    const tipY=-size*0.85, baseY=size*0.5, baseX=size*0.65;
    ctx.beginPath(); ctx.moveTo(0,tipY); ctx.lineTo(-baseX,baseY); ctx.lineTo(baseX,baseY); ctx.closePath();
    ctx.lineWidth=this.isBoss?2.5:2; ctx.strokeStyle=this.isBoss?'#ff77ff':'#ff6644'; ctx.stroke();
    ctx.fillStyle='transparent'; ctx.fill();
    ctx.restore();
  }
}

function adjustZonesToNewGrid(oldSize, newSize) {
  [safeZone, bonusZone, doubleBonusZone, tripleBonusZone].forEach(zone => {
    if (zone) {
      zone.x = Math.min(newSize-1, Math.floor(zone.x * newSize / oldSize));
      zone.y = Math.min(newSize-1, Math.floor(zone.y * newSize / oldSize));
    }
  });
}

function generateSafeZone() {
  if (safeZoneDisabledForWave) return;
  safeZone = { x: Math.floor(Math.random()*GRID_SIZE), y: Math.floor(Math.random()*GRID_SIZE), expires: Date.now()+SAFE_ZONE_DURATION };
}
function generateBonusZone() {
  bonusZone = { x: Math.floor(Math.random()*GRID_SIZE), y: Math.floor(Math.random()*GRID_SIZE), expires: Date.now()+BONUS_ZONE_DURATION };
  lastBonusTick = Date.now();
}

function updateZones() {
  if (!safeZone){safeZoneTimer++;if(safeZoneTimer>130&&!safeZoneDisabledForWave){generateSafeZone();safeZoneTimer=0;}}
  else if(Date.now()>=safeZone.expires)safeZone=null;
  if(!bonusZone){bonusZoneTimer++;if(bonusZoneTimer>200&&bonusZoneCurrentWaveCount<MAX_BONUS_ZONES_PER_WAVE){generateBonusZone();bonusZoneCurrentWaveCount++;bonusZoneTimer=0;}}
  else if(Date.now()>=bonusZone.expires)bonusZone=null;
  if(!doubleBonusZone){doubleBonusZoneTimer++;if(doubleBonusZoneCurrentWaveCount<MAX_DOUBLE_BONUS_ZONES_PER_WAVE&&doubleBonusZoneTimer>180&&Math.random()<0.25&&Date.now()-lastDoubleBonusSpawnTime>=10000&&evadedSinceLastDoubleBonus>8&&scoreSinceLastDoubleBonus>150){generateDoubleBonusZone();doubleBonusZoneCurrentWaveCount++;doubleBonusZoneTimer=0;lastDoubleBonusSpawnTime=Date.now();evadedSinceLastDoubleBonus=0;scoreSinceLastDoubleBonus=0;}}

  if(!tripleBonusZone){tripleBonusZoneTimer++;if(tripleBonusZoneCurrentWaveCount<MAX_TRIPLE_BONUS_ZONES_PER_WAVE&&tripleBonusZoneTimer>250&&Math.random()<0.05&&Date.now()-lastTripleBonusSpawnTime>=20000&&premiumCollectedSinceLastTripleBonus>=3&&bossesEvadedSinceLastTripleBonus>=2&&!doubleBonusZone){generateTripleBonusZone();tripleBonusZoneCurrentWaveCount++;tripleBonusZoneTimer=0;lastTripleBonusSpawnTime=Date.now();premiumCollectedSinceLastTripleBonus=0;bossesEvadedSinceLastTripleBonus=0;}}

}

function drawZoneArc(zone, duration, fillFill, strokeFill, outerRadius, innerRadius, pulseDiv) {
  if (!zone) return;
  const px=zone.x*CELL_SIZE+CELL_SIZE/2, py=zone.y*CELL_SIZE+CELL_SIZE/2;
  const timeLeft=Math.max(0,zone.expires-Date.now()), ratio=timeLeft/duration;
  const secs=Math.ceil(timeLeft/1000), pulse=Math.sin(Date.now()/pulseDiv)*0.15+0.88;
  ctx.save();
  ctx.globalAlpha=0.5*ratio; ctx.fillStyle=fillFill;
  ctx.beginPath(); ctx.arc(px,py,CELL_SIZE*outerRadius*pulse,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.8; ctx.strokeStyle='#ffffff'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(px,py,CELL_SIZE*0.68,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=strokeFill;
  ctx.beginPath(); ctx.arc(px,py,CELL_SIZE*innerRadius,0,Math.PI*2); ctx.fill();
  ctx.font='900 28px "Press Start 2P",monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ffffff'; ctx.strokeStyle='#003344'; ctx.lineWidth=3;
  ctx.strokeText(secs,px,py); ctx.fillText(secs,px,py);
  ctx.restore();
}

function drawSafeZone() { drawZoneArc(safeZone,SAFE_ZONE_DURATION,'#00ffcc','#00ffff',0.75,0.45,70); }
function drawBonusZone() { drawZoneArc(bonusZone,BONUS_ZONE_DURATION,'#ffcc00','#ffaa00',0.75,0.45,60); }
function drawDoubleBonusZone() { drawZoneArc(doubleBonusZone,DOUBLE_BONUS_ZONE_DURATION,'#ff00ff','#cc00cc',0.78,0.48,55); }
function drawTripleBonusZone() {
  if (!tripleBonusZone) return;
  const px=tripleBonusZone.x*CELL_SIZE+CELL_SIZE/2, py=tripleBonusZone.y*CELL_SIZE+CELL_SIZE/2;
  const timeLeft=Math.max(0,tripleBonusZone.expires-Date.now()), ratio=timeLeft/TRIPLE_BONUS_ZONE_DURATION;
  const secs=Math.ceil(timeLeft/1000), pulse=Math.sin(Date.now()/45)*0.2+0.85;
  ctx.save();
  ctx.globalAlpha=0.6*ratio; ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(px,py,CELL_SIZE*0.82*pulse,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.9; ctx.strokeStyle='#FFFFFF'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.arc(px,py,CELL_SIZE*0.72,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#00FFFF'; ctx.beginPath(); ctx.arc(px,py,CELL_SIZE*0.52,0,Math.PI*2); ctx.fill();

function updateTripleBonusScore() {
  if(!tripleBonusZone||!isInTripleBonusZone()||gameOver)return;
  const now=Date.now();
  if(now-lastTripleBonusTick>=1000){let ticks=Math.floor((now-lastTripleBonusTick)/1000),pts=ticks*(doublePointsActive?24:12);score+=pts;scoreSinceLastDoubleBonus+=pts;if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}updateUI();playTripleBonusCollect();createFloatingText(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,pts,true,true);lastTripleBonusTick+=ticks*1000;}
}

// ══════════════════════════════════════════════════════
// POWER-UPS (incluye nuevos)
// ══════════════════════════════════════════════════════
function getAvailablePowerUpTypes() {
  return Object.entries(POWERUP_CONFIG.types)
    .filter(([k,c]) => c.enabled && (!c.startWave || wave >= c.startWave))
    .map(([k]) => k);
}

function generatePowerUps() {
  powerUpsOnMap = [];
  if (wave < POWERUP_CONFIG.startWave) return;
  const candidates = getAvailablePowerUpTypes();
  if (!candidates.length) return;
  const toSpawn = Math.min(POWERUP_CONFIG.spawnCount, candidates.length);
  for (let i = 0; i < toSpawn; i++) {
    const typeKey = candidates[Math.floor(Math.random()*candidates.length)];
    let x, y, attempts = 0;
    do {
      x = Math.floor(Math.random()*GRID_SIZE);
      y = Math.floor(Math.random()*GRID_SIZE);
      attempts++;
    } while (attempts < 800 && (
      (x===player.x&&y===player.y) ||
      collectibles.some(c=>c.x===x&&c.y===y) ||
      messageCollectibles.some(c=>c.x===x&&c.y===y) ||
      powerUpsOnMap.some(p=>p.x===x&&p.y===y)
    ));
    powerUpsOnMap.push({ type: typeKey, x, y, expires: Date.now()+POWERUP_CONFIG.lifetime });
  }
}

function getPowerUpCost(type) { return POWERUP_CONFIG.types[type]?.cost || 0; }

function applyNewPowerUpEffect(type) {
  switch(type) {
    case 'timeSlow':
      enemySpawnConfig.normal.speed *= POWERUP_CONFIG.types.timeSlow.slowFactor;
      enemySpawnConfig.boss.speed *= POWERUP_CONFIG.types.timeSlow.slowFactor;
      registerTimeout(() => {
        enemySpawnConfig.normal.speed /= POWERUP_CONFIG.types.timeSlow.slowFactor;
        enemySpawnConfig.boss.speed /= POWERUP_CONFIG.types.timeSlow.slowFactor;
      }, POWERUP_CONFIG.types.timeSlow.duration);
      break;
    case 'doubleScore':
      doublePointsActive = true;
      registerTimeout(() => { doublePointsActive = false; }, POWERUP_CONFIG.types.doubleScore.duration);
      break;
    case 'freeze':
      enemies.forEach(e => e.speed *= 0.1);
      registerTimeout(() => {
        enemies.forEach(e => e.speed /= 0.1);
      }, POWERUP_CONFIG.types.freeze.duration);
      break;
    case 'teleporter':
      const msgCells = messageCollectibles.length > 0 ? messageCollectibles : collectibles;
      if(msgCells.length > 0) {
        const target = msgCells[Math.floor(Math.random() * msgCells.length)];
        player.x = target.x;
        player.y = target.y;
        playerDrawX = player.x * CELL_SIZE + CELL_SIZE/2;
        playerDrawY = player.y * CELL_SIZE + CELL_SIZE/2;
        createExplosion(playerDrawX, playerDrawY, 30, '#00ffff', 1.5);
        SPECIAL_SOUNDS.teleport();
      }
      break;
    case 'starShower':
      for(let i = 0; i < 15; i++) {
        collectibles.push({
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        });
      }
      createExplosion(canvas.width/2, canvas.height/2, 40, '#ffdd00', 2);
      SPECIAL_SOUNDS.starPower();
      break;
    case 'clone':
      // Clon que recolecta automaticamente por un tiempo
      const cloneInterval = setInterval(() => {
        if(gameOver || !activeEffects.some(e=>e.type==='clone')) {
          clearInterval(cloneInterval);
          return;
        }
        // Recolectar la celda mas cercana
        const allCells = [...collectibles, ...messageCollectibles];
        if(allCells.length > 0) {
          const target2 = allCells.reduce((a,b) => {
            const da = Math.abs(a.x-player.x)+Math.abs(a.y-player.y);
            const db = Math.abs(b.x-player.x)+Math.abs(b.y-player.y);
            return da < db ? a : b;
          });
          player.x = target2.x;
          player.y = target2.y;
          playerDrawX = player.x * CELL_SIZE + CELL_SIZE/2;
          playerDrawY = player.y * CELL_SIZE + CELL_SIZE/2;
          checkCollectibles();
        }
      }, 500);
      registerTimeout(() => clearInterval(cloneInterval), POWERUP_CONFIG.types.clone.duration);
      break;
  }
}

function tryActivatePowerUp(pu) {
  const cost = getPowerUpCost(pu.type);
  if (score < cost) { createFloatingText(playerDrawX, playerDrawY-25, "SIN PUNTOS", false); playSound(320,100,'square',0.6); return false; }
  const info = POWERUP_TYPES[pu.type], cfg = POWERUP_CONFIG.types[pu.type];
  if (pu.type==='shield'&&activeEffects.some(e=>e.type==='shield')) { createFloatingText(playerDrawX,playerDrawY-25,"ESCUDO YA ACTIVO",true); playSound(400,100,'triangle',0.5); return false; }
  if (pu.type.startsWith('magnet')) {
    const existingIdx = activeEffects.findIndex(e=>e.type.startsWith('magnet'));
    if (existingIdx !== -1) {
      const existing = activeEffects[existingIdx];
      const existingRadius = POWERUP_CONFIG.types[existing.type]?.radius || 0;
      if ((cfg.radius||0) > existingRadius) { activeEffects.splice(existingIdx,1); createFloatingText(playerDrawX,playerDrawY-35,"IMAN MEJORADO",true); }
      else { createFloatingText(playerDrawX,playerDrawY-25,"IMAN YA ACTIVO",true); playSound(400,100,'triangle',0.5); return false; }
    }
  }
  if (pu.type==='revive'&&hasReviveTotem) { createFloatingText(playerDrawX,playerDrawY-25,"YA TIENES REVIVE",true); score+=cost; updateUI(); return false; }
  score -= cost; updateUI();
  const px=pu.x*CELL_SIZE+CELL_SIZE/2, py=pu.y*CELL_SIZE+CELL_SIZE/2;
  floatingTexts.push(new FloatingText(px,py-15,`-${cost}`,'#ff4444',false,false,false));

  // Manejar nuevos tipos
  const newTypes = ['timeSlow', 'doubleScore', 'freeze', 'clone', 'teleporter', 'starShower'];
  if (newTypes.includes(pu.type)) {
    createFloatingText(px, py, info.name+(info.level?' '+info.level:''), true);
    applyNewPowerUpEffect(pu.type);
    powerUpsOnMap = powerUpsOnMap.filter(p=>p!==pu);
    SPECIAL_SOUNDS.powerUpActivate();
    return true;
  }

  // Tipos originales
  if (pu.type==='revive') { hasReviveTotem=true; createFloatingText(px,py,"REVIVE LISTO",true); playSound(1350,90,'sine',0.7); }
  else if (pu.type.includes('bomb')) {
    const isLeg = pu.type==='bombLegendary';
    for(let i=enemies.length-1;i>=0;i--){ if(isLeg||Math.random()<0.8){createExplosion(enemies[i].x*CELL_SIZE+CELL_SIZE/2,enemies[i].y*CELL_SIZE+CELL_SIZE/2,isLeg?25:20,'#ff4444');enemies.splice(i,1);}}
    createExplosion(px,py,isLeg?55:40,'#ff6644',1.8);
    createFloatingText(px,py,info.name+(info.level?' '+info.level:''),true,true);
    playSound(180,350,'sawtooth',0.85);
  } else { activeEffects.push({type:pu.type,expires:Date.now()+(cfg.duration||0),radius:cfg.radius||0}); createFloatingText(px,py,info.name+(info.level?' '+info.level:''),true); }
  powerUpsOnMap = powerUpsOnMap.filter(p=>p!==pu);
  return true;
}

function updateActiveEffects() {
  const now = Date.now();
  for(let i=activeEffects.length-1;i>=0;i--) if(now>=activeEffects[i].expires) activeEffects.splice(i,1);
}

function drawPowerUpsOnMap() {
  const now = Date.now();
  for(let pu of powerUpsOnMap) {
    if(now>pu.expires) continue;
    const px=pu.x*CELL_SIZE+CELL_SIZE/2, py=pu.y*CELL_SIZE+CELL_SIZE/2;
    const pulse=Math.sin(now/110)*0.07+1.0, info=POWERUP_TYPES[pu.type];
    ctx.save(); ctx.strokeStyle=info.color; ctx.lineWidth=2.0;
    const s=CELL_SIZE*0.42*pulse;
    if(pu.type.startsWith('magnet')){ctx.beginPath();ctx.moveTo(px,py-s);ctx.lineTo(px-s*0.75,py+s*0.65);ctx.lineTo(px+s*0.75,py+s*0.65);ctx.closePath();ctx.stroke();}
    else if(pu.type==='shield'){ctx.beginPath();ctx.arc(px,py,s*1.15,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(px,py,s*0.7,0,Math.PI*2);ctx.stroke();}
    else if(pu.type.includes('bomb')){ctx.beginPath();ctx.arc(px,py,s,0,Math.PI*2);ctx.stroke();}
    else if(pu.type==='revive'){ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(px-s*0.8,py-s);ctx.lineTo(px+s*0.8,py-s);ctx.moveTo(px,py-s*1.1);ctx.lineTo(px,py+s*1.1);ctx.stroke();}
    else if(pu.type==='speed'||pu.type==='timeSlow'){ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(px,py-s*1.2);ctx.lineTo(px,py+s*0.8);ctx.moveTo(px-s*0.7,py-s*0.4);ctx.lineTo(px+s*0.7,py-s*0.4);ctx.stroke();}
    else if(pu.type==='doubleScore'){ctx.font='900 18px "Press Start 2P",monospace';ctx.fillStyle=info.color;ctx.textAlign='center';ctx.fillText('x2',px,py+6);}
    else if(pu.type==='freeze'){ctx.beginPath();ctx.arc(px,py,s,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(170,221,255,0.4)';ctx.fill();}
    else if(pu.type==='teleporter'){ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(px-s*0.9,py-s*0.9);ctx.lineTo(px+s*0.9,py+s*0.9);ctx.moveTo(px+s*0.9,py-s*0.9);ctx.lineTo(px-s*0.9,py+s*0.9);ctx.stroke();}
    else if(pu.type==='starShower'){ctx.fillStyle=info.color;ctx.font='900 16px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText('*',px,py+5);}
    else if(pu.type==='clone'){ctx.beginPath();ctx.arc(px,py,s,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(px-s*0.3,py,s*0.6,0,Math.PI*2);ctx.stroke();}
    ctx.font='900 14px "Press Start 2P",monospace';ctx.fillStyle='#ffffff';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(getPowerUpCost(pu.type),px,py+s*1.2);
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════════
// DIBUJADO DE MENSAJE COLECCIONABLE MEJORADO
// ══════════════════════════════════════════════════════
function drawMessageCollectibles() {
  const now = Date.now();
  for (let cell of messageCollectibles) {
    const px = cell.x * CELL_SIZE + CELL_SIZE / 2;
    const py = cell.y * CELL_SIZE + CELL_SIZE / 2;
    let scale = 1, alpha = 1, offsetX = 0, offsetY = 0;

    const eff = parseEffectsString(cell.effects);
    const ep = cell.effectParams || {};

    if (eff.pulseAmplitude) {
      scale += Math.sin(now * 0.003 * (eff.pulseSpeed || 0.3)) * eff.pulseAmplitude;
    }
    if (eff.chaosOffsetMax) {
      offsetX = (Math.random() - 0.5) * (ep.chaosOffsetMax || eff.chaosOffsetMax);
      offsetY = (Math.random() - 0.5) * (ep.chaosOffsetMax || eff.chaosOffsetMax);
    }
    if (eff.stealthAlphaMin !== undefined) {
      alpha = Math.sin(now * 0.002 * (eff.stealthSpeed || 0.4)) * 0.5 + 0.5;
      alpha = Math.max(eff.stealthAlphaMin, alpha);
    }
    if (eff.blinkMinAlpha !== undefined) {
      alpha = Math.sin(now * 0.006 * (eff.blinkSpeed || 0.2)) > 0 ? 1 : (eff.blinkMinAlpha || 0.3);
    }
    if (eff.rotateAmplitude) {
      scale *= 1 + Math.sin(now * 0.004 * (eff.rotateSpeed || 0.02)) * (eff.rotateAmplitude || 0.15);
    }

    const s = CELL_SIZE * 0.34 * scale;
    let cellColor = cell.color;
    if (cell.fillColor === "rainbow" || cell.fillColor === "rainbow_fast" || cell.fillColor === "rainbow_slow") {
      const speed = cell.fillColor === "rainbow_fast" ? 0.5 : (cell.fillColor === "rainbow_slow" ? 0.1 : (cell.rainbowSpeed || 0.5));
      cellColor = `hsl(${(now * speed + (cell.x + cell.y) * 5) % 360},90%,55%)`;
    } else if (cell.fillColor === "palette" && cell.palette) {
      const pal = PALETTES[cell.palette];
      if (pal && Array.isArray(pal)) {
        cellColor = pal[(cell.x + cell.y + Math.floor(now/200)) % pal.length];
      }
    }

    ctx.save();
    ctx.globalAlpha = alpha;

    const finalGlowRadius = ep.glowRadius !== undefined ? ep.glowRadius : eff.glowRadius;
    if (finalGlowRadius > 0) {
      const gr = CELL_SIZE * finalGlowRadius * 0.4;
      const grd = ctx.createRadialGradient(px + offsetX, py + offsetY, 0, px + offsetX, py + offsetY, gr);
      let rawGlowColor = ep.glowColor !== undefined ? ep.glowColor : (eff.glowColor || '#ffffff');
      ctx.save();
      ctx.fillStyle = rawGlowColor;
      const parsedColor = ctx.fillStyle;
      ctx.restore();
      let safeGlowColor;
      if (parsedColor === 'transparent' || parsedColor === 'rgba(0, 0, 0, 0)') {
        safeGlowColor = 'rgba(255, 255, 255, 0)';
      } else if (parsedColor.startsWith('rgb(')) {
        safeGlowColor = parsedColor.replace('rgb(', 'rgba(').replace(')', ', 0.53)');
      } else if (parsedColor.startsWith('#')) {
        safeGlowColor = parsedColor + '88';
      } else {
        safeGlowColor = 'rgba(255, 255, 255, 0.53)';
      }
      grd.addColorStop(0, safeGlowColor);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(px + offsetX, py + offsetY, gr, 0, Math.PI * 2);
      ctx.fill();
    }

    if (cell.effects && cell.effects.includes('boss')) {
      const orbitAngle = now * 0.004 + cell.x * 0.5;
      for (let i = 0; i < 3; i++) {
        const angle = orbitAngle + i * Math.PI * 2 / 3;
        const ox = px + Math.cos(angle) * s * 1.5;
        const oy = py + Math.sin(angle) * s * 1.5;
        ctx.fillStyle = 'rgba(255,255,100,0.6)';
        ctx.beginPath();
        ctx.arc(ox, oy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.fillStyle = cellColor || MESSAGE_CONFIG.defaultFillColor;
    ctx.beginPath(); ctx.arc(px + offsetX, py + offsetY, s, 0, Math.PI * 2); ctx.fill();
    if (cell.strokeColor && cell.strokeColor.mode === "fixed") {
      ctx.strokeStyle = cell.strokeColor.value;
      ctx.lineWidth = cell.strokeColor.width || 1;
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════════
// JUGADOR
// ══════════════════════════════════════════════════════
function drawPlayer() {
  const px=playerDrawX, py=playerDrawY+Math.sin(Date.now()*0.005)*3;
  const size=CELL_SIZE*0.72, invulnerable=Date.now()<invulnerableUntil;
  const blink=invulnerable&&Math.floor(Date.now()/100)%2===0;
  let angleDiff=targetAngle-currentPlayerAngle;
  angleDiff=Math.atan2(Math.sin(angleDiff),Math.cos(angleDiff));
  currentPlayerAngle+=angleDiff*0.15;
  currentTiltX+=(targetTiltX-currentTiltX)*0.2;
  currentTiltZ+=(targetTiltZ-currentTiltZ)*0.2;
  ctx.save(); ctx.translate(px,py); ctx.rotate(currentPlayerAngle);
  ctx.transform(1,currentTiltZ*0.15,currentTiltX*0.15,1,0,0);
  if(blink)ctx.globalAlpha=0.5;
  const hasShield=activeEffects.some(e=>e.type==='shield');
  if(hasShield){ctx.beginPath();ctx.arc(0,0,size*1.1,0,Math.PI*2);ctx.fillStyle='rgba(170,221,255,0.25)';ctx.fill();ctx.strokeStyle='#aaddff';ctx.lineWidth=2.5;ctx.stroke();ctx.beginPath();ctx.arc(0,0,size*1.05,0,Math.PI*2);ctx.stroke();}
  if(activeEffects.some(e=>e.type.startsWith('magnet'))){
    const magnet=activeEffects.find(e=>e.type.startsWith('magnet'));
    const radius=POWERUP_CONFIG.types[magnet.type]?.radius||0;
    const step=CELL_SIZE*(radius>=999?2:radius*0.8);
    ctx.strokeStyle='#44ffcc';ctx.lineWidth=1.2;ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(0,0,step,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,step*0.75,0,Math.PI*2);ctx.stroke();
  }
  ctx.beginPath();ctx.moveTo(0,-size*0.85);ctx.lineTo(-size*0.55,size*0.4);ctx.lineTo(0,size*0.2);ctx.lineTo(size*0.55,size*0.4);ctx.closePath();ctx.fillStyle='transparent';ctx.fill();ctx.strokeStyle='skyblue';ctx.lineWidth=2.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-size*0.5,size*0.1);ctx.lineTo(-size*0.95,size*0.5);ctx.lineTo(-size*0.45,size*0.5);ctx.fillStyle='transparent';ctx.fill();
  ctx.beginPath();ctx.moveTo(size*0.5,size*0.1);ctx.lineTo(size*0.95,size*0.5);ctx.lineTo(size*0.45,size*0.5);ctx.fill();
  ctx.beginPath();ctx.arc(0,-size*0.25,size*0.2,0,Math.PI*2);ctx.fillStyle='transparent';ctx.fill();ctx.strokeStyle='transparent';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle='transparent';ctx.beginPath();ctx.arc(0,-size*0.28,size*0.09,0,Math.PI*2);ctx.fill();
  if(hasReviveTotem){ctx.fillStyle='#88ff88';ctx.beginPath();ctx.arc(size*0.55,-size*0.65,size*0.15,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(size*0.55,-size*0.65,size*0.07,0,Math.PI*2);ctx.fill();}
  ctx.restore();
  if(playerGlow>0){ctx.fillStyle=`rgba(180,255,255,${playerGlow/45})`;ctx.beginPath();ctx.arc(px,py,CELL_SIZE*1.3,0,Math.PI*2);ctx.fill();playerGlow--;}
}

function drawActiveEffectsHUD() {
  if(!activeEffects.length)return;
  let y=40; const x=canvas.width-20, now=Date.now();
  ctx.save(); ctx.font='14px "Press Start 2P",monospace'; ctx.textAlign='right';
  for(let ef of activeEffects){
    const info=POWERUP_TYPES[ef.type], left=Math.ceil((ef.expires-now)/1000);
    const text=(info.name||ef.type).replace('IMAN','IMAN').replace('VELOCIDAD','VEL').replace('TELETRANSPORTE','TELE')+(info.level?' '+info.level:'')+' '+left+'s';
    ctx.fillStyle=info.color||'#ffffff'; ctx.fillText(text,x-10,y); y+=22;
  }
  ctx.restore();
}

// ALERTAS
// ══════════════════════════════════════════════════════
function addWallAlert(dir,isBoss,coord,delay){wallAlerts.push({dir,isBoss,coord,expiryTime:Date.now()+delay});}
function drawWallAlerts() {
  const now=Date.now();
  for(let i=wallAlerts.length-1;i>=0;i--){
    const a=wallAlerts[i];if(now>=a.expiryTime){wallAlerts.splice(i,1);continue;}
    const remaining=(a.expiryTime-now)/(a.isBoss?enemySpawnConfig.boss.alertTimeMs:enemySpawnConfig.normal.alertTimeMs);
    const alpha=Math.min(0.95,remaining*0.9+0.2);
    ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=a.isBoss?'#ff66ff':'#ffff44';ctx.lineWidth=a.isBoss?9:6;
    if(a.dir==='down'){const x=a.coord*CELL_SIZE+CELL_SIZE/2;ctx.beginPath();ctx.moveTo(x-CELL_SIZE*1.8,20);ctx.lineTo(x+CELL_SIZE*1.8,20);ctx.stroke();}
    else if(a.dir==='up'){const x=a.coord*CELL_SIZE+CELL_SIZE/2;ctx.beginPath();ctx.moveTo(x-CELL_SIZE*1.8,canvas.height-20);ctx.lineTo(x+CELL_SIZE*1.8,canvas.height-20);ctx.stroke();}
    else if(a.dir==='left'){const y=a.coord*CELL_SIZE+CELL_SIZE/2;ctx.beginPath();ctx.moveTo(canvas.width-20,y-CELL_SIZE*1.8);ctx.lineTo(canvas.width-20,y+CELL_SIZE*1.8);ctx.stroke();}
    else if(a.dir==='right'){const y=a.coord*CELL_SIZE+CELL_SIZE/2;ctx.beginPath();ctx.moveTo(20,y-CELL_SIZE*1.8);ctx.lineTo(20,y+CELL_SIZE*1.8);ctx.stroke();}
    if(a.isBoss){ctx.fillStyle='#ff66ff';ctx.font='bold 22px "Press Start 2P",monospace';ctx.fillText('BOSS',canvas.width/2,48);}
    ctx.restore();
  }
}

function spawnEnemy(dir,isBoss=false) {
  let coord,enemy;const size=isBoss?2:1,maxIndex=GRID_SIZE-(size-1);
  if(dir==='down'){coord=Math.floor(Math.random()*maxIndex);enemy=new Enemy(dir,isBoss);enemy.x=coord;enemy.y=-(size-1);}
  else if(dir==='up'){coord=Math.floor(Math.random()*maxIndex);enemy=new Enemy(dir,isBoss);enemy.x=coord;enemy.y=GRID_SIZE;}
  else if(dir==='right'){coord=Math.floor(Math.random()*maxIndex);enemy=new Enemy(dir,isBoss);enemy.x=-(size-1);enemy.y=coord;}
  else{coord=Math.floor(Math.random()*maxIndex);enemy=new Enemy(dir,isBoss);enemy.x=GRID_SIZE;enemy.y=coord;}
  const delay=isBoss?enemySpawnConfig.boss.alertTimeMs:enemySpawnConfig.normal.alertTimeMs;
  if(isBoss){addWallAlert(dir,true,coord,delay);addWallAlert(dir,true,coord+1,delay);}
  else addWallAlert(dir,false,coord,delay);
  registerTimeout(()=>{if(!gameOver)enemies.push(enemy);},delay);
}

function triggerBossWave() {
  if(gameOver)return;lastBossTime=Date.now();
  const dirs=['down','up','left','right'];
  dirs.forEach((d,idx)=>registerTimeout(()=>{if(!gameOver)spawnEnemy(d,true);},idx*380));
}

// ══════════════════════════════════════════════════════
// COLISION
// ══════════════════════════════════════════════════════
function checkEnemyCollision() {
  if(isInSafeZone()||Date.now()<invulnerableUntil)return false;
  for(let e of enemies){
    const cells=e.getOccupiedCells();
    for(let cell of cells){
      if(cell.x<0||cell.x>=GRID_SIZE||cell.y<0||cell.y>=GRID_SIZE)continue;
      if(player.x===cell.x&&player.y===cell.y){
        if(hasReviveTotem){hasReviveTotem=false;revivesUsedThisGame++;enemies=[];createExplosion(playerDrawX,playerDrawY,50,'#88ff88',2.2);createFloatingText(canvas.width/2,canvas.height/2-50,"REVIVIDO",true,true);invulnerableUntil=Date.now()+1500;checkAchievements();return false;}
        const shieldIdx=activeEffects.findIndex(ef=>ef.type==='shield');
        if(shieldIdx!==-1){activeEffects.splice(shieldIdx,1);const idx=enemies.indexOf(e);if(idx!==-1){createExplosion(e.x*CELL_SIZE+CELL_SIZE/2,e.y*CELL_SIZE+CELL_SIZE/2,25,'#aaddff');enemies.splice(idx,1);}createFloatingText(playerDrawX,playerDrawY-20,"ESCUDO ROTO",true);SPECIAL_SOUNDS.shieldBreak();invulnerableUntil=Date.now()+800;return false;}
        gameOver=true;stopMotor();createExplosion(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,50,'#ff0000',1.5);playHitSound();return true;
      }
    }
  }
  return false;
}

// ══════════════════════════════════════════════════════
// GENERACION DE COLECCIONABLES
// ══════════════════════════════════════════════════════
function generateCollectibles() {
  collectibles = [];
  messageCollectibles = [];
  const normalCount = Math.max(3, Math.floor(GRID_SIZE * 0.1));
  for(let i=0;i<normalCount;i++){
    let x,y,attempts=0;
    do{x=Math.floor(Math.random()*GRID_SIZE);y=Math.floor(Math.random()*GRID_SIZE);attempts++;}
    while(attempts<800&&((x===player.x&&y===player.y)||collectibles.some(c=>c.x===x&&c.y===y)));
    if(attempts<800)collectibles.push({x,y});
  }
  if (currentWaveMessage && GRID_SIZE >= 8) {
    const coords = messageToCoordsAdvanced(currentWaveMessage, currentWaveConfig, GRID_SIZE);
    for(let c of coords){
      if(c.x>=0&&c.x<GRID_SIZE&&c.y>=0&&c.y<GRID_SIZE&&!(c.x===player.x&&c.y===player.y)){
        if(!collectibles.some(p=>p.x===c.x&&p.y===c.y)&&!powerUpsOnMap.some(p=>p.x===c.x&&p.y===c.y))
          messageCollectibles.push(c);
      }
    }
  }
}

function updateUI() {
  document.getElementById('score').textContent = String(score).padStart(6,'0');
  document.getElementById('highScore').textContent = String(highScore).padStart(6,'0');
  document.getElementById('waveSpan').textContent = wave;
  document.getElementById('evadedSpan').textContent = evadedThisWave;
  const msgEl = document.getElementById('msgSpan');
  if (MESSAGE_CONFIG.showCurrentMsgInHUD && currentWaveMessage) {
    const achCount = Object.keys(unlockedAchievements).length;
    const totalAch = Object.keys(ACHIEVEMENTS).length;
    msgEl.textContent = 'MSG: ' + currentWaveMessage + (achCount > 0 ? ' | Logros:'+achCount+'/'+totalAch : '');
    msgEl.style.display = '';
  } else {
    msgEl.style.display = 'none';
  }
}

// ══════════════════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════════════════
function resizeGameElements() {
  CELL_SIZE = canvas.width / GRID_SIZE;
  player.x = Math.floor(GRID_SIZE/2);
  player.y = Math.floor(GRID_SIZE/2);
  playerDrawX = player.x * CELL_SIZE + CELL_SIZE/2;
  playerDrawY = player.y * CELL_SIZE + CELL_SIZE/2;
  moving = false; pendingDirection = null; currentDirection = null;
  enemies = []; wallAlerts = [];
  generateCollectibles();
  lastBossTime = Date.now();
  powerUpsOnMap = [];
  activeEffects = [];
  updateUI();
}

function moveCellTowardsPlayer(cell, magnetRadius) {
  const step = magnetRadius >= 999 ? 2 : 1;
  cell.x += Math.sign(player.x - cell.x) * step;
  cell.y += Math.sign(player.y - cell.y) * step;
}

// ══════════════════════════════════════════════════════
// CHECK COLECCIONABLES
// ══════════════════════════════════════════════════════
function checkCollectibles() {
  let magnetRadius = 0;
  for(let ef of activeEffects)
    if(ef.type.startsWith('magnet')&&(POWERUP_CONFIG.types[ef.type]?.radius||0)>magnetRadius)
      magnetRadius = POWERUP_CONFIG.types[ef.type].radius||0;

  function inRange(cx,cy){
    if(magnetRadius===0)return(cx===player.x&&cy===player.y);
    const dx=Math.abs(cx-player.x),dy=Math.abs(cy-player.y);
    if(magnetRadius>=999)return dx<=GRID_SIZE&&dy<=GRID_SIZE;
    return dx<=magnetRadius&&dy<=magnetRadius;
  }

  for(let i=collectibles.length-1;i>=0;i--){
    if(inRange(collectibles[i].x,collectibles[i].y)){
      if(magnetRadius>0&&(collectibles[i].x!==player.x||collectibles[i].y!==player.y)){
        moveCellTowardsPlayer(collectibles[i],magnetRadius);
      }
      if(collectibles[i].x===player.x&&collectibles[i].y===player.y){
        let pts = doublePointsActive ? 16 : 8;
        score+=pts; scoreSinceLastDoubleBonus+=pts;
        createExplosion(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,15,'#ffd700');
        createFloatingText(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,pts);
        playNormalCollect();
        collectibles.splice(i,1);
        if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}
        updateUI();
        if(collectibles.length===0)completeWave();
        return;
      }
    }
  }

  for(let i=messageCollectibles.length-1;i>=0;i--){
    const cell = messageCollectibles[i];
    if(inRange(cell.x,cell.y)){
      if(magnetRadius>0&&(cell.x!==player.x||cell.y!==player.y)){
        moveCellTowardsPlayer(cell,magnetRadius);
      }
      if(cell.x===player.x&&cell.y===player.y){
        const totalCells = messageCollectibles.length + 1;
        const collectedCount = totalCells - messageCollectibles.length;
        let pts = calculatePointsPerCell(currentWaveConfig, comboCount, totalCells, collectedCount, {x:cell.x,y:cell.y}, GRID_SIZE);
        if(doublePointsActive) pts *= 2;
        score+=pts; scoreSinceLastDoubleBonus+=pts;
        premiumCollectedSinceLastTripleBonus++;
        totalMessageCellsCollected++;
        localStorage.setItem('odparTotalCells', totalMessageCellsCollected.toString());
        createExplosion(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,20,'#ff88ff');
        createFloatingText(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,pts,true);
        playPremiumCollect();
        messageCollectibles.splice(i,1);
        comboCount++;
        if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}
        updateUI();

        if(messageCollectibles.length===0&&currentWaveMessage){
          const elapsed = Date.now() - waveStartTime;
          let bonus = calculateCompletionBonus(currentWaveConfig, totalCells, comboCount, elapsed);
          if(doublePointsActive) bonus *= 2;
          if(currentWaveConfig.bonusOnCompleteEnabled!==false&&bonus>0){
            score+=bonus;
            if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}
            createExplosion(canvas.width/2,canvas.height/2,50,'#ffd700',2.5);
            floatingTexts.push(new FloatingText(canvas.width/2,canvas.height/2-40,`MSG COMPLETO! +${bonus}`,'#FFD700',true,true,true));
            playTripleBonusCollect();
            updateUI();
          }
        }
        return;
      }
    }
  }

  for(let i=powerUpsOnMap.length-1;i>=0;i--){
    if(powerUpsOnMap[i].x===player.x&&powerUpsOnMap[i].y===player.y){ tryActivatePowerUp(powerUpsOnMap[i]); return; }
  }
}

// ══════════════════════════════════════════════════════
// EVENTOS DE OLEADA
// ══════════════════════════════════════════════════════
function triggerWaveEvent(waveNum) {
  const event = WAVE_EVENTS[waveNum];
  if(!event) return;

  const msg = new FloatingText(
    canvas.width/2, canvas.height/2 - 60,
    event.message, '#FFD700', true, true, false
  );
  msg.life = 180;
  floatingTexts.push(msg);

  switch(event.type) {
    case 'starfall':
      for(let i = 0; i < 30; i++) {
        registerTimeout(() => {
          collectibles.push({
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE)
          });
        }, i * 50);
      }
      score += event.bonus || 1000;
      break;
    case 'doubleScore':
      doublePointsActive = true;
      registerTimeout(() => { doublePointsActive = false; }, event.duration || 15000);
      break;
    case 'weather':
      const weather = WEATHER_EFFECTS[event.weather];
      if(weather && weather.active) {
        currentWeather = weather;
        if(weather.init) weather.init();
      }
      break;
    case 'bossRush':
      for(let i = 0; i < (event.count || 8); i++) {
        registerTimeout(() => { if(!gameOver) spawnEnemy(['down','up','left','right'][i%4], true); }, i * 300);
      }
      break;
    case 'megabomb':
      enemies = [];
      createExplosion(canvas.width/2, canvas.height/2, 60, '#ff6644', 2.5);
      SPECIAL_SOUNDS.megaExplosion();
      break;
    case 'legendary':
      // Todos los power-ups se vuelven legendarios temporalmente
      const origCosts = {};
      ['magnetCommon','magnetEpic','bombNormal'].forEach(t => {
        if(POWERUP_CONFIG.types[t]) {
          origCosts[t] = POWERUP_CONFIG.types[t].cost;
          POWERUP_CONFIG.types[t].cost = 0;
        }
      });
      registerTimeout(() => {
        Object.keys(origCosts).forEach(t => {
          POWERUP_CONFIG.types[t].cost = origCosts[t];
        });
      }, event.duration || 20000);
      break;
    case 'mirror':
      const mirrorMap = { up:'down', down:'up', left:'right', right:'left', 'up-left':'down-right', 'up-right':'down-left', 'down-left':'up-right', 'down-right':'up-left' };
      const originalStartMove = startMove;
      startMove = function(dir) { originalStartMove(mirrorMap[dir] || dir); };
      registerTimeout(() => { startMove = originalStartMove; }, 15000);
      break;
    case 'ultimate':
      Object.keys(POWERUP_CONFIG.types).forEach(type => {
        if(POWERUP_CONFIG.types[type].enabled && !['revive','bombNormal','bombLegendary'].includes(type)) {
          activeEffects.push({
            type: type,
            expires: Date.now() + 20000,
            radius: POWERUP_CONFIG.types[type].radius || 0
          });
        }
      });
      doublePointsActive = true;
      SPECIAL_SOUNDS.levelUp();
      break;
  }
  updateUI();
}

// ══════════════════════════════════════════════════════
// COMPLETE WAVE
// ══════════════════════════════════════════════════════
function completeWave() {
  if(gameOver)return;
  playLevelComplete();

  if(currentWaveConfig.bossRush) {
    totalBossWavesSurvived++;
    localStorage.setItem('odparBossWaves', totalBossWavesSurvived.toString());
  }

  checkAchievements();

  wave++; evadedThisWave=0; comboCount=0;
  waveStartTime = Date.now();

  currentWaveConfig = getMessageConfig(wave);
  currentWaveMessage = currentWaveConfig.text;

  updateDifficulty();
  applyOleadaModifiers(currentWaveConfig);

  const oldSize = GRID_SIZE;
  let newSize;
  if(wave > 1){
    if(MESSAGE_CONFIG.autoGrid && currentWaveMessage){
      newSize = calculateGridSizeForMessage(currentWaveMessage, currentWaveConfig.mapSizeMode || "fittext");
      if(newSize < 18 && Math.random()<0.5) newSize += Math.floor(Math.random()*5);
    } else {
      newSize = (wave%5===0) ? 20+Math.floor(Math.random()*11) : 10+Math.floor(Math.random()*11);
    }
    newSize = Math.max(MESSAGE_CONFIG.gridMin, Math.min(MESSAGE_CONFIG.gridMax, newSize));
  } else {
    newSize = INITIAL_GRID_SIZE;
  }
  GRID_SIZE = newSize;

  adjustZonesToNewGrid(oldSize, newSize);
  resizeGameElements();
  playerDrawX = player.x*CELL_SIZE+CELL_SIZE/2;
  playerDrawY = player.y*CELL_SIZE+CELL_SIZE/2;

  glitchActive=true; glitchTimer=40; glitchIntensity=currentWaveConfig.glitchIntensity||1;
  playerGlow = currentWaveConfig.playerGlowOnStart||50;
  createExplosion(playerDrawX,playerDrawY,55,'#00ffff',2.0);
  createExplosion(playerDrawX,playerDrawY,35,'#ffffff',1.4);
  createFloatingText(playerDrawX,playerDrawY-65,`GRID: ${GRID_SIZE}!`,false,false);
  playSound(1200,80,'sine',0.6); setTimeout(()=>playSound(1800,120,'sawtooth',0.5),80);

  bonusZoneCurrentWaveCount=0; doubleBonusZoneCurrentWaveCount=0; tripleBonusZoneCurrentWaveCount=0;
  updateUI();
  createWaveCompleteText(wave-1);
  generatePowerUps();

  if(WAVE_EVENTS[wave]) {
    registerTimeout(() => triggerWaveEvent(wave), 1000);
  }

  if(wave % 8 === 0 && !currentWeather) {
    applyRandomWeather();
  }
  if(wave > 20 && Math.random() < 0.3) {
    applyRandomWeather();
  }

  registerTimeout(()=>{
    if(!gameOver){
      if(!safeZone&&!safeZoneDisabledForWave) generateSafeZone();
      if(Math.random()<0.45||(Date.now()-lastBossTime>enemySpawnConfig.boss.interval)) triggerBossWave();
    }
  },500);
}

// ══════════════════════════════════════════════════════
// MOVIMIENTO
// ══════════════════════════════════════════════════════
function executeMove(dir) {
  let newX=player.x, newY=player.y;
  switch(dir){
    case'up':newY--;break;case'down':newY++;break;case'left':newX--;break;case'right':newX++;break;
    case'up-left':newX--;newY--;break;case'up-right':newX++;newY--;break;
    case'down-left':newX--;newY++;break;case'down-right':newX++;newY++;break;
  }
  if(newX<0||newX>=GRID_SIZE||newY<0||newY>=GRID_SIZE)return false;
  moving=true;
  let startX=playerDrawX,startY=playerDrawY,endX=newX*CELL_SIZE+CELL_SIZE/2,endY=newY*CELL_SIZE+CELL_SIZE/2;
  player.x=newX; player.y=newY;
  const speedActive=activeEffects.some(e=>e.type==='speed');
  let duration=Math.max(MIN_MOVE_DELAY,speedActive?currentMoveDelay/2:currentMoveDelay);
  let animStart=performance.now();
  function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  function animateMove(now){
    let elapsed=now-animStart,t=Math.min(1,elapsed/duration),ease=easeInOutCubic(t);
    playerDrawX=startX+(endX-startX)*ease;playerDrawY=startY+(endY-startY)*ease;
    if(t<1)requestAnimationFrame(animateMove);
    else{playerDrawX=endX;playerDrawY=endY;moving=false;lastMoveTimestamp=performance.now();if(currentMoveDelay>MIN_MOVE_DELAY)currentMoveDelay=Math.max(MIN_MOVE_DELAY,currentMoveDelay*0.9);startNextMove();}
  }
  requestAnimationFrame(animateMove);
  playMoveSound(); startMotor();
  const tiltMap={up:[-0.3,0],down:[0.3,0],left:[0,-0.4],right:[0,0.4],'up-left':[-0.2,-0.3],'up-right':[-0.2,0.3],'down-left':[0.2,-0.3],'down-right':[0.2,0.3]};
  const [tx,tz]=tiltMap[dir]||[0,0];targetTiltX=tx;targetTiltZ=tz;
  setTimeout(()=>{targetTiltX=0;targetTiltZ=0;},200);
  if(rotationResetTimer)clearTimeout(rotationResetTimer);
  const rotMap={up:'rotateX(48deg)',down:'rotateX(35deg)',left:'rotateX(40deg) rotateY(-8deg)',right:'rotateX(40deg) rotateY(8deg)','up-left':'rotateX(46deg) rotateY(-7deg)','up-right':'rotateX(46deg) rotateY(7deg)','down-left':'rotateX(37deg) rotateY(-7deg)','down-right':'rotateX(37deg) rotateY(7deg)'};
  canvas.style.transform=rotMap[dir]||'rotateX(40deg)';
  rotationResetTimer=setTimeout(()=>{canvas.style.transform='rotateX(40deg)';},200);
  const angleMap={up:0,right:Math.PI/2,down:Math.PI,left:-Math.PI/2,'up-right':Math.PI/4,'up-left':-Math.PI/4,'down-right':3*Math.PI/4,'down-left':-3*Math.PI/4};
  targetAngle=angleMap[dir]||0;
  const backAngleMap={up:Math.PI/2,down:-Math.PI/2,left:0,right:Math.PI,'up-right':-3*Math.PI/4,'up-left':3*Math.PI/4,'down-right':-Math.PI/4,'down-left':Math.PI/4};
  let backAngle=backAngleMap[dir]||0;
  for(let i=0;i<6;i++){let offX=(Math.random()-0.5)*12,offY=(Math.random()-0.5)*12;createSpark(playerDrawX+offX,playerDrawY+offY,backAngle+(Math.random()-0.5)*0.8);}
  const nowInSafe=isInSafeZone();
  if(nowInSafe&&!wasInSafeZone){playSafeZoneEnter();createExplosion(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,20,'#00ffcc',1.2);}
  wasInSafeZone=nowInSafe;
  checkCollectibles();
  return true;
}

function startNextMove(){if(moving||gameOver)return;let nextDir=pendingDirection||currentDirection;if(!nextDir)return;pendingDirection=null;if(currentDirection!==nextDir)currentMoveDelay=110;currentDirection=nextDir;executeMove(currentDirection);}
function startMove(dir){if(gameOver){resetGame();return;}if(moving){pendingDirection=dir;return;}if(currentDirection!==dir)currentMoveDelay=110;currentDirection=dir;executeMove(dir);}
function cancelCurrentMovement(){if(moving)pendingDirection=null;currentDirection=null;pendingDirection=null;stopMotor();currentMoveDelay=110;}

// ══════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════
function resetGame() {
  gameOver=false;powerUpsOnMap=[];activeEffects=[];hasReviveTotem=false;invulnerableUntil=0;
  revivesUsedThisGame=0;
  clearAllTimeouts();cancelCurrentMovement();
  GRID_SIZE=INITIAL_GRID_SIZE;wave=1;evadedThisWave=0;comboCount=0;
  currentWaveConfig=getMessageConfig(1);currentWaveMessage=currentWaveConfig.text;
  MESSAGE_CONFIG._fallbackIndex=0;
  safeZoneDisabledForWave=false;doublePointsActive=false;
  POWERUP_CONFIG.spawnCount=3;
  safeZone=null;safeZoneTimer=0;wasInSafeZone=false;
  bonusZone=null;bonusZoneTimer=0;
  doubleBonusZone=null;doubleBonusZoneTimer=0;lastDoubleBonusTick=0;lastDoubleBonusSpawnTime=0;evadedSinceLastDoubleBonus=0;scoreSinceLastDoubleBonus=0;
  tripleBonusZone=null;tripleBonusZoneTimer=0;lastTripleBonusTick=0;lastTripleBonusSpawnTime=0;premiumCollectedSinceLastTripleBonus=0;bossesEvadedSinceLastTripleBonus=0;
  bonusZoneCurrentWaveCount=0;doubleBonusZoneCurrentWaveCount=0;tripleBonusZoneCurrentWaveCount=0;
  score=0;lastBossTime=Date.now();premiumFlash=0;playerGlow=0;
  waveStartTime=Date.now();
  resizeGameElements();moving=false;pendingDirection=null;
  particles=[];sparkParticles=[];floatingTexts=[];
  nextNormalSpawnTime=Date.now()+3000;currentDirection=null;
  targetAngle=0;currentPlayerAngle=0;targetTiltX=0;currentTiltX=0;targetTiltZ=0;currentTiltZ=0;
  currentMoveDelay=150;lastHumTime=0;
  currentWeather=null;
  updateDifficulty();updateUI();
  if(rotationResetTimer)clearTimeout(rotationResetTimer);
  canvas.style.transform='rotateX(40deg)';stopMotor();
}

// ══════════════════════════════════════════════════════
// GLITCH
// ══════════════════════════════════════════════════════
function drawGlitchEffect() {
  if(!glitchActive||glitchTimer<=0)return;
  glitchTimer--;const intensity=glitchIntensity*(glitchTimer/2);
  ctx.save();ctx.globalAlpha=intensity*1;
  for(let i=0;i<6;i++){const offset=(Math.random()-0.5)*18*intensity;const sliceY=Math.random()*canvas.height;const sliceH=8+Math.random()*22;ctx.drawImage(canvas,0,sliceY,canvas.width,sliceH,offset,sliceY,canvas.width,sliceH);}
  if(Math.random()<0.4){ctx.fillStyle=Math.random()<0.1?'#00ffff':'#ff00ff';ctx.fillRect(0,0,canvas.width,canvas.height);}
  ctx.restore();if(glitchTimer<=0){glitchActive=false;glitchIntensity=0;}
}

// ══════════════════════════════════════════════════════
// DRAW (con clima)
// ══════════════════════════════════════════════════════
function draw() {
  const grad=ctx.createRadialGradient(canvas.width/2,canvas.height/2,80,canvas.width/2,canvas.height/2,canvas.width/1.5);
  grad.addColorStop(0,'#0a1428');grad.addColorStop(1,'#03060c');
  ctx.fillStyle=grad;ctx.fillRect(0,0,canvas.width,canvas.height);
  if(premiumFlash>0){ctx.fillStyle=`rgba(255,0,255,${Math.min(0.35,premiumFlash/45)})`;ctx.fillRect(0,0,canvas.width,canvas.height);premiumFlash--;}
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(let i=0;i<=GRID_SIZE;i++){let pos=i*CELL_SIZE;ctx.beginPath();ctx.moveTo(pos,0);ctx.lineTo(pos,canvas.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,pos);ctx.lineTo(canvas.width,pos);ctx.stroke();}
  ctx.restore();
  drawSafeZone();drawBonusZone();drawDoubleBonusZone();drawTripleBonusZone();
  drawPowerUpsOnMap();
  for(let c of collectibles){const px=c.x*CELL_SIZE+CELL_SIZE/2,py=c.y*CELL_SIZE+CELL_SIZE/2;ctx.fillStyle='#ffcc33';ctx.beginPath();ctx.arc(px,py,CELL_SIZE*0.33,0,Math.PI*2);ctx.fill();}
  drawMessageCollectibles();
  for(let e of enemies) e.draw();
  drawWallAlerts();
  for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].life<=0)particles.splice(i,1);}
  for(let i=sparkParticles.length-1;i>=0;i--){sparkParticles[i].update();sparkParticles[i].draw();if(sparkParticles[i].life<=0)sparkParticles.splice(i,1);}
  drawPlayer();
  drawActiveEffectsHUD();
  for(let i=floatingTexts.length-1;i>=0;i--){floatingTexts[i].update();floatingTexts[i].draw();if(floatingTexts[i].life<=0)floatingTexts.splice(i,1);}
  if(!moving){drawGlitchEffect();playerDrawX=player.x*CELL_SIZE+CELL_SIZE/2;playerDrawY=player.y*CELL_SIZE+CELL_SIZE/2;}
  if(currentWeather && currentWeather.draw) {
    currentWeather.draw(ctx);
  }
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font='900 42px "Press Start 2P",monospace';ctx.fillStyle='#ff4466';ctx.textAlign='center';
    ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-40);
    ctx.font='18px "Press Start 2P",monospace';ctx.fillStyle='#ffffff';
    ctx.fillText('Toca cualquier boton',canvas.width/2,canvas.height/2+20);
    ctx.fillText('para REINICIAR',canvas.width/2,canvas.height/2+55);
  }
}

function createButton(svg){const btn=document.createElement('div');btn.className='boton';btn.innerHTML=svg;return btn;}
function createEmptyButton(){const btn=document.createElement('div');btn.className='boton vacio';return btn;}
const svgUp=`<svg viewBox="0 0 24 24"><path d="M12 5l7 8h-4v6h-6v-6H5l7-8z"/></svg>`;
const svgDown=`<svg viewBox="0 0 24 24"><path d="M12 19l-7-8h4V5h6v6h4l-7 8z"/></svg>`;
const svgLeft=`<svg viewBox="0 0 24 24"><path d="M5 12l8-7v4h6v6h-6v4l-8-7z"/></svg>`;
const svgRight=`<svg viewBox="0 0 24 24"><path d="M19 12l-8 7v-4H5v-6h6V5l8 7z"/></svg>`;
const svgUpLeft=`<svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 6v8M6 6h8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const svgUpRight=`<svg viewBox="0 0 24 24"><path d="M18 6L6 18M18 6v8M18 6h-8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const svgDownLeft=`<svg viewBox="0 0 24 24"><path d="M6 18l12-12M6 18v-8M6 18h8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const svgDownRight=`<svg viewBox="0 0 24 24"><path d="M18 18L6 6M18 18v-8M18 18h-8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const upLeftBtn=createButton(svgUpLeft),upBtn=createButton(svgUp),upRightBtn=createButton(svgUpRight);
const leftBtn=createButton(svgLeft),centerEmpty=createEmptyButton(),rightBtn=createButton(svgRight);
const downLeftBtn=createButton(svgDownLeft),downBtn=createButton(svgDown),downRightBtn=createButton(svgDownRight);
const centerbotones=document.getElementById('centerbotones');
centerbotones.innerHTML='';
const f1=document.createElement('section');f1.className='fila-botones';f1.appendChild(upLeftBtn);f1.appendChild(upBtn);f1.appendChild(upRightBtn);
const f2=document.createElement('section');f2.className='fila-botones';f2.appendChild(leftBtn);f2.appendChild(centerEmpty);f2.appendChild(rightBtn);
const f3=document.createElement('section');f3.className='fila-botones';f3.appendChild(downLeftBtn);f3.appendChild(downBtn);f3.appendChild(downRightBtn);
centerbotones.appendChild(f1);centerbotones.appendChild(f2);centerbotones.appendChild(f3);

const buttonMap=new Map([[upLeftBtn,'up-left'],[upBtn,'up'],[upRightBtn,'up-right'],[leftBtn,'left'],[rightBtn,'right'],[downLeftBtn,'down-left'],[downBtn,'down'],[downRightBtn,'down-right']]);

function activateButton(btn,dir){if(currentActiveBtn===btn)return;if(currentActiveBtn)currentActiveBtn.classList.remove('activo');currentActiveBtn=btn;startMove(dir);btn.classList.add('activo');}
function deactivateAll(){if(currentActiveBtn)currentActiveBtn.classList.remove('activo');currentActiveBtn=null;cancelCurrentMovement();}
function getButtonAt(x,y){const el=document.elementFromPoint(x,y);for(let[btn,dir]of buttonMap){if(btn.contains(el)||el===btn)return{btn,dir};}return null;}
function handleStart(x,y){const d=getButtonAt(x,y);if(d)activateButton(d.btn,d.dir);}
function handleMove(x,y){const d=getButtonAt(x,y);if(d)activateButton(d.btn,d.dir);else deactivateAll();}

document.addEventListener('touchstart',e=>{e.preventDefault();if(e.touches.length>0)handleStart(e.touches[e.touches.length-1].clientX,e.touches[e.touches.length-1].clientY);},{passive:false});
document.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length>0)handleMove(e.touches[e.touches.length-1].clientX,e.touches[e.touches.length-1].clientY);},{passive:false});
document.addEventListener('touchend',e=>{if(e.touches.length===0)deactivateAll();else if(e.touches.length>0)handleStart(e.touches[e.touches.length-1].clientX,e.touches[e.touches.length-1].clientY);});
document.addEventListener('touchcancel',deactivateAll);
document.addEventListener('mousedown',e=>handleStart(e.clientX,e.clientY));
document.addEventListener('mousemove',e=>handleMove(e.clientX,e.clientY));
document.addEventListener('mouseup',deactivateAll);
document.addEventListener('keydown',e=>{
  if(gameOver){resetGame();return;}
  switch(e.key.toLowerCase()){
    case'arrowup':case'w':startMove('up');break;case'arrowdown':case's':startMove('down');break;
    case'arrowleft':case'a':startMove('left');break;case'arrowright':case'd':startMove('right');break;
    case'q':startMove('up-left');break;case'e':startMove('up-right');break;
    case'z':startMove('down-left');break;case'c':startMove('down-right');break;
  }
});

// ══════════════════════════════════════════════════════
// GAME LOOP (con clima)
// ══════════════════════════════════════════════════════
let nextNormalSpawnTime = Date.now() + 4000;

function gameLoop() {
  if(!gameOver){
    for(let i=enemies.length-1;i>=0;i--){
      enemies[i].update();
      if(enemies[i].isOffScreen()){
        evadedThisWave++;evadedSinceLastDoubleBonus++;
        if(enemies[i].isBoss)bossesEvadedSinceLastTripleBonus++;
        updateUI();enemies.splice(i,1);
      }
    }
    checkEnemyCollision();updateZones();updateBonusScore();updateDoubleBonusScore();updateTripleBonusScore();updateActiveEffects();
    const now=Date.now();
    if(safeZone&&now-lastHumTime>2100&&Math.random()<0.3){playSafeZoneHum();lastHumTime=now;}
    if(now>=nextNormalSpawnTime&&!gameOver){
      let count=enemySpawnConfig.normal.baseCount+Math.floor(Math.random()*(enemySpawnConfig.normal.countVariance+1));
      for(let i=0;i<count;i++){const dirs=['down','up','left','right'];spawnEnemy(dirs[Math.floor(Math.random()*4)],false);}
      const interval=enemySpawnConfig.normal.minInterval+Math.random()*(enemySpawnConfig.normal.maxInterval-enemySpawnConfig.normal.minInterval);
      nextNormalSpawnTime=now+interval;
    }
    if(now-lastBossTime>enemySpawnConfig.boss.interval&&!gameOver){if(Math.random()<0.7)triggerBossWave();else lastBossTime=now;}
    if(currentWeather && currentWeather.update) {
      currentWeather.update();
    }
  }
  draw();requestAnimationFrame(gameLoop);
}

generateCollectibles();updateUI();updateDifficulty();gameLoop();
console.log("%cODPAR PREMIUM v3.0 ULTIMATE - 30+ Paletas | 18 Sonidos | Clima | Logros | Power-Ups | Eventos", "color:#FFD700;font-size:18px;font-weight:bold");
})();
</script>
