        newSize=(wave%5===0)?20+Math.floor(Math.random()*11):10+Math.floor(Math.random()*11);
      }
      newSize=Math.max(MESSAGE_CONFIG.gridMin,Math.min(MESSAGE_CONFIG.gridMax,newSize));
    } else newSize=INITIAL_GRID_SIZE;
    GRID_SIZE=newSize;
    adjustZonesToNewGrid(oldSize,newSize);
    resizeGameElements();
    playerDrawX=player.x*CELL_SIZE+CELL_SIZE/2;
    playerDrawY=player.y*CELL_SIZE+CELL_SIZE/2;
    glitchActive=true; glitchTimer=40; glitchIntensity=currentWaveConfig.glitchIntensity||1;
    playerGlow=currentWaveConfig.playerGlowOnStart||50;
    waveScanActive=true; waveScanStartTime=performance.now();
    createExplosion(playerDrawX,playerDrawY,55,'#00ffff',2.0);
    createExplosion(playerDrawX,playerDrawY,35,'#ffffff',1.4);
    createFloatingText(playerDrawX,playerDrawY-65,`GRID: ${GRID_SIZE}!`,false,false);
    playSound(1200,80,'sine',.6); setTimeout(()=>playSound(1800,120,'sawtooth',.5),80);
    bonusZoneCurrentWaveCount=0; doubleBonusZoneCurrentWaveCount=0; tripleBonusZoneCurrentWaveCount=0;
    updateUI(); createWaveCompleteText(wave-1); generatePowerUps();
    if (WAVE_EVENTS[wave]) registerTimeout(()=>triggerWaveEvent(wave),1000);
    if (wave%8===0&&!currentWeather) applyRandomWeather();
    if (wave>20&&Math.random()<0.3) applyRandomWeather();
    registerTimeout(()=>{
      if (!gameOver) {
        if (!safeZone&&!safeZoneDisabledForWave) generateSafeZone();
        if (Math.random()<0.45||(performance.now()-lastBossTime>enemySpawnConfig.boss.interval)) triggerBossWave();
      }
    },500);
    hardCleanup();
  }

  // ══ MOVEMENT ══
  function executeMove(dir) {
    let newX=player.x, newY=player.y;
    switch(dir) {
      case 'up':         newY--; break;
      case 'down':       newY++; break;
      case 'left':       newX--; break;
      case 'right':      newX++; break;
      case 'up-left':    newX--;newY--; break;
      case 'up-right':   newX++;newY--; break;
      case 'down-left':  newX--;newY++; break;
      case 'down-right': newX++;newY++; break;
    }
    if (newX<0||newX>=GRID_SIZE||newY<0||newY>=GRID_SIZE) return false;
    moving=true;
    const startX=playerDrawX,startY=playerDrawY;
    const endX=newX*CELL_SIZE+CELL_SIZE/2,endY=newY*CELL_SIZE+CELL_SIZE/2;
    player.x=newX; player.y=newY;
    const speedActive=activeEffects.some(e=>e.type==='speed');
    const duration=Math.max(MIN_MOVE_DELAY,speedActive?currentMoveDelay/2:currentMoveDelay);
    const animStart=performance.now();

    function easeInOutCubic(t) { return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
    function animateMove(now) {
      if (gameOver) { moving=false; moveAnimId=null; return; }
      const elapsed=now-animStart,t=Math.min(1,elapsed/duration);
      playerDrawX=startX+(endX-startX)*easeInOutCubic(t);
      playerDrawY=startY+(endY-startY)*easeInOutCubic(t);
      if (t<1) { moveAnimId=requestAnimationFrame(animateMove); }
      else {
        moveAnimId=null; playerDrawX=endX; playerDrawY=endY; moving=false;
        lastMoveTimestamp=performance.now();
        if (currentMoveDelay>MIN_MOVE_DELAY) currentMoveDelay=Math.max(MIN_MOVE_DELAY,currentMoveDelay*.9);
        startNextMove();
      }
    }
    moveAnimId=requestAnimationFrame(animateMove);
    playMoveSound(); startMotor();

    const tiltMap={'up':[-.3,0],'down':[.3,0],'left':[0,-.4],'right':[0,.4],'up-left':[-.2,-.3],'up-right':[-.2,.3],'down-left':[.2,-.3],'down-right':[.2,.3]};
    const [tx,tz]=tiltMap[dir]||[0,0];
    targetTiltX=tx; targetTiltZ=tz;
    setTimeout(()=>{ targetTiltX=0; targetTiltZ=0; },150);

    if (rotationResetTimer) clearTimeout(rotationResetTimer);
    const rotMap={
      'up':'rotateX(48deg)','down':'rotateX(35deg)',
      'left':'rotateX(40deg) rotateY(-8deg)','right':'rotateX(40deg) rotateY(8deg)',
      'up-left':'rotateX(46deg) rotateY(-7deg)','up-right':'rotateX(46deg) rotateY(7deg)',
      'down-left':'rotateX(37deg) rotateY(-7deg)','down-right':'rotateX(37deg) rotateY(7deg)'
    };
    setCanvasTransform(rotMap[dir]||'rotateX(40deg)');
    rotationResetTimer=setTimeout(()=>setCanvasTransform('rotateX(40deg)'),150);

    const angleMap={'up':0,'right':Math.PI/2,'down':Math.PI,'left':-Math.PI/2,'up-right':Math.PI/4,'up-left':-Math.PI/4,'down-right':3*Math.PI/4,'down-left':-3*Math.PI/4};
    targetAngle=angleMap[dir]||0;

    const backAngleMap={'up':Math.PI/2,'down':-Math.PI/2,'left':0,'right':Math.PI,'up-right':-3*Math.PI/4,'up-left':3*Math.PI/4,'down-right':-Math.PI/4,'down-left':Math.PI/4};
    const backAngle=backAngleMap[dir]||0;
    for (let i=0;i<6;i++) {
      const ox=(Math.random()-.5)*12, oy=(Math.random()-.5)*12;
      createSpark(playerDrawX+ox,playerDrawY+oy,backAngle+(Math.random()-.5)*.8);
    }

    const nowInSafe=isInSafeZone();
    if (nowInSafe&&!wasInSafeZone) { playSafeZoneEnter(); createExplosion(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,20,'#00ffcc',1.2); }
    wasInSafeZone=nowInSafe;
    checkCollectibles();
    return true;
  }

  function startNextMove() {
    if (moving||gameOver) return;
    const nextDir=pendingDirection||currentDirection;
    if (!nextDir) return;
    pendingDirection=null;
    if (currentDirection!==nextDir) currentMoveDelay=110;
    currentDirection=nextDir;
    executeMove(currentDirection);
  }
  function startMove(dir) {
    if (gameOver) { resetGame(); return; }
    if (moving) { pendingDirection=dir; return; }
    if (currentDirection!==dir) currentMoveDelay=110;
    currentDirection=dir;
    executeMove(dir);
  }
  function cancelCurrentMovement() { pendingDirection=null; currentDirection=null; stopMotor(); currentMoveDelay=110; }

  // ══ RESET ══
  function resetGame() {
    stopMotor(); clearAllTimeouts();
    if (moveAnimId) { cancelAnimationFrame(moveAnimId); moveAnimId=null; }
    originalSpeeds=null;
    gameOver=false; powerUpsOnMap=[];
    for (const ef of activeEffects) { if (ef.type==='clone'&&ef.intervalId) clearInterval(ef.intervalId); }
    activeEffects=[];
    for (let i=0;i<ATTRACTED_POOL_SIZE;i++) { _attractedPool[i].active=false; _attractedPool[i].data=null; }
    attractedCount=0;
    hasReviveTotem=false; invulnerableUntil=0;
    cancelCurrentMovement(); moving=false; pendingDirection=null;
    GRID_SIZE=INITIAL_GRID_SIZE; wave=1; evadedThisWave=0; comboCount=0;
    currentWaveConfig=getMessageConfig(1); currentWaveMessage=currentWaveConfig.text;
    MESSAGE_CONFIG._fallbackIndex=0; safeZoneDisabledForWave=false; doublePointsActive=false;
    POWERUP_CONFIG.spawnCount=3;
    safeZone=null; safeZoneTimer=0; wasInSafeZone=false;
    bonusZone=null; bonusZoneTimer=0;
    doubleBonusZone=null; doubleBonusZoneTimer=0; lastDoubleBonusTick=0; lastDoubleBonusSpawnTime=0; evadedSinceLastDoubleBonus=0; scoreSinceLastDoubleBonus=0;
    tripleBonusZone=null; tripleBonusZoneTimer=0; lastTripleBonusTick=0; lastTripleBonusSpawnTime=0; premiumCollectedSinceLastTripleBonus=0; bossesEvadedSinceLastTripleBonus=0;
    bonusZoneCurrentWaveCount=0; doubleBonusZoneCurrentWaveCount=0; tripleBonusZoneCurrentWaveCount=0;
    score=0; lastBossTime=performance.now(); premiumFlash=0; playerGlow=0; waveStartTime=performance.now();
    bossAlertStart=0; waveTransition=0; gameOverTime=0;
    // Reset all pools — avoids stale data on new game.
    for (let i=0;i<PARTICLE_POOL_SIZE;i++) particlePool[i].active=false;
    for (let i=0;i<SPARK_POOL_SIZE;i++)   sparkPool[i].active=false;
    for (let i=0;i<FT_POOL_SIZE;i++)       floatingTextPool[i].active=false;
    nextNormalSpawnTime=performance.now()+3000;
    currentDirection=null; targetAngle=0; currentPlayerAngle=0;
    targetTiltX=0; currentTiltX=0; targetTiltZ=0; currentTiltZ=0;
    currentMoveDelay=150; lastHumTime=0;
    if (currentWeather) currentWeather=null;
    // Invalidate zone gradient cache.
    for (const k of Object.keys(_zoneGradCache)) _zoneGradCache[k].key='';
    updateDifficulty();
    resizeGameElements();
    updateUI();
    if (rotationResetTimer) clearTimeout(rotationResetTimer);
    setCanvasTransform('rotateX(40deg)');
    hardCleanup();
  }

  // ══ GLITCH ══
  function drawGlitchEffect() {
    if (!glitchActive||glitchTimer<=0) return;
    glitchTimer--;
    const intensity=glitchIntensity*(glitchTimer/2);
    ctx.save(); ctx.globalAlpha=intensity;
    for (let i=0;i<6;i++) {
      const offset=(Math.random()-.5)*18*intensity;
      const sliceY=Math.random()*LOGICAL_SIZE,sliceH=8+Math.random()*22;
      ctx.drawImage(canvas,
        0, sliceY*DPR, LOGICAL_SIZE*DPR, sliceH*DPR,
        offset, sliceY, LOGICAL_SIZE, sliceH);
    }
    if (Math.random()<.4) { ctx.fillStyle=Math.random()<.1?'#00ffff':'#ff00ff'; ctx.fillRect(0,0,LOGICAL_SIZE,LOGICAL_SIZE); }
    ctx.restore();
    if (glitchTimer<=0) { glitchActive=false; glitchIntensity=0; }
  }

  // ══ WAVE SCAN — globe rendering skipped on mobile/low quality ══
  function drawWaveScan() {
    if (!waveScanActive) return;
    const elapsed=performance.now()-waveScanStartTime;
    if (elapsed>WAVE_SCAN_DURATION) { waveScanActive=false; return; }
    const progress=elapsed/WAVE_SCAN_DURATION;
    const now=performance.now();
    const cw=LOGICAL_SIZE,ch=LOGICAL_SIZE,cx=cw*0.5,cy=ch*0.5;
    const activeColor=lastZoneColor||'#00ffff';
    const secondaryColor=activeColor==='#ff00ff'?'#00ffff':'#ff00ff';
    const pixelFont='"Press Start 2P",monospace';

    ctx.save();
    ctx.fillStyle='#000000'; ctx.fillRect(0,0,cw,ch);

    const maxRadius=Math.sqrt(cw*cw+ch*ch)*0.5;
    const currentRadius=maxRadius*easeOutCubic(progress);

    for (let wi=0;wi<3;wi++) {
      const off=wi*0.15;
      const wp=Math.max(0,Math.min(1,(progress-off)/(1-off)));
      if (wp<=0) continue;
      const cr=maxRadius*easeOutCubic(wp);
      const wg=ctx.createRadialGradient(cx,cy,cr*0.15,cx,cy,cr);
      wg.addColorStop(0,activeColor+'20'); wg.addColorStop(0.75,activeColor+'05'); wg.addColorStop(1,'transparent');
      ctx.fillStyle=wg; ctx.globalAlpha=(1-wi*0.3)*0.28;
      ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=activeColor; ctx.lineWidth=1; ctx.globalAlpha=(1-wi*0.3)*0.35;
      ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.stroke();
    }

    ctx.strokeStyle=activeColor; ctx.lineWidth=0.6; ctx.globalAlpha=0.18;
    ctx.beginPath();
    for (let i=1;i<=3;i++) { const r=currentRadius*(0.5+i*0.12); ctx.moveTo(cx+r,cy); ctx.arc(cx,cy,r,0,Math.PI*2); }
    ctx.stroke();

    const dotCount=isMobile?8:14;
    ctx.fillStyle=activeColor;
    for (let i=0;i<dotCount;i++) {
      const seed=(now*0.001+i*137.508)%(Math.PI*2);
      const r=currentRadius*(0.92+(i*0.07)%0.12);
      ctx.globalAlpha=0.4+(i%3)*0.15;
      ctx.fillRect(cx+fastCos(seed)*r-1,cy+fastSin(seed)*r-1,2+(i%4),2);
    }

    ctx.globalAlpha=1;

    // Globe only on desktop/high quality — avoids expensive path rendering on mobile.
    if (Quality.waveScanGlobe) {
      const globeRadius=Math.min(cw,ch)*0.18;
      const globeY=cy-ch*0.05;
      const globeAlpha=Math.min(1,(progress<0.12?progress/0.12:1)*(progress>0.78?(1-progress)/0.22:1));

      if (globeAlpha>0.01) {
        ctx.save(); ctx.globalAlpha=globeAlpha; ctx.translate(cx,globeY);
        const baseRotation=progress*Math.PI*2;
        const bg2=ctx.createRadialGradient(-globeRadius*0.25,-globeRadius*0.25,globeRadius*0.08,0,0,globeRadius);
        bg2.addColorStop(0,'#ff8800'); bg2.addColorStop(0.45,'#cc3300'); bg2.addColorStop(1,'#661100');
        ctx.fillStyle=bg2; ctx.beginPath(); ctx.arc(0,0,globeRadius,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#ffaa00'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,globeRadius,0,Math.PI*2); ctx.stroke();

        ctx.fillStyle='#ff8800'; ctx.strokeStyle='#ffcc44'; ctx.lineWidth=0.8; ctx.globalAlpha=0.75;
        ctx.save(); ctx.rotate(baseRotation*1.5);
        ctx.beginPath();
        ctx.moveTo(-globeRadius*0.2,-globeRadius*0.5); ctx.lineTo(globeRadius*0.35,-globeRadius*0.05);
        ctx.lineTo(globeRadius*0.05,globeRadius*0.35); ctx.lineTo(-globeRadius*0.3,globeRadius*0.05);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();

        // Neural network nodes.
        ctx.save();
        ctx.beginPath(); ctx.arc(0,0,globeRadius*0.97,0,Math.PI*2); ctx.clip();
        const nc=6; const nodes=[];
        for (let n=0;n<nc;n++) {
          const na=(n/nc)*Math.PI*2+baseRotation*0.5;
          const nr=globeRadius*0.55+fastSin(now*0.004+n)*globeRadius*0.22;
          nodes.push({x:fastCos(na)*nr,y:fastSin(na)*nr});
        }
        ctx.strokeStyle='#ffcc44'; ctx.lineWidth=0.7; ctx.globalAlpha=0.4;
        ctx.beginPath();
        for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
          const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
          if (dx*dx+dy*dy<globeRadius*globeRadius*0.81) { ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); }
        }
        ctx.stroke();
        ctx.fillStyle='#ffffff'; ctx.globalAlpha=0.85;
        ctx.beginPath();
        for (const nd of nodes) { ctx.moveTo(nd.x+2.5,nd.y); ctx.arc(nd.x,nd.y,2.5,0,Math.PI*2); }
        ctx.fill();
        ctx.restore();

        // Meridians.
        const mc=5;
        ctx.strokeStyle='#ffaa44'; ctx.lineWidth=0.7; ctx.globalAlpha=0.5;
        ctx.beginPath();
        for (let m=0;m<mc;m++) {
          const ma=(m/mc)*Math.PI+baseRotation*0.7;
          ctx.moveTo(fastCos(ma)*fastCos(-Math.PI*0.48)*globeRadius*0.96,fastSin(-Math.PI*0.48)*globeRadius*0.96);
          for (let a=-Math.PI*0.46;a<=Math.PI*0.48;a+=0.06)
            ctx.lineTo(fastCos(ma)*fastCos(a)*globeRadius*0.96,fastSin(a)*globeRadius*0.96);
        }
        ctx.stroke();

        ctx.strokeStyle='#ffaa00'; ctx.lineWidth=2; ctx.globalAlpha=0.75;
        ctx.beginPath(); ctx.ellipse(0,0,globeRadius*1.28,globeRadius*0.27,baseRotation*0.5,0,Math.PI*2); ctx.stroke();
        ctx.restore();
      }
    }

    const bw=cw*0.58,bh=3,bx=(cw-bw)*0.5,by=ch*0.81;
    ctx.globalAlpha=0.9; ctx.strokeStyle=activeColor; ctx.lineWidth=bh;
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+bw*progress,by); ctx.stroke();
    ctx.globalAlpha=0.3; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(0,by); ctx.lineTo(cw,by); ctx.stroke();

    const fs=Math.max(8,Math.floor(cw*0.032));
    ctx.font=`${fs}px ${pixelFont}`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    const waveStr=String(wave).padStart(2,'0');
    const statusText=`WAVE:${waveStr}  GRID:${GRID_SIZE}x${GRID_SIZE}  ${Math.floor(progress*100)}%`;
    const textY=Math.min(by+10,ch-fs-8);
    ctx.fillStyle='#ff0000'; ctx.globalAlpha=0.5; ctx.fillText(statusText,cx-2,textY);
    ctx.fillStyle='#0000ff'; ctx.globalAlpha=0.5; ctx.fillText(statusText,cx+2,textY);
    ctx.fillStyle=activeColor; ctx.globalAlpha=1; ctx.fillText(statusText,cx,textY);

    const spinChars=['|','/','-','\\'];
    ctx.font=`${Math.floor(fs*1.2)}px ${pixelFont}`;
    ctx.textAlign='right'; ctx.textBaseline='bottom';
    ctx.fillStyle=secondaryColor; ctx.globalAlpha=0.9;
    ctx.fillText(spinChars[Math.floor(now/130)%4],cw-18,ch-12);

    if (progress>0.92) { ctx.fillStyle='#ffffff'; ctx.globalAlpha=(progress-0.92)*10*0.18; ctx.fillRect(0,0,cw,ch); }
    ctx.restore();
  }

  // ══ MAIN DRAW ══
  function draw() {
    if (!_bgBuilt) rebuildBackground();
    ctx.drawImage(bgCanvas,0,0,LOGICAL_SIZE,LOGICAL_SIZE);

    if (premiumFlash>0) { ctx.fillStyle=powerFlashColor+'55'; ctx.fillRect(0,0,LOGICAL_SIZE,LOGICAL_SIZE); premiumFlash--; }
    if (waveTransition>0) { ctx.fillStyle=`rgba(255,255,255,${waveTransition/120})`; ctx.fillRect(0,0,LOGICAL_SIZE,LOGICAL_SIZE); waveTransition=Math.max(0,waveTransition-2); }

    drawGrid();
    drawSafeZone(); drawBonusZone(); drawDoubleBonusZone(); drawTripleBonusZone();
    drawPowerUpsOnMap();

    // Normal collectibles — single batched path.
    if (collectibles.length) {
      ctx.fillStyle='#ffcc33';
      ctx.beginPath();
      for (const c of collectibles) {
        const px=c.x*CELL_SIZE+CELL_SIZE*0.5, py=c.y*CELL_SIZE+CELL_SIZE*0.5;
        ctx.moveTo(px+CELL_SIZE*0.33,py); ctx.arc(px,py,CELL_SIZE*0.33,0,Math.PI*2);
      }
      ctx.fill();
    }

    drawMessageCollectibles();
    drawAttractedItems();
    drawAllEnemies();
    drawWallAlerts();

    // Particle pool — single save/restore wrapping entire pool.
    ctx.save();
    for (let i=0;i<PARTICLE_POOL_SIZE;i++) {
      const p=particlePool[i];
      if (!p.active) continue;
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.life--;
      p.alpha=Math.max(0,p.life/30); p.size*=0.96;
      if (p.life<=0) { p.active=false; continue; }
      ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
      ctx.fillRect(p.x-p.size*0.5,p.y-p.size*0.5,p.size,p.size);
    }

    // Spark pool — setTransform instead of save/restore per spark.
    for (let i=0;i<SPARK_POOL_SIZE;i++) {
      const s=sparkPool[i];
      if (!s.active) continue;
      s.x+=s.vx; s.y+=s.vy; s.life--; s.alpha=s.life/20; s.length*=0.92;
      if (s.life<=0) { s.active=false; continue; }
      ctx.globalAlpha=Math.max(0,s.alpha);
      ctx.translate(s.x,s.y); ctx.rotate(Math.atan2(s.vy,s.vx));
      ctx.fillStyle='#00ddff'; ctx.fillRect(-s.width*0.5,-s.length*0.5,s.width,s.length);
      ctx.fillStyle='#88ffff'; ctx.fillRect(-s.width*0.33,-s.length*0.33,s.width*0.6,s.length*0.6);
      ctx.setTransform(DPR,0,0,DPR,0,0); // Reset to DPR-scaled identity, not 1,0,0,1,0,0
    }
    ctx.globalAlpha=1;
    ctx.restore();

    drawPlayer();
    drawZoneIndicator();
    drawActiveEffectsHUD();

    // Floating text pool — cache font strings to avoid string creation per text per frame.
    ctx.save();
    let _lastFontStr = '';
    for (let i=0;i<FT_POOL_SIZE;i++) {
      const ft=floatingTextPool[i];
      if (!ft.active) continue;
      ft.y+=ft.vy; ft.vy*=0.975; ft.life--;
      if (ft.scale<(ft.big?1.0:1.05)) ft.scale+=0.02;
      if (ft.entryScale<1) ft.entryScale=Math.min(1,ft.entryScale+0.12);
      ft.alpha=Math.max(0,ft.life/ft.maxLife);
      if (ft.life<=0) { ft.active=false; continue; }
      const es=ft.entryScale;
      ctx.globalAlpha=ft.alpha*es; ctx.textAlign='center'; ctx.textBaseline='middle';
      const fs=ft.isTriple?40:(ft.big?34:Math.floor(38*ft.scale));
      // Only rebuild font string when size changes.
      const fontStr=`900 ${fs}px "Press Start 2P","Courier New",monospace`;
      if (fontStr!==_lastFontStr) { ctx.font=fontStr; _lastFontStr=fontStr; }
      ctx.lineWidth=ft.isTriple?3:2.2; ctx.strokeStyle='#000000';
      ctx.strokeText(ft.text,ft.x,ft.y);
      ctx.fillStyle=ft.isTriple?'#FFD700':(ft.big?'#FFFFAA':(ft.isPremium?'#ffccff':'#ffffcc'));
      ctx.fillText(ft.text,ft.x,ft.y);
      if (ft.isTriple) { ctx.fillStyle='#FFAA00'; ctx.fillText(ft.text,ft.x,ft.y); }
    }
    ctx.restore();

    drawWaveScan();
    if (!moving&&!gameOver) drawGlitchEffect();
    if (!moving&&!gameOver) { playerDrawX=player.x*CELL_SIZE+CELL_SIZE*0.5; playerDrawY=player.y*CELL_SIZE+CELL_SIZE*0.5; }

    if (!gameOver&&currentWeather&&currentWeather.draw&&Quality.weatherEnabled) currentWeather.draw(ctx);

    if (gameOver) {
      const elapsed=performance.now()-gameOverTime;
      ctx.fillStyle=`rgba(0,0,0,${Math.min(0.85,elapsed/600)})`; ctx.fillRect(0,0,LOGICAL_SIZE,LOGICAL_SIZE);
      if (elapsed>300) {
        ctx.globalAlpha=Math.min(1,(elapsed-300)/400);
        ctx.font='900 42px "Press Start 2P",monospace'; ctx.fillStyle='#ff4466'; ctx.textAlign='center';
        ctx.fillText('GAME OVER',LOGICAL_SIZE*0.5,LOGICAL_SIZE*0.5-40);
        ctx.font='16px "Press Start 2P",monospace'; ctx.fillStyle='#ffffff';
        ctx.fillText('Toca cualquier boton',LOGICAL_SIZE*0.5,LOGICAL_SIZE*0.5+20);
        ctx.fillText('para REINICIAR',LOGICAL_SIZE*0.5,LOGICAL_SIZE*0.5+50);
        ctx.globalAlpha=1;
      }
    }
  }

  // ══ CONTROLS ══
  function createButton(svg) { const btn=document.createElement('div'); btn.className='boton'; btn.innerHTML=svg; return btn; }
  function createEmptyButton()  { const btn=document.createElement('div'); btn.className='boton vacio'; return btn; }

  const svgUp    = `<svg viewBox="0 0 24 24"><path d="M12 5l7 8h-4v6h-6v-6H5l7-8z"/></svg>`;
  const svgDown  = `<svg viewBox="0 0 24 24"><path d="M12 19l-7-8h4V5h6v6h4l-7 8z"/></svg>`;
  const svgLeft  = `<svg viewBox="0 0 24 24"><path d="M5 12l8-7v4h6v6h-6v4l-8-7z"/></svg>`;
  const svgRight = `<svg viewBox="0 0 24 24"><path d="M19 12l-8 7v-4H5v-6h6V5l8 7z"/></svg>`;
  const svgUL    = `<svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 6v8M6 6h8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const svgUR    = `<svg viewBox="0 0 24 24"><path d="M18 6L6 18M18 6v8M18 6h-8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const svgDL    = `<svg viewBox="0 0 24 24"><path d="M6 18l12-12M6 18v-8M6 18h8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const svgDR    = `<svg viewBox="0 0 24 24"><path d="M18 18L6 6M18 18v-8M18 18h-8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const upLeftBtn=createButton(svgUL),upBtn=createButton(svgUp),upRightBtn=createButton(svgUR);
  const leftBtn=createButton(svgLeft),centerEmpty=createEmptyButton(),rightBtn=createButton(svgRight);
  const downLeftBtn=createButton(svgDL),downBtn=createButton(svgDown),downRightBtn=createButton(svgDR);

  const centerbotones=document.getElementById('centerbotones');
  centerbotones.innerHTML='';
  const f1=document.createElement('section'); f1.className='fila-botones';
  f1.appendChild(upLeftBtn); f1.appendChild(upBtn); f1.appendChild(upRightBtn);
  const f2=document.createElement('section'); f2.className='fila-botones';
  f2.appendChild(leftBtn); f2.appendChild(centerEmpty); f2.appendChild(rightBtn);
  const f3=document.createElement('section'); f3.className='fila-botones';
  f3.appendChild(downLeftBtn); f3.appendChild(downBtn); f3.appendChild(downRightBtn);
  centerbotones.appendChild(f1); centerbotones.appendChild(f2); centerbotones.appendChild(f3);

  const buttonMap=new Map([
    [upLeftBtn,'up-left'],[upBtn,'up'],[upRightBtn,'up-right'],
    [leftBtn,'left'],[rightBtn,'right'],
    [downLeftBtn,'down-left'],[downBtn,'down'],[downRightBtn,'down-right']
  ]);

  // Cached button rects — avoids getBoundingClientRect per touch event.
  const buttonRects=new Map();
  function cacheButtonRects() {
    buttonRects.clear();
    for (const [btn,dir] of buttonMap) {
      const r=btn.getBoundingClientRect();
      buttonRects.set(dir,{left:r.left,right:r.right,top:r.top,bottom:r.bottom,btn});
    }
  }

  function getButtonAt(x,y) {
    for (const [dir,rect] of buttonRects) {
      if (x>=rect.left&&x<=rect.right&&y>=rect.top&&y<=rect.bottom) return {btn:rect.btn,dir};
    }
    return null;
  }

  function activateButton(btn,dir) {
    if (currentActiveBtn===btn) return;
    if (currentActiveBtn) currentActiveBtn.classList.remove('activo');
    currentActiveBtn=btn; startMove(dir); btn.classList.add('activo');
  }
  function deactivateAll() {
    if (currentActiveBtn) currentActiveBtn.classList.remove('activo');
    currentActiveBtn=null; cancelCurrentMovement();
  }

  let _lastTouchX=0,_lastTouchY=0;
  const TOUCH_THRESHOLD=5;
  const TOUCH_THRESHOLD_SQ=TOUCH_THRESHOLD*TOUCH_THRESHOLD;

  function handleStart(x,y) { _lastTouchX=x; _lastTouchY=y; const d=getButtonAt(x,y); if (d) activateButton(d.btn,d.dir); }
  function handleMove(x,y) {
    const dx=x-_lastTouchX,dy=y-_lastTouchY;
    // Squared distance threshold — avoids sqrt per touch move.
    if (dx*dx+dy*dy<TOUCH_THRESHOLD_SQ) return;
    _lastTouchX=x; _lastTouchY=y;
    const d=getButtonAt(x,y); if (d) activateButton(d.btn,d.dir); else deactivateAll();
  }

  const gameSection=document.querySelector('.display');
  gameSection.addEventListener('touchstart',e=>{ e.preventDefault(); resumeAudio(); const t=e.touches[e.touches.length-1]; handleStart(t.clientX,t.clientY); },{passive:false});
  gameSection.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.touches[e.touches.length-1]; handleMove(t.clientX,t.clientY); },{passive:false});
  gameSection.addEventListener('touchend',  e=>{ if(e.touches.length===0) deactivateAll(); else { const t=e.touches[e.touches.length-1]; handleStart(t.clientX,t.clientY); }});
  gameSection.addEventListener('touchcancel',deactivateAll);

  document.addEventListener('mousedown',e=>{ resumeAudio(); _lastTouchX=e.clientX; _lastTouchY=e.clientY; handleStart(e.clientX,e.clientY); });
  document.addEventListener('mousemove',e=>{ if(e.buttons) handleMove(e.clientX,e.clientY); });
  document.addEventListener('mouseup',  deactivateAll);

  document.addEventListener('keydown',e=>{
    if (gameOver) { resetGame(); return; }
    switch(e.key.toLowerCase()) {
      case 'arrowup':   case 'w': startMove('up');         break;
      case 'arrowdown': case 's': startMove('down');       break;
      case 'arrowleft': case 'a': startMove('left');       break;
      case 'arrowright':case 'd': startMove('right');      break;
      case 'q': startMove('up-left');   break;
      case 'e': startMove('up-right');  break;
      case 'z': startMove('down-left'); break;
      case 'c': startMove('down-right');break;
    }
  });

  // Resize handler — debounced, invalidates caches.
  let _resizeTimer=null;
  function handleResize() {
    clearTimeout(_resizeTimer);
    _resizeTimer=setTimeout(()=>{
      _bgBuilt=false; _lastGridSize=-1;
      for (const k of Object.keys(_zoneGradCache)) _zoneGradCache[k].key='';
      rebuildBackground(); rebuildGridCache(); cacheButtonRects(); updateUI();
    },150);
  }
  window.addEventListener('resize',handleResize);
  window.addEventListener('orientationchange',()=>{ setTimeout(()=>handleResize(),300); });

  // ══ UPDATE ══
  let nextNormalSpawnTime=performance.now()+4000;

  function update() {
    if (gameOver) return;
    const now=performance.now();

    updateActiveEffects();
    updateAttracted();
    updateZones();
    updateBonusScore();
    updateDoubleBonusScore();
    updateTripleBonusScore();

    for (let i=powerUpsOnMap.length-1;i>=0;i--) {
      if (Date.now()>powerUpsOnMap[i].expires) { powerUpsOnMap[i]=powerUpsOnMap[powerUpsOnMap.length-1]; powerUpsOnMap.pop(); }
    }

    for (let i=enemies.length-1;i>=0;i--) {
      enemies[i].update();
      if (enemies[i].isOffScreen()) {
        evadedThisWave++; evadedSinceLastDoubleBonus++;
        if (enemies[i].isBoss) bossesEvadedSinceLastTripleBonus++;
        updateUI();
        enemies[i]=enemies[enemies.length-1]; enemies.pop();
      }
    }

    checkEnemyCollision();

    if (safeZone&&now-lastHumTime>2100&&Math.random()<0.3) { playSafeZoneHum(); lastHumTime=now; }

    if (now>=nextNormalSpawnTime) {
      const dirs=['down','up','left','right'];
      const count=enemySpawnConfig.normal.baseCount+Math.floor(Math.random()*(enemySpawnConfig.normal.countVariance+1));
      for (let i=0;i<count;i++) spawnEnemy(dirs[Math.floor(Math.random()*4)],false);
      nextNormalSpawnTime=now+enemySpawnConfig.normal.minInterval+Math.random()*(enemySpawnConfig.normal.maxInterval-enemySpawnConfig.normal.minInterval);
    }

    if (now-lastBossTime>enemySpawnConfig.boss.interval) {
      if (Math.random()<0.65) triggerBossWave(); else lastBossTime=now;
    }

    if (currentWeather&&currentWeather.update&&Quality.weatherEnabled) currentWeather.update();
  }

  // ══ GAME LOOP — delta clamped to 50ms to prevent physics spikes after tab switch ══
  let lastFrameTime=performance.now();
  let frameCount=0;

  function gameLoop(timestamp) {
    // Clamp delta: if the tab was backgrounded, a huge delta would cause physics jumps.
    const rawDelta=timestamp-lastFrameTime;
    const delta=Math.min(rawDelta, 50);
    lastFrameTime=timestamp;

    Quality.update(delta);
    frameCount++;
    if (frameCount%120===0) hardCleanup();

    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // After sparks use setTransform, restore the DPR scale correctly.
  // The spark rendering path uses ctx.setTransform(DPR,0,0,DPR,0,0) to reset,
  // which keeps the DPR scale intact without a full save/restore overhead.

  // ── INIT ──
  currentWaveConfig=getMessageConfig(1);
  currentWaveMessage=currentWaveConfig.text;
  rebuildBackground();
  rebuildGridCache();
  generateCollectibles();
  updateUI();
  updateDifficulty();
  requestAnimationFrame(()=>{ cacheButtonRects(); });
  requestAnimationFrame(gameLoop);

  console.log('%cODPAR PREMIUM v3.3 — optimized build', 'color:#FFD700;font-size:14px;font-weight:bold');
})();
</script>
