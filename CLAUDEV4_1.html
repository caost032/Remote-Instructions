  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: black; overflow: hidden; height: 100vh; font-family: 'Press Start 2P', 'Courier New', monospace; }
    .display { display: flex; justify-content: center; align-items: center; flex-direction: column; width: 100%; height: 100vh; background: radial-gradient(circle at 30% 20%, #0a0f1a, #000000); perspective: 1000px; }
    .pantalla { width: 100%; max-width: 560px; height: 60vh; max-height: 520px; background: transparent; perspective: 800px; display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; }
    canvas { image-rendering: pixelated; width: 85%; height: 85%; max-width: 560px; max-height: 560px; transform: rotateX(40deg); transition: transform 2s ease-out; }
    .score-container { position: absolute; width: 100%; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); padding: 6px 12px; text-align: center; font-weight: bold; color: orange; z-index: 10; pointer-events: none; white-space: nowrap; font-size: clamp(9px, 2.6vw, 12px); line-height: 1.4; }
    .score-container span { display: inline-block; margin: 0 1px; }
    #score      { color: white;   animation: pCyan 2.2s infinite; }
    #highScore  { color: #ffd700; animation: pCyan 2.2s infinite; animation-delay: .5s; }
    @keyframes pCyan { 0%,100% { text-shadow: 0 0 6px #0ff; } 50% { text-shadow: 0 0 14px #0ff, 0 0 24px #0ff; } }
    #waveSpan   { color: #0ff; animation: cShift 3s infinite; }
    #evadedSpan { color: #88ff88; animation: cShift 3s infinite; animation-delay: 1s; }
    @keyframes cShift { 0%,100% { color: #0ff; } 50% { color: #f0f; } }
    #msgSpan { font-size: .85em; background: linear-gradient(90deg,#ff88ff,#88ffff,#ff88ff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: bgMov 2s linear infinite; }
    @keyframes bgMov { from{background-position:0%} to{background-position:200%} }
    .botones { width: 100%; max-width: 560px; height: 50%; display: flex; justify-content: center; align-items: center; padding: 5px; }
    .centerbotones { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; max-width: 400px; gap: 3%; }
    .fila-botones { display: flex; justify-content: center; align-items: center; width: 100%; height: 30%; gap: 4%; }
    .boton { display: flex; justify-content: center; align-items: center; width: 28%; height: 100%; background: #0a0f1a; border-bottom: solid lightcyan 8px; border-radius: 20%; box-shadow: 0 4px 8px rgba(0,0,0,.5); transition: all .05s linear; cursor: pointer; touch-action: manipulation; -webkit-touch-callout: none; }
    .boton.activo { transform: translateY(4px); border-bottom-width: 4px; box-shadow: 0 1px 2px rgba(0,0,0,.5); background: #1a2a3a; }
    .boton svg { width: 65%; height: 65%; fill: #bbffff; pointer-events: none; }
    .boton.vacio { background: transparent; border: none; box-shadow: none; pointer-events: none; }
    .boton.vacio svg { display: none; }
    @media(max-width:550px) { .score-container { padding: 4px 10px; font-size: 8px; top: 8px; } .boton { width: 27%; border-bottom-width: 6px; } .fila-botones { gap: 3%; } .centerbotones { gap: 2%; } }
  </style>
</head>

  // ── WeatherRenderPipeline ──
  const _BATCH_TYPES = ['rain_light','rain_heavy','acid_rain','snow_light','snow_heavy','sand','debris','ash','fog','smoke','toxic','humid','heat','drips','radio','em','energy','chaos_part','dark_part','star_glimmer'];
  const WeatherRenderPipeline = {
    _batches: {},
    _init() {
      for(const t of _BATCH_TYPES) this._batches[t] = [];
    },
    _clearBatches() {
      for(const t of _BATCH_TYPES) this._batches[t].length = 0;
    },

    updateAndDraw(c, now) {
      if (!_wActiveCount) return;
      this._clearBatches();

      for (let i=0;i<WEATHER_PARTICLE_POOL_SIZE;i++) {
        const p = _wPool[i]; if (!p.active) continue;
        const wx=WindSimulationSystem.x; const wy=WindSimulationSystem.y;
        switch(p.type) {
          case 'rain_light': case 'rain_heavy': case 'acid_rain':
            p.x+=p.vx+wx*0.5; p.y+=p.vy; break;
          case 'snow_light': case 'snow_heavy':
            p.x+=p.vx+wx*0.8+fastSin(now*0.002+p.drift*10)*0.5; p.y+=p.vy; break;
          case 'sand':
            p.x+=p.vx+wx*1.2; p.y+=p.vy+wy*0.3; break;
          case 'ash':
            p.x+=p.vx+wx*0.9+fastSin(now*0.003+p.drift*8)*0.4; p.y+=p.vy+wy*0.2; break;
          case 'smoke': case 'toxic': case 'humid':
            p.x+=p.vx+wx*0.3+p.drift*fastSin(now*0.002+p.x*0.01)*0.5; p.y+=p.vy; p.size*=1.0018; break;
          case 'fog':
            p.x+=p.vx+wx*0.2; p.y+=p.vy; break;
          case 'heat':
            p.x+=p.vx+p.drift*fastSin(now*0.003+p.x*0.02); p.y+=p.vy; p.size*=1.003; break;
          case 'drips':
            p.y+=p.vy; p.vy*=1.05; break;
          case 'debris':
            p.x+=p.vx; p.y+=p.vy+fastSin(now*0.004+p.y*0.03)*0.5; break;
          default:
            p.x+=p.vx; p.y+=p.vy;
        }
        p.life--;
        p.alpha=Math.max(0,p.life/p.maxLife);
        let recycle=false;
        if(p.type.startsWith('rain')||p.type==='acid_rain'){recycle=p.y>LOGICAL_SIZE+20||p.x<-50||p.x>LOGICAL_SIZE+50;}
        else if(p.type==='sand'||p.type==='debris'){recycle=p.x>LOGICAL_SIZE+30;}
        else{recycle=p.life<=0||!_isWeatherParticleOnscreen(p);}
        if(recycle){_wRelease(p);continue;}
        const bucket=this._batches[p.type];
        if(bucket) bucket.push(p);
      }

      c.save();
      for(const t of _BATCH_TYPES) {
        const particles=this._batches[t];
        if(particles.length) this._drawBatch(c,t,particles,now);
      }
      c.restore();
    },

    _drawBatch(c,type,particles,now) {
      switch(type) {
        case 'rain_light': case 'rain_heavy': case 'acid_rain': this._drawRainBatch(c,particles); break;
        case 'snow_light': case 'snow_heavy': this._drawSnowBatch(c,particles); break;
        case 'sand': case 'debris': case 'ash': this._drawRectBatch(c,particles); break;
        case 'fog': case 'smoke': case 'toxic': case 'humid': case 'heat': this._drawBlobBatch(c,particles); break;
        case 'drips': this._drawDripBatch(c,particles); break;
        case 'radio': case 'em': case 'energy': case 'chaos_part': case 'dark_part': this._drawSparkBatch(c,particles,now); break;
        case 'star_glimmer': this._drawStarGlimmer(c,particles,now); break;
        default: this._drawRectBatch(c,particles);
      }
    },
    _drawRainBatch(c,particles) {
      let lastColor=null;c.beginPath();
      for(const p of particles){if(p.color!==lastColor){if(lastColor!==null){c.stroke();c.beginPath();}c.strokeStyle=p.color;c.lineWidth=p.size;lastColor=p.color;}c.moveTo(p.x,p.y);c.lineTo(p.x-p.vx*1.5,p.y-p.vy*1.5);}
      if(lastColor!==null) c.stroke();
    },
    _drawSnowBatch(c,particles) {
      c.fillStyle='rgba(220,235,255,0.7)';c.beginPath();
      for(const p of particles){c.globalAlpha=p.alpha*0.75;c.moveTo(p.x+p.size,p.y);c.arc(p.x,p.y,p.size,0,_TWO_PI);}c.fill();
    },
    _drawRectBatch(c,particles) {
      let lastColor=null;
      for(const p of particles){c.globalAlpha=p.alpha*0.7;if(p.color!==lastColor){c.fillStyle=p.color;lastColor=p.color;}c.fillRect(p.x-p.size*0.5,p.y-p.size*0.5,p.size,p.size*(p.type==='sand'?0.5:0.8));}
    },
    _drawBlobBatch(c,particles) {
      for(const p of particles){if(p.size<2)continue;c.globalAlpha=p.alpha;c.fillStyle=p.color;c.beginPath();c.arc(p.x,p.y,p.size,0,_TWO_PI);c.fill();}
    },
    _drawDripBatch(c,particles) {
      c.fillStyle='rgba(40,60,80,0.7)';c.beginPath();for(const p of particles){c.globalAlpha=p.alpha;c.moveTo(p.x+p.size,p.y);c.arc(p.x,p.y,p.size,0,_TWO_PI);}c.fill();
    },
    _drawSparkBatch(c,particles,now) {
      for(const p of particles){c.globalAlpha=p.alpha*(fastSin(now*0.02+p.x)*0.3+0.7);c.fillStyle=p.color;c.fillRect(p.x-p.size*0.5,p.y-p.size*0.5,p.size,p.size);}
    },
    _drawStarGlimmer(c,particles,now) {
      for(const p of particles){const twinkle=fastSin(now*0.003+p.x+p.y)*0.35+0.65;c.globalAlpha=p.alpha*twinkle;c.fillStyle=p.color;c.beginPath();c.arc(p.x,p.y,p.size,0,_TWO_PI);c.fill();}
    },
  };

    try {
      motorOsc=audioCtx.createOscillator(); motorGain=audioCtx.createGain();
      motorOsc.type='sawtooth'; motorOsc.frequency.value=10000; motorGain.gain.value=0.01;
      motorOsc.connect(motorGain); motorGain.connect(audioCtx.destination); motorOsc.start();
      isMotorPlaying=true;
      if (motorInterval) clearInterval(motorInterval);
      motorInterval=setInterval(()=>{ if(!isMotorPlaying)return; motorOsc.frequency.linearRampToValueAtTime(25+Math.random()*15,audioCtx.currentTime+0.3); },2000);
    } catch(e){}
  }
  function stopMotor() {

    try { if(motorOsc){motorOsc.stop();motorOsc.disconnect();motorOsc=null;} if(motorGain){motorGain.disconnect();motorGain=null;} if(motorInterval){clearInterval(motorInterval);motorInterval=null;} } catch(e){}

  }

      setTimeout(()=>{ g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.05); o.stop(); g.disconnect(); o.disconnect(); },duration);

  // ══ COLOR HELPERS ══
  function interpolateColor(c1,c2,t) {
    const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
    const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
    const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }

  function resolveCellColor(config,x,y,index,totalCells,gridSize) {
    const mode=config.fillColor||'default';
    switch(mode) {
      case 'random':    return `hsl(${((config._seed||0)+index*37)%360},80%,60%)`;
      case 'palette':   { const pal=PALETTES[config.palette]||['#ffffff']; return Array.isArray(pal)?pal[index%pal.length]:'#ffffff'; }
      case 'rainbow':   { const h=(performance.now()*(config.rainbowSpeed||.5)/10+index*5)%360; return `hsl(${h},90%,55%)`; }
      case 'gradientH': return interpolateColor(config.gradientStart,config.gradientEnd,x/(gridSize-1||1));
      case 'gradientV': return interpolateColor(config.gradientStart,config.gradientEnd,y/(gridSize-1||1));
      default:          return config.fillColor||MESSAGE_CONFIG.defaultFillColor;
    }
  }

  function parseEffectsString(str) {
    if (!str||str==='none') return {};
    let c={};
    for (const n of str.split('+')) c={...c,...(EFFECT_PRESETS[n]||{})};
    return c;
  }

  // ══ MESSAGE ENGINE ══
  function resolveEntry(rule) {
    if (!rule) return {text:''};
    if (rule.random){const t=rule.random[Math.floor(Math.random()*rule.random.length)];return{...rule,text:t};}
    return rule;
  }

  function buildDefaultConfig() {
    return {
      text:'',fillColor:MESSAGE_CONFIG.defaultFillColor,strokeColor:MESSAGE_CONFIG.defaultStrokeColor,
      effects:'none',effectParams:{},pointsPerCell:15,basePoints:15,comboMultiplier:.1,multiplier:2.0,
      edgeMultiplier:2.5,centerMultiplier:2.0,lastStandMultiplier:5.0,lastStandThreshold:3,
      pointsRandomMin:5,pointsRandomMax:25,completionBonus:MESSAGE_CONFIG.bonusOnComplete,
      completionBonusPoints:MESSAGE_CONFIG.bonusOnComplete,completionSpeedFactor:.5,
      overkillThreshold:5,mapSizeMode:'fittext',enemySpeedMultiplier:1,spawnRateMultiplier:1,
      powerUpSpawnRate:1,safeZoneDisabled:false,bossRush:false,doublePoints:false,
      invulnerableOnWaveStart:0,glitchIntensity:1,playerGlowOnStart:40,specialSound:null,
      bonusOnCompleteEnabled:MESSAGE_CONFIG.bonusOnCompleteEnabled,_seed:Math.floor(Math.random()*360),
    };
  }

  function getMessageConfig(wv) {
    const cfg=MESSAGE_CONFIG,def=buildDefaultConfig();
    if (cfg.mode==='sequential') return{...def,text:cfg.fallbackPool[(wv-1)%cfg.fallbackPool.length]};
    if (cfg.mode==='random')     return{...def,text:cfg.fallbackPool[Math.floor(Math.random()*cfg.fallbackPool.length)]};
    if (cfg.mode==='interval') {
      const im=cfg.intervalMode;if(wv<im.startWave) return{...def,text:''};
      const rel=wv-im.startWave;if(rel%im.every!==0) return{...def,text:''};
      const txt=im.poolOrder==='sequential'?im.pool[Math.floor(rel/im.every)%im.pool.length]:im.pool[Math.floor(Math.random()*im.pool.length)];
      return{...def,text:txt};
    }
    let best=null,bestPri=-1;
    for (const rule of cfg.MESSAGE_SCHEDULE) {
      let pri=0,matched=false;
      if(rule.wave!==undefined&&rule.wave===wv)                                       {pri=10;matched=true;}
      else if(rule.from!==undefined&&rule.to!==undefined&&wv>=rule.from&&wv<=rule.to) {pri=5;matched=true;}
      else if(rule.every!==undefined&&rule.every>0&&wv%rule.every===0)                {pri=3;matched=true;}
      if(matched&&pri>bestPri){bestPri=pri;best=rule;}
    }
    if(best){const r=resolveEntry(best);return{...def,...r};}
    if(cfg.fallback==='none')       return{...def,text:''};
    if(cfg.fallback==='random')     return{...def,text:cfg.fallbackPool[Math.floor(Math.random()*cfg.fallbackPool.length)]};
    if(cfg.fallback==='sequential'){const t=cfg.fallbackPool[cfg._fallbackIndex%cfg.fallbackPool.length];cfg._fallbackIndex++;return{...def,text:t};}
    return{...def,text:''};
  }

  // ══ GRID HELPERS ══
  function getFontInfoForGrid(size){return size>=15?{font:FONT_5,w:3,h:5,gap:2}:{font:FONT_3,w:3,h:3,gap:1};}
  function wordPixelWidthFI(word,fi){let w=0;for(const ch of word.toUpperCase())w+=fi.w+fi.gap;return Math.max(0,w-fi.gap);}
  function wrapTextFI(text,maxWidth,fi){
    const words=text.split(' '),lines=[];let cur='';
    for(const word of words){
      const test=cur?cur+' '+word:word;
      if(wordPixelWidthFI(test,fi)<=maxWidth){cur=test;}
      else{
        if(cur){lines.push(cur);cur='';}
        if(wordPixelWidthFI(word,fi)>maxWidth){let chunk='';for(const ch of word){if(wordPixelWidthFI(chunk+ch,fi)<=maxWidth)chunk+=ch;else{lines.push(chunk);chunk=ch;}}if(chunk)lines.push(chunk);}
        else cur=word;
      }
    }
    if(cur)lines.push(cur);return lines;
  }
  function calculateGridSizeForMessage(text,mode){
    const min=MESSAGE_CONFIG.gridMin,max=MESSAGE_CONFIG.gridMax;
    if(!text)return mode==='random'?min+Math.floor(Math.random()*(max-min)):min;
    let fi=getFontInfoForGrid(min);const words=text.split(' ');let maxW=0;
    for(const w of words)maxW=Math.max(maxW,wordPixelWidthFI(w,fi));
    let nw=maxW+4;
    if(nw>min){fi=getFontInfoForGrid(nw);maxW=0;for(const w of words)maxW=Math.max(maxW,wordPixelWidthFI(w,fi));nw=maxW+4;}
    const lines=wrapTextFI(text,nw-2,fi);const bh=lines.length*(fi.h+1)-1;const nh=bh+4;let base=Math.max(nw,nh);
    switch(mode){case 'expand':base=Math.ceil(base*1.2);break;case 'compact':base=Math.max(min,base-2);break;case 'random':base=min+Math.floor(Math.random()*(max-min+1));break;case 'nowrap':base=Math.min(max,nw);break;}
    return Math.max(min,Math.min(max,base));
  }

  // ══ POINTS ══
  function calculatePointsPerCell(config,comboCount,totalCells,collectedCount,gridPos,gridSize){
    const bp=config.basePoints||15,mode=config.pointsPerCell;
    if(typeof mode==='number')return mode;
    switch(mode){
      case 'random':    return Math.floor(Math.random()*((config.pointsRandomMax||25)-(config.pointsRandomMin||5)+1))+(config.pointsRandomMin||5);
      case 'increasing':return bp+collectedCount*2;
      case 'decreasing':return bp+(totalCells-collectedCount)*.5;
      case 'combo':     return Math.floor(bp*(1+comboCount*(config.comboMultiplier||.1)));
      case 'multiplier':return Math.floor(bp*(config.multiplier||2));
      case 'edge':      return(gridPos.x===0||gridPos.x===gridSize-1||gridPos.y===0||gridPos.y===gridSize-1)?Math.floor(bp*(config.edgeMultiplier||2.5)):bp;
      case 'center':    {const cx=Math.floor(gridSize/2),cy=Math.floor(gridSize/2);return(Math.abs(gridPos.x-cx)<=1&&Math.abs(gridPos.y-cy)<=1)?Math.floor(bp*(config.centerMultiplier||2)):bp;}
      case 'lastStand': return totalCells-collectedCount<=(config.lastStandThreshold||3)?Math.floor(bp*(config.lastStandMultiplier||5)):bp;
      default:          return bp;
    }
  }
  function calculateCompletionBonus(config,totalCells,comboCount,elapsed){
    const mode=config.completionBonus,base=config.completionBonusPoints||200;
    if(!mode||mode===0)return 0;if(typeof mode==='number')return mode;
    switch(mode){
      case 'perfect':  return base;
      case 'scale':    return Math.floor(base*(config.completionBonusMultiplier||1.5));
      case 'speed':    {const f=config.completionSpeedFactor||.5;return Math.max(0,base-Math.floor(elapsed/1000)*5)+Math.floor(base*f);}
      case 'overkill': return comboCount>=(config.overkillThreshold||5)?base*3:base;
      default:         return base;
    }
  }

  // ══ MESSAGE COORDS ══
  function messageToCoordsAdvanced(message,config,gridSize){
    const fi=getFontInfoForGrid(gridSize);if(!fi)return[];
    const{font,w,h,gap}=fi;const maxWidth=gridSize-2;const lines=wrapTextFI(message,maxWidth,fi);
    const blockH=lines.length*(h+1)-1;const startY=Math.max(1,Math.floor((gridSize-blockH)/2));
    const coords=[];let lineY=startY;const parsedEffects=parseEffectsString(config.effects);
    for(const line of lines){
      const lineW=wordPixelWidthFI(line,fi);let cx=1+Math.floor((maxWidth-lineW)/2);
      for(const ch of line.toUpperCase()){
        const matrix=font[ch]||font[' '];
        for(let row=0;row<matrix.length;row++){
          for(let col=0;col<(matrix[row].length||1);col++){
            const bit=Array.isArray(matrix[row])?matrix[row][col]:matrix[row];
            if(bit===1){
              const x=cx+col,y=lineY+row;
              if(x>=0&&x<gridSize&&y>=0&&y<gridSize){
                const index=coords.length;const color=resolveCellColor(config,x,y,index,0,gridSize);
                coords.push({x,y,color,fillColor:config.fillColor,palette:config.palette,rainbowSpeed:config.rainbowSpeed,strokeColor:config.strokeColor||MESSAGE_CONFIG.defaultStrokeColor,effects:config.effects||'none',_parsedEffects:parsedEffects,effectParams:{...(config.effectParams||{})},basePoints:config.basePoints||15,pointsMode:config.pointsPerCell,isEdge:(x===0||x===gridSize-1||y===0||y===gridSize-1),isCenter:Math.abs(x-Math.floor(gridSize/2))<=1&&Math.abs(y-Math.floor(gridSize/2))<=1});
              }
            }
          }
        }
        cx+=w+gap;
      }
      lineY+=h+1;
    }
    return coords;
  }

  // ══ CLEANUP ══
  function hardCleanup(){
    const nowMs=Date.now();
    for(let i=wallAlerts.length-1;i>=0;i--){if(nowMs>=wallAlerts[i].expiryTime){wallAlerts[i]=wallAlerts[wallAlerts.length-1];wallAlerts.pop();}}
    for(let i=powerUpsOnMap.length-1;i>=0;i--){if(nowMs>powerUpsOnMap[i].expires){powerUpsOnMap[i]=powerUpsOnMap[powerUpsOnMap.length-1];powerUpsOnMap.pop();}}
    if(messageCollectibles.length>200) messageCollectibles.length=200;
    if(enemies.length>75) enemies.length=75;
    if(_wActiveCount>WEATHER_PARTICLE_POOL_SIZE*0.9){
      let released=0;
      for(let i=0;i<WEATHER_PARTICLE_POOL_SIZE&&released<20;i++){if(_wPool[i].active&&_wPool[i].type==='fog'){_wRelease(_wPool[i]);released++;}}
    }
    // Clamp active counters to prevent overflow
    if(_particleActiveCount>PARTICLE_POOL_SIZE) _particleActiveCount=PARTICLE_POOL_SIZE;
    if(_sparkActiveCount>SPARK_POOL_SIZE) _sparkActiveCount=SPARK_POOL_SIZE;
    if(_ftActiveCount>FT_POOL_SIZE) _ftActiveCount=FT_POOL_SIZE;
    if(_wActiveCount>WEATHER_PARTICLE_POOL_SIZE) _wActiveCount=WEATHER_PARTICLE_POOL_SIZE;
    if(attractedCount>ATTRACTED_POOL_SIZE) attractedCount=ATTRACTED_POOL_SIZE;
  }

  // ══ ENEMY ══
  class Enemy {
    constructor(dir,isBoss=false){
      this.dir=dir;this.isBoss=isBoss;this.sizeMultiplier=isBoss?2:1;
      this.x=0;this.y=0;this.progress=0;
      this.speed=isBoss?enemySpawnConfig.boss.speed:enemySpawnConfig.normal.speed;
      const maxIndex=GRID_SIZE-(this.sizeMultiplier-1);
      if      (dir==='down') {this.x=Math.floor(Math.random()*maxIndex);this.y=-(this.sizeMultiplier-1);}
      else if (dir==='up')   {this.x=Math.floor(Math.random()*maxIndex);this.y=GRID_SIZE;}
      else if (dir==='right'){this.y=Math.floor(Math.random()*maxIndex);this.x=-(this.sizeMultiplier-1);}
      else                   {this.y=Math.floor(Math.random()*maxIndex);this.x=GRID_SIZE;}
    }
    update(){
      this.progress+=this.speed;
      if      (this.dir==='down') this.y=-(this.sizeMultiplier-1)+this.progress;
      else if (this.dir==='up')   this.y=GRID_SIZE-this.progress;
      else if (this.dir==='right')this.x=-(this.sizeMultiplier-1)+this.progress;
      else                        this.x=GRID_SIZE-this.progress;
    }
    fillOccupiedCells(buf){
      const cx=Math.round(this.x),cy=Math.round(this.y);
      if(this.sizeMultiplier===1){buf[0].x=cx;buf[0].y=cy;return 1;}
      let n=0;for(let dx=0;dx<2;dx++)for(let dy=0;dy<2;dy++){buf[n].x=cx+dx;buf[n].y=cy+dy;n++;}return n;
    }
    isOffScreen(){
      const m=(this.sizeMultiplier-1)+.8;
      if(this.dir==='down') return this.y>GRID_SIZE+m;if(this.dir==='up')  return this.y<-m;
      if(this.dir==='right')return this.x>GRID_SIZE+m;return this.x<-m;
    }
  }

  function drawAllEnemies(){
    if(!enemies.length)return;
    ctx.save();
    ctx.strokeStyle='#ff6644';ctx.lineWidth=2;ctx.beginPath();let hasNormal=false;
    for(const e of enemies){
      if(e.isBoss)continue;hasNormal=true;
      const offX=e.sizeMultiplier===2?CELL_SIZE*0.5:0,offY=e.sizeMultiplier===2?CELL_SIZE*0.5:0;
      const px=e.x*CELL_SIZE+CELL_SIZE*0.5+offX,py=e.y*CELL_SIZE+CELL_SIZE*0.5+offY;
      const sz=CELL_SIZE*0.6;let angle=0;
      if(e.dir==='right')angle=Math.PI*0.5;else if(e.dir==='down')angle=Math.PI;else if(e.dir==='left')angle=-Math.PI*0.5;
      const cosA=Math.cos(angle),sinA=Math.sin(angle),tipY=-sz*0.85,baseY=sz*0.5,baseX=sz*0.65;
      ctx.moveTo(px-sinA*tipY,py+cosA*tipY);ctx.lineTo(px+cosA*(-baseX)-sinA*baseY,py+sinA*(-baseX)+cosA*baseY);ctx.lineTo(px+cosA*baseX-sinA*baseY,py+sinA*baseX+cosA*baseY);ctx.closePath();
    }
    if(hasNormal)ctx.stroke();
    ctx.strokeStyle='#ff77ff';ctx.lineWidth=2.5;ctx.beginPath();let hasBoss=false;
    for(const e of enemies){
      if(!e.isBoss)continue;hasBoss=true;
      const px=e.x*CELL_SIZE+CELL_SIZE*1.0,py=e.y*CELL_SIZE+CELL_SIZE*1.0,sz=CELL_SIZE*1.35;
      let angle=0;if(e.dir==='right')angle=Math.PI*0.5;else if(e.dir==='down')angle=Math.PI;else if(e.dir==='left')angle=-Math.PI*0.5;
      const cosA=Math.cos(angle),sinA=Math.sin(angle),tipY=-sz*0.85,baseY=sz*0.5,baseX=sz*0.65;
      ctx.moveTo(px-sinA*tipY,py+cosA*tipY);ctx.lineTo(px+cosA*(-baseX)-sinA*baseY,py+sinA*(-baseX)+cosA*baseY);ctx.lineTo(px+cosA*baseX-sinA*baseY,py+sinA*baseX+cosA*baseY);ctx.closePath();
    }
    if(hasBoss)ctx.stroke();
    ctx.restore();
  }

  // ══ ZONES ══
  function adjustZonesToNewGrid(oldSize,newSize){
    [safeZone,bonusZone,doubleBonusZone,tripleBonusZone].forEach(z=>{
      if(z){z.x=Math.min(newSize-1,Math.floor(z.x*newSize/oldSize));z.y=Math.min(newSize-1,Math.floor(z.y*newSize/oldSize));}
    });
  }
  function generateSafeZone()        {if(safeZoneDisabledForWave)return;safeZone={x:Math.floor(Math.random()*GRID_SIZE),y:Math.floor(Math.random()*GRID_SIZE),expires:Date.now()+SAFE_ZONE_DURATION};}
  function generateBonusZone()       {bonusZone={x:Math.floor(Math.random()*GRID_SIZE),y:Math.floor(Math.random()*GRID_SIZE),expires:Date.now()+BONUS_ZONE_DURATION};lastBonusTick=Date.now();}
  function generateDoubleBonusZone() {doubleBonusZone={x:Math.floor(Math.random()*GRID_SIZE),y:Math.floor(Math.random()*GRID_SIZE),expires:Date.now()+DOUBLE_BONUS_ZONE_DURATION};lastDoubleBonusTick=Date.now();}
  function generateTripleBonusZone() {tripleBonusZone={x:Math.floor(Math.random()*GRID_SIZE),y:Math.floor(Math.random()*GRID_SIZE),expires:Date.now()+TRIPLE_BONUS_ZONE_DURATION};lastTripleBonusTick=Date.now();}

  function updateZones(){
    if(!safeZone){safeZoneTimer++;if(safeZoneTimer>130&&!safeZoneDisabledForWave){generateSafeZone();safeZoneTimer=0;}}
    else if(Date.now()>=safeZone.expires)safeZone=null;
    if(!bonusZone){bonusZoneTimer++;if(bonusZoneTimer>200&&bonusZoneCurrentWaveCount<MAX_BONUS_ZONES_PER_WAVE){generateBonusZone();bonusZoneCurrentWaveCount++;bonusZoneTimer=0;}}
    else if(Date.now()>=bonusZone.expires)bonusZone=null;
    if(!doubleBonusZone){doubleBonusZoneTimer++;if(doubleBonusZoneCurrentWaveCount<MAX_DOUBLE_BONUS_ZONES_PER_WAVE&&doubleBonusZoneTimer>180&&Math.random()<.25&&Date.now()-lastDoubleBonusSpawnTime>=10000&&evadedSinceLastDoubleBonus>8&&scoreSinceLastDoubleBonus>150){generateDoubleBonusZone();doubleBonusZoneCurrentWaveCount++;doubleBonusZoneTimer=0;lastDoubleBonusSpawnTime=Date.now();evadedSinceLastDoubleBonus=0;scoreSinceLastDoubleBonus=0;}}
    else if(Date.now()>=doubleBonusZone.expires)doubleBonusZone=null;
    if(!tripleBonusZone){tripleBonusZoneTimer++;if(tripleBonusZoneCurrentWaveCount<MAX_TRIPLE_BONUS_ZONES_PER_WAVE&&tripleBonusZoneTimer>250&&Math.random()<.3&&Date.now()-lastTripleBonusSpawnTime>=20000&&premiumCollectedSinceLastTripleBonus>=3&&bossesEvadedSinceLastTripleBonus>=2&&!doubleBonusZone){generateTripleBonusZone();tripleBonusZoneCurrentWaveCount++;tripleBonusZoneTimer=0;lastTripleBonusSpawnTime=Date.now();premiumCollectedSinceLastTripleBonus=0;bossesEvadedSinceLastTripleBonus=0;}}
    else if(Date.now()>=tripleBonusZone.expires)tripleBonusZone=null;
  }

  function isInSafeZone()        {return safeZone&&player.x===safeZone.x&&player.y===safeZone.y;}
  function isInBonusZone()       {return bonusZone&&player.x===bonusZone.x&&player.y===bonusZone.y;}
  function isInDoubleBonusZone() {return doubleBonusZone&&player.x===doubleBonusZone.x&&player.y===doubleBonusZone.y;}
  function isInTripleBonusZone() {return tripleBonusZone&&player.x===tripleBonusZone.x&&player.y===tripleBonusZone.y;}

  function drawZoneArc(zone,duration,cacheKey,fillColor,strokeFill,outerRadius,innerRadius,pulseDiv){
    if(!zone)return;
    const px=zone.x*CELL_SIZE+CELL_SIZE/2,py=zone.y*CELL_SIZE+CELL_SIZE/2;
    const timeLeft=Math.max(0,zone.expires-Date.now()),ratio=timeLeft/duration;
    const secs=Math.ceil(timeLeft/1000),pulse=fastSin(performance.now()/pulseDiv)*0.15+0.88;
    const cache=_zoneGradCache[cacheKey];const gradKey=`${px},${py}`;
    if(cache.key!==gradKey){cache.key=gradKey;cache.grad=ctx.createRadialGradient(px,py,CELL_SIZE*0.1,px,py,CELL_SIZE*outerRadius);cache.grad.addColorStop(0,fillColor+'aa');cache.grad.addColorStop(1,fillColor+'00');}
    ctx.save();
    ctx.globalAlpha=.5*ratio;ctx.fillStyle=cache.grad;ctx.beginPath();ctx.arc(px,py,CELL_SIZE*outerRadius*pulse,0,_TWO_PI);ctx.fill();
    ctx.globalAlpha=.8;ctx.strokeStyle='#ffffff';ctx.lineWidth=4;ctx.beginPath();ctx.arc(px,py,CELL_SIZE*.68,0,_TWO_PI);ctx.stroke();
    ctx.fillStyle=strokeFill;ctx.beginPath();ctx.arc(px,py,CELL_SIZE*innerRadius,0,_TWO_PI);ctx.fill();
    ctx.font='900 28px "Press Start 2P",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#ffffff';ctx.strokeStyle='#003344';ctx.lineWidth=3;
    ctx.strokeText(secs,px,py);ctx.fillText(secs,px,py);
    ctx.restore();
  }

  function drawSafeZone()        {drawZoneArc(safeZone,SAFE_ZONE_DURATION,'safe','#00ffcc','#00ffff',.75,.45,70);}
  function drawBonusZone()       {drawZoneArc(bonusZone,BONUS_ZONE_DURATION,'bonus','#ffcc00','#ffaa00',.75,.45,60);}
  function drawDoubleBonusZone() {drawZoneArc(doubleBonusZone,DOUBLE_BONUS_ZONE_DURATION,'double','#ff00ff','#cc00cc',.78,.48,55);}

    ctx.fillStyle='#00FFFF';ctx.beginPath();ctx.arc(px,py,CELL_SIZE*.52,0,_TWO_PI);ctx.fill();

  function updateBonusScore(){
    if(!bonusZone||!isInBonusZone()||gameOver)return;const now=Date.now();
    if(now-lastBonusTick>=1000){let ticks=Math.floor((now-lastBonusTick)/1000),pts=ticks*(doublePointsActive?8:4);score+=pts;scoreSinceLastDoubleBonus+=pts;if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}updateUI();playBonusCollect();createFloatingText(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,pts,false);lastBonusTick+=ticks*1000;}
  }

    if(now-lastDoubleBonusTick>=1000){let ticks=Math.floor((now-lastDoubleBonusTick)/1000),pts=ticks*(doublePointsActive?16:8);score+=pts;scoreSinceLastDoubleBonus+=pts;if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}updateUI();playDoubleBonusCollect();createFloatingText(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,pts,true);lastDoubleBonusTick+=ticks*1000;}

  // ══ POWER-UPS ══
  function getAvailablePowerUpTypes(){return Object.entries(POWERUP_CONFIG.types).filter(([k,c])=>c.enabled&&(!c.startWave||wave>=c.startWave)).map(([k])=>k);}
  function generatePowerUps(){
    powerUpsOnMap=[];if(wave<POWERUP_CONFIG.startWave)return;
    const candidates=getAvailablePowerUpTypes();if(!candidates.length)return;
    const toSpawn=Math.min(POWERUP_CONFIG.spawnCount,candidates.length);
    for(let i=0;i<toSpawn;i++){
      const typeKey=candidates[Math.floor(Math.random()*candidates.length)];
      let x,y,attempts=0;
      do{x=Math.floor(Math.random()*GRID_SIZE);y=Math.floor(Math.random()*GRID_SIZE);attempts++;}
      while(attempts<800&&((x===player.x&&y===player.y)||collectibles.some(c=>c.x===x&&c.y===y)||messageCollectibles.some(c=>c.x===x&&c.y===y)||powerUpsOnMap.some(p=>p.x===x&&p.y===y)));
      powerUpsOnMap.push({type:typeKey,x,y,expires:Date.now()+POWERUP_CONFIG.lifetime});
    }
  }
  function getPowerUpCost(type){return POWERUP_CONFIG.types[type]?.cost||0;}
  function applyNewPowerUpEffect(type){
    switch(type){
      case 'timeSlow':
        if(!originalSpeeds)originalSpeeds={normal:enemySpawnConfig.normal.speed,boss:enemySpawnConfig.boss.speed};
        enemySpawnConfig.normal.speed*=POWERUP_CONFIG.types.timeSlow.slowFactor;enemySpawnConfig.boss.speed*=POWERUP_CONFIG.types.timeSlow.slowFactor;break;
      case 'doubleScore':doublePointsActive=true;break;
      case 'freeze':enemies.forEach(e=>e.speed*=.1);break;
      case 'teleporter':{const msgCells=messageCollectibles.length>0?messageCollectibles:collectibles;if(msgCells.length>0){const target=msgCells[Math.floor(Math.random()*msgCells.length)];player.x=target.x;player.y=target.y;playerDrawX=player.x*CELL_SIZE+CELL_SIZE/2;playerDrawY=player.y*CELL_SIZE+CELL_SIZE/2;createExplosion(playerDrawX,playerDrawY,30,'#00ffff',1.5);SPECIAL_SOUNDS.teleport();}break;}
      case 'starShower':for(let i=0;i<15;i++)collectibles.push({x:Math.floor(Math.random()*GRID_SIZE),y:Math.floor(Math.random()*GRID_SIZE)});createExplosion(LOGICAL_SIZE/2,LOGICAL_SIZE/2,40,'#ffdd00',2);SPECIAL_SOUNDS.starPower();break;
      case 'clone':{
        const oldClone=activeEffects.find(e=>e.type==='clone');if(oldClone&&oldClone.intervalId)clearInterval(oldClone.intervalId);
        activeEffects=activeEffects.filter(e=>e.type!=='clone');
        const cloneInterval=setInterval(()=>{
          if(gameOver||!activeEffects.some(e=>e.type==='clone')){clearInterval(cloneInterval);return;}
          const allCells=[...collectibles,...messageCollectibles];
          if(allCells.length>0){const target2=allCells.reduce((a,b)=>{const da=Math.abs(a.x-player.x)+Math.abs(a.y-player.y),db=Math.abs(b.x-player.x)+Math.abs(b.y-player.y);return da<db?a:b;});player.x=target2.x;player.y=target2.y;playerDrawX=player.x*CELL_SIZE+CELL_SIZE/2;playerDrawY=player.y*CELL_SIZE+CELL_SIZE/2;checkCollectibles();}
        },500);
        activeEffects.push({type:'clone',expires:performance.now()+POWERUP_CONFIG.types.clone.duration,intervalId:cloneInterval});break;
      }
    }
  }
  function tryActivatePowerUp(pu){
    if(Date.now()>pu.expires)return false;
    const cost=getPowerUpCost(pu.type);
    if(score<cost){acquireFloatingText(playerDrawX,playerDrawY-25,'SIN PUNTOS','#ff4444',false,false,false);playSound(320,100,'square',.6);return false;}
    const info=POWERUP_TYPES[pu.type],cfg=POWERUP_CONFIG.types[pu.type];
    if(pu.type==='shield'&&activeEffects.some(e=>e.type==='shield')){acquireFloatingText(playerDrawX,playerDrawY-25,'ESCUDO YA ACTIVO','#ffff44',true,false,false);playSound(400,100,'triangle',.5);return false;}
    if(pu.type.startsWith('magnet')){const existingIdx=activeEffects.findIndex(e=>e.type.startsWith('magnet'));if(existingIdx!==-1){const existing=activeEffects[existingIdx];const existingRadius=POWERUP_CONFIG.types[existing.type]?.radius||0;if((cfg.radius||0)>existingRadius){activeEffects.splice(existingIdx,1);acquireFloatingText(playerDrawX,playerDrawY-35,'IMAN MEJORADO','#44ffcc',true,false,false);}else{acquireFloatingText(playerDrawX,playerDrawY-25,'IMAN YA ACTIVO','#ffff44',true,false,false);playSound(400,100,'triangle',.5);return false;}}}
    if(pu.type==='revive'&&hasReviveTotem){acquireFloatingText(playerDrawX,playerDrawY-25,'YA TIENES REVIVE','#88ff88',true,false,false);score+=cost;updateUI();return false;}
    score-=cost;updateUI();
    const px=pu.x*CELL_SIZE+CELL_SIZE/2,py=pu.y*CELL_SIZE+CELL_SIZE/2;
    acquireFloatingText(px,py-15,`-${cost}`,'#ff4444',false,false,false);
    powerFlashColor=info.color||'#ffffff';premiumFlash=20;
    const newTypes=['timeSlow','doubleScore','freeze','clone','teleporter','starShower'];
    if(newTypes.includes(pu.type)){acquireFloatingText(px,py,info.name+(info.level?' '+info.level:''),'#ffccff',true,false,false);applyNewPowerUpEffect(pu.type);powerUpsOnMap=powerUpsOnMap.filter(p=>p!==pu);SPECIAL_SOUNDS.powerUpActivate();return true;}
    if(pu.type==='revive'){hasReviveTotem=true;acquireFloatingText(px,py,'REVIVE LISTO','#88ff88',true,false,false);playSound(1350,90,'sine',.7);}
    else if(pu.type.includes('bomb')){
      const isLeg=pu.type==='bombLegendary';
      for(let i=enemies.length-1;i>=0;i--){if(isLeg||Math.random()<.8){createExplosion(enemies[i].x*CELL_SIZE+CELL_SIZE/2,enemies[i].y*CELL_SIZE+CELL_SIZE/2,isLeg?25:20,'#ff4444');enemies.splice(i,1);}}
      createExplosion(px,py,isLeg?55:40,'#ff6644',1.8);acquireFloatingText(px,py,info.name+(info.level?' '+info.level:''),'#FFD700',true,true,true);playSound(180,350,'sawtooth',.85);
    }else{activeEffects.push({type:pu.type,expires:performance.now()+(cfg.duration||0),radius:cfg.radius||0});acquireFloatingText(px,py,info.name+(info.level?' '+info.level:''),'#ffccff',true,false,false);}
    powerUpsOnMap=powerUpsOnMap.filter(p=>p!==pu);return true;
  }
  function updateActiveEffects(){
    const now=performance.now();
    for(let i=activeEffects.length-1;i>=0;i--){
      if(now>=activeEffects[i].expires){
        const ef=activeEffects[i];
        if(ef.type==='timeSlow'){if(originalSpeeds){enemySpawnConfig.normal.speed=originalSpeeds.normal;enemySpawnConfig.boss.speed=originalSpeeds.boss;}originalSpeeds=null;}
        if(ef.type==='freeze'){enemies.forEach(e=>e.speed=Math.min(.2,e.speed*10));}
        if(ef.type==='doubleScore'&&!activeEffects.some((e,ei)=>ei!==i&&e.type==='doubleScore'))doublePointsActive=false;
        if(ef.type==='clone'&&ef.intervalId)clearInterval(ef.intervalId);
        activeEffects.splice(i,1);
      }
    }
  }

  function drawPowerUpsOnMap(){
    if(!powerUpsOnMap.length)return;
    const now=performance.now();const basePulse=fastSin(now/110)*0.07+1.0;const iconScale=Math.min(LOGICAL_SIZE,LOGICAL_SIZE)*0.038;const rot=now*0.003;const TWO_PI_OVER_6=Math.PI/3;
    ctx.save();
    for(const pu of powerUpsOnMap){
      if(Date.now()>pu.expires)continue;const px=pu.x*CELL_SIZE+CELL_SIZE*0.5,py=pu.y*CELL_SIZE+CELL_SIZE*0.5;
      const info=POWERUP_TYPES[pu.type];const s=iconScale*basePulse;
      ctx.fillStyle=info.color;ctx.globalAlpha=0.5;ctx.beginPath();
      for(let i=0;i<6;i++){const angle=rot+i*TWO_PI_OVER_6;const ox=px+fastCos(angle)*s*1.4,oy=py+fastSin(angle)*s*1.4;ctx.moveTo(ox+s*0.07,oy);ctx.arc(ox,oy,s*0.07,0,_TWO_PI);}
      ctx.fill();ctx.globalAlpha=1;ctx.strokeStyle=info.color;ctx.lineWidth=Math.max(1.5,s*0.15);ctx.beginPath();ctx.arc(px,py,s,0,_TWO_PI);ctx.stroke();
      const ls=Math.max(8,Math.floor(s*0.85));ctx.font=`900 ${ls}px "Press Start 2P",monospace`;ctx.fillStyle='#ffffff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(info.name.substring(0,5)+(info.level?'+':''),px,py-s*0.2);
      ctx.font=`bold ${Math.max(7,Math.floor(s*0.7))}px "Press Start 2P",monospace`;ctx.fillStyle=info.color;ctx.fillText(getPowerUpCost(pu.type),px,py+s*0.5);
    }
    ctx.restore();
  }

  // ── drawMessageCollectibles — single-pass, batched by color ──
  function drawMessageCollectibles(){
    if(!messageCollectibles.length)return;
    const now=performance.now();
    ctx.save();
    let lastFill=null;let batchOpen=false;
    for(const cell of messageCollectibles){
      const isDynamic=cell.fillColor==='rainbow'||cell.fillColor==='rainbow_fast'||cell.fillColor==='rainbow_slow'||cell.fillColor==='palette';
      if(isDynamic){
        if(batchOpen){ctx.fill();batchOpen=false;lastFill=null;}
        let cellColor;
        if(cell.fillColor==='palette'&&cell.palette){const pal=PALETTES[cell.palette];if(pal)cellColor=pal[(cell.x+cell.y+Math.floor(now/200))%pal.length];}
        else{const speed=cell.fillColor==='rainbow_fast'?0.5:(cell.fillColor==='rainbow_slow'?0.1:(cell.rainbowSpeed||0.5));cellColor=`hsl(${(now*speed+(cell.x+cell.y)*5)%360},90%,55%)`;}
        const eff=cell._parsedEffects||{};let scale=1,alpha=1;
        if(eff.pulseAmplitude)scale+=fastSin(now*0.003*(eff.pulseSpeed||0.3))*eff.pulseAmplitude;
        if(eff.stealthAlphaMin!==undefined){alpha=fastSin(now*0.002*(eff.stealthSpeed||0.4))*0.5+0.5;alpha=Math.max(eff.stealthAlphaMin,alpha);}
        if(eff.blinkMinAlpha!==undefined)alpha=fastSin(now*0.006*(eff.blinkSpeed||0.2))>0?1:(eff.blinkMinAlpha||0.3);
        const px=cell.x*CELL_SIZE+CELL_SIZE*0.5,py=cell.y*CELL_SIZE+CELL_SIZE*0.5;const r=CELL_SIZE*0.34*scale;
        ctx.globalAlpha=alpha;ctx.fillStyle=cellColor||'#ff88ff';ctx.beginPath();ctx.arc(px,py,r,0,_TWO_PI);ctx.fill();
        if(cell.strokeColor&&cell.strokeColor.mode==='fixed'&&cell.strokeColor.value!=='transparent'){ctx.strokeStyle=cell.strokeColor.value;ctx.lineWidth=cell.strokeColor.width||1;ctx.stroke();}
        ctx.globalAlpha=1;
        continue;
      }
      const eff=cell._parsedEffects||{};let scale=1,alpha=1;
      if(eff.pulseAmplitude)scale+=fastSin(now*0.003*(eff.pulseSpeed||0.3))*eff.pulseAmplitude;
      if(eff.stealthAlphaMin!==undefined){alpha=fastSin(now*0.002*(eff.stealthSpeed||0.4))*0.5+0.5;alpha=Math.max(eff.stealthAlphaMin,alpha);}
      if(eff.blinkMinAlpha!==undefined)alpha=fastSin(now*0.006*(eff.blinkSpeed||0.2))>0?1:(eff.blinkMinAlpha||0.3);
      const px=cell.x*CELL_SIZE+CELL_SIZE*0.5,py=cell.y*CELL_SIZE+CELL_SIZE*0.5;const r=CELL_SIZE*0.34*scale;
      const c=cell.color||MESSAGE_CONFIG.defaultFillColor;
      ctx.globalAlpha=alpha;
      if(c!==lastFill){if(batchOpen)ctx.fill();ctx.fillStyle=c;lastFill=c;ctx.beginPath();batchOpen=true;}
      ctx.moveTo(px+r,py);ctx.arc(px,py,r,0,_TWO_PI);
    }
    if(batchOpen)ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  }

  function startAttraction(cell,isMessage){
    const drawX=cell.x*CELL_SIZE+CELL_SIZE/2,drawY=cell.y*CELL_SIZE+CELL_SIZE/2;
    acquireAttracted(drawX,drawY,isMessage,isMessage?{...cell,origX:cell.x,origY:cell.y}:null);
  }
  function drawAttractedItems(){
    if(!attractedCount)return;const now=performance.now();ctx.save();ctx.globalAlpha=0.9;
    for(let i=0;i<ATTRACTED_POOL_SIZE;i++){
      const a=_attractedPool[i];if(!a.active)continue;
      if(a.isMessage&&a.data){
        let cellColor=a.data.color;
        if(a.data.fillColor==='rainbow'){const h=(now*(a.data.rainbowSpeed||0.5)+(a.data.origX+a.data.origY)*5)%360;cellColor=`hsl(${h},90%,55%)`;}
        else if(a.data.fillColor==='palette'&&a.data.palette){const pal=PALETTES[a.data.palette];if(pal)cellColor=pal[Math.floor(now/200)%pal.length];}
        ctx.fillStyle=cellColor||'#ff88ff';ctx.beginPath();ctx.arc(a.drawX,a.drawY,CELL_SIZE*0.34,0,_TWO_PI);ctx.fill();
        if(a.data.strokeColor&&a.data.strokeColor.mode==='fixed'&&a.data.strokeColor.value!=='transparent'){ctx.strokeStyle=a.data.strokeColor.value;ctx.lineWidth=a.data.strokeColor.width||1;ctx.stroke();}
      }else{ctx.fillStyle='#ffcc33';ctx.beginPath();ctx.arc(a.drawX,a.drawY,CELL_SIZE*0.33,0,_TWO_PI);ctx.fill();}
    }
    ctx.restore();
  }

  // ══ ZONE INDICATOR ══
  const _corruptionAngles=new Float32Array(14);
  let _corruptionDirty=true,_lastZoneColorKey=null;
  for(let i=0;i<14;i++)_corruptionAngles[i]=(i/14)*_TWO_PI+i*0.618;
  // FIXED: lastZoneColor properly initialized
  let lastZoneColor='#00ffcc',lastZoneText='';
  let zoneEffectActive=false,zoneEffectColor='#00ffcc',zoneEffectStartTime=0,zoneEffectOut=false,zoneEffectOutStart=0,zoneLastType=null;
  function easeOutCubic(t){return 1-Math.pow(1-t,5);}

  function drawZoneIndicator(){
    if(gameOver)return;
    let currentZoneColor=null,currentText='';
    if      (isInTripleBonusZone()){currentZoneColor='#FFD700';currentText='||ZONA DE PUNTOS X3||';}
    else if (isInDoubleBonusZone()){currentZoneColor='#ff00ff';currentText='||ZONA DE PUNTOS X2||';}
    else if (isInBonusZone())      {currentZoneColor='#ffcc00';currentText='||ZONA DE PUNTOS||';}
    else if (isInSafeZone())       {currentZoneColor='#00ffcc';currentText='||ZONA SEGURA||';}
    if(currentZoneColor!==_lastZoneColorKey){_lastZoneColorKey=currentZoneColor;_corruptionDirty=true;}
    if(currentZoneColor){
      if(!zoneEffectActive||zoneEffectColor!==currentZoneColor){zoneEffectActive=true;zoneEffectColor=currentZoneColor;lastZoneColor=currentZoneColor;lastZoneText=currentText;zoneEffectStartTime=performance.now();zoneEffectOut=false;}
      else if(zoneEffectOut){zoneEffectOut=false;zoneEffectActive=true;}zoneLastType=currentZoneColor;
    }else{if(zoneEffectActive&&!zoneEffectOut){zoneEffectOut=true;zoneEffectOutStart=performance.now();}}
    if(!zoneEffectActive)return;
    const now=performance.now();const duration=600;let progress;
    if(!zoneEffectOut){progress=Math.min(1,(now-zoneEffectStartTime)/duration);}

    ctx.globalAlpha=1;
    const textX=LOGICAL_SIZE*0.5,textY=LOGICAL_SIZE*0.5,distToText=Math.hypot(textX-px,textY-py);
    const revealT=Math.max(0,Math.min(1,(currentRadius-distToText+CELL_SIZE*2)/(CELL_SIZE*4)));const textAlpha=progress*easeOutCubic(revealT);

  // ══ PLAYER ══
  function drawPlayer(){
    const now=performance.now();const bob=fastSin(now*0.005)*3;const px=playerDrawX,py=playerDrawY+bob;const size=CELL_SIZE*0.72;
    const invulnerable=now<invulnerableUntil;const blink=invulnerable&&(Math.floor(now/100)&1)===0;
    let diff=targetAngle-currentPlayerAngle;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    currentPlayerAngle+=diff*0.15;currentTiltX+=(targetTiltX-currentTiltX)*0.2;currentTiltZ+=(targetTiltZ-currentTiltZ)*0.2;
    ctx.save();ctx.translate(px,py);ctx.rotate(currentPlayerAngle);
    if(currentTiltX!==0||currentTiltZ!==0)ctx.transform(1,currentTiltZ*0.15,currentTiltX*0.15,1,0,0);
    if(blink)ctx.globalAlpha=0.5;
    const hasShield=activeEffects.some(e=>e.type==='shield');
    if(hasShield){ctx.beginPath();ctx.arc(0,0,size*1.1,0,_TWO_PI);ctx.fillStyle='rgba(170,221,255,0.25)';ctx.fill();ctx.strokeStyle='#aaddff';ctx.lineWidth=2.5;ctx.stroke();}
    const magnetEf=activeEffects.find(e=>e.type.startsWith('magnet'));
    if(magnetEf){const mRadius=POWERUP_CONFIG.types[magnetEf.type]?.radius||0;const step=CELL_SIZE*(mRadius>=999?2:mRadius*0.8);ctx.strokeStyle='#44ffcc';ctx.lineWidth=1.2;ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(0,0,step,0,_TWO_PI);ctx.moveTo(step*0.75,0);ctx.arc(0,0,step*0.75,0,_TWO_PI);ctx.stroke();}
    ctx.globalAlpha=blink?0.5:1;
    ctx.beginPath();ctx.moveTo(0,-size*0.85);ctx.lineTo(-size*0.55,size*0.4);ctx.lineTo(0,size*0.2);ctx.lineTo(size*0.55,size*0.4);ctx.closePath();
    ctx.fillStyle='transparent';ctx.fill();ctx.strokeStyle='skyblue';ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.moveTo(-size*0.5,size*0.1);ctx.lineTo(-size*0.95,size*0.5);ctx.lineTo(-size*0.45,size*0.5);ctx.moveTo(size*0.5,size*0.1);ctx.lineTo(size*0.95,size*0.5);ctx.lineTo(size*0.45,size*0.5);ctx.fillStyle='transparent';ctx.fill();
    if(hasReviveTotem){ctx.beginPath();ctx.arc(size*0.55,-size*0.65,size*0.15,0,_TWO_PI);ctx.fillStyle='#88ff88';ctx.fill();ctx.beginPath();ctx.arc(size*0.55,-size*0.65,size*0.07,0,_TWO_PI);ctx.fillStyle='#ffffff';ctx.fill();}
    ctx.restore();
    if(playerGlow>0){ctx.globalAlpha=playerGlow/20;ctx.fillStyle='rgba(180,255,255,1)';ctx.beginPath();ctx.arc(px,py,CELL_SIZE*1.3,0,_TWO_PI);ctx.fill();ctx.globalAlpha=1;playerGlow--;}
    if(activeEffects.some(e=>e.type==='speed')){
      const t=now*0.01;ctx.strokeStyle='#00ffff';ctx.lineWidth=1.5;ctx.globalAlpha=0.6;ctx.beginPath();
      for(let i=0;i<6;i++){const angle=(i/6)*_TWO_PI+t;ctx.moveTo(px+fastCos(angle)*CELL_SIZE*1.2,py+fastSin(angle)*CELL_SIZE*1.2);ctx.lineTo(px+fastCos(angle)*CELL_SIZE*1.6,py+fastSin(angle)*CELL_SIZE*1.6);}

  // ══ WALL ALERTS ══
  function addWallAlert(dir,isBoss,coord,delay){wallAlerts.push({dir,isBoss,coord,expiryTime:Date.now()+delay});if(isBoss)bossAlertStart=performance.now();}
  function drawWallAlerts(){
    const now=Date.now(),nowP=performance.now();
    for(let i=wallAlerts.length-1;i>=0;i--){
      const a=wallAlerts[i];if(now>=a.expiryTime){wallAlerts[i]=wallAlerts[wallAlerts.length-1];wallAlerts.pop();continue;}
      const remaining=(a.expiryTime-now)/(a.isBoss?enemySpawnConfig.boss.alertTimeMs:enemySpawnConfig.normal.alertTimeMs);const alpha=Math.min(.95,remaining*.9+.2);
      ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=a.isBoss?'#ff66ff':'#ffff44';ctx.lineWidth=a.isBoss?9:6;
      if(a.dir==='down'){const x=a.coord*CELL_SIZE+CELL_SIZE/2;ctx.beginPath();ctx.moveTo(x-CELL_SIZE*1.8,20);ctx.lineTo(x+CELL_SIZE*1.8,20);ctx.stroke();}
      else if(a.dir==='up'){const x=a.coord*CELL_SIZE+CELL_SIZE/2;ctx.beginPath();ctx.moveTo(x-CELL_SIZE*1.8,LOGICAL_SIZE-20);ctx.lineTo(x+CELL_SIZE*1.8,LOGICAL_SIZE-20);ctx.stroke();}
      else if(a.dir==='left'){const y=a.coord*CELL_SIZE+CELL_SIZE/2;ctx.beginPath();ctx.moveTo(LOGICAL_SIZE-20,y-CELL_SIZE*1.8);ctx.lineTo(LOGICAL_SIZE-20,y+CELL_SIZE*1.8);ctx.stroke();}
      else{const y=a.coord*CELL_SIZE+CELL_SIZE/2;ctx.beginPath();ctx.moveTo(20,y-CELL_SIZE*1.8);ctx.lineTo(20,y+CELL_SIZE*1.8);ctx.stroke();}
      ctx.restore();
    }
    const elapsed=nowP-bossAlertStart;
    if(elapsed<2000&&bossAlertStart>0){const a=Math.max(0,(2000-elapsed)/2000)*(fastSin(nowP*0.02)*0.3+0.7);ctx.save();ctx.globalAlpha=a;ctx.font='900 38px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle='#ff66ff';ctx.fillText('⚠ BOSS',LOGICAL_SIZE/2,50);ctx.restore();}
  }

  function spawnEnemy(dir,isBoss=false){
    let coord,enemy;const size=isBoss?2:1,maxIndex=GRID_SIZE-(size-1);
    if      (dir==='down') {coord=Math.floor(Math.random()*maxIndex);enemy=new Enemy(dir,isBoss);enemy.x=coord;enemy.y=-(size-1);}
    else if (dir==='up')   {coord=Math.floor(Math.random()*maxIndex);enemy=new Enemy(dir,isBoss);enemy.x=coord;enemy.y=GRID_SIZE;}
    else if (dir==='right'){coord=Math.floor(Math.random()*maxIndex);enemy=new Enemy(dir,isBoss);enemy.x=-(size-1);enemy.y=coord;}
    else                   {coord=Math.floor(Math.random()*maxIndex);enemy=new Enemy(dir,isBoss);enemy.x=GRID_SIZE;enemy.y=coord;}
    const delay=isBoss?enemySpawnConfig.boss.alertTimeMs:enemySpawnConfig.normal.alertTimeMs;
    if(isBoss){addWallAlert(dir,true,coord,delay);addWallAlert(dir,true,coord+1,delay);}else addWallAlert(dir,false,coord,delay);
    registerTimeout(()=>{if(!gameOver)enemies.push(enemy);},delay);
  }
  function triggerBossWave(){if(gameOver)return;lastBossTime=performance.now();['down','up','left','right'].forEach((d,idx)=>registerTimeout(()=>{if(!gameOver)spawnEnemy(d,true);},idx*380));}

  // ══ COLLISION ══
  function checkEnemyCollision(){
    if(isInSafeZone()||performance.now()<invulnerableUntil)return false;
    for(const e of enemies){
      const cellCount=e.fillOccupiedCells(_occCellBuf);
      for(let ci=0;ci<cellCount;ci++){
        const cell=_occCellBuf[ci];if(cell.x<0||cell.x>=GRID_SIZE||cell.y<0||cell.y>=GRID_SIZE)continue;
        if(player.x===cell.x&&player.y===cell.y){
          const shieldIdx=activeEffects.findIndex(ef=>ef.type==='shield');
          if(shieldIdx!==-1){stopMotor();activeEffects.splice(shieldIdx,1);const idx=enemies.indexOf(e);if(idx!==-1){createExplosion(e.x*CELL_SIZE+CELL_SIZE/2,e.y*CELL_SIZE+CELL_SIZE/2,25,'#aaddff');enemies.splice(idx,1);}acquireFloatingText(playerDrawX,playerDrawY-20,'ESCUDO ROTO','#aaddff',true,false,false);SPECIAL_SOUNDS.shieldBreak();invulnerableUntil=performance.now()+800;targetTiltX=(Math.random()-.5)*.8;targetTiltZ=(Math.random()-.5)*.8;return false;}
          if(hasReviveTotem){stopMotor();hasReviveTotem=false;if(activeEffects.some(ef=>ef.type==='timeSlow')){if(originalSpeeds){enemySpawnConfig.normal.speed=originalSpeeds.normal;enemySpawnConfig.boss.speed=originalSpeeds.boss;}originalSpeeds=null;activeEffects=activeEffects.filter(ef=>ef.type!=='timeSlow');}if(activeEffects.some(ef=>ef.type==='freeze')){enemies.forEach(e2=>e2.speed=Math.min(.2,e2.speed*10));activeEffects=activeEffects.filter(ef=>ef.type!=='freeze');}enemies=[];if(moveAnimId){cancelAnimationFrame(moveAnimId);moveAnimId=null;moving=false;}createExplosion(playerDrawX,playerDrawY,50,'#88ff88',2.2);acquireFloatingText(LOGICAL_SIZE/2,LOGICAL_SIZE/2-50,'REVIVIDO','#88ff88',true,true,true);playerGlow=40;invulnerableUntil=performance.now()+1500;SPECIAL_SOUNDS.reviveReady();return false;}
          for(const ef of activeEffects){if(ef.type==='clone'&&ef.intervalId)clearInterval(ef.intervalId);}
          if(moveAnimId){cancelAnimationFrame(moveAnimId);moveAnimId=null;}
          gameOver=true;gameOverTime=performance.now();stopMotor();
          createExplosion(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,50,'#ff0000',1.5);playHitSound();return true;
        }
      }
    }
    return false;
  }

  // ══ COLLECTIBLES ══
  function generateCollectibles(){
    collectibles=[];messageCollectibles=[];
    for(let i=0;i<ATTRACTED_POOL_SIZE;i++){_attractedPool[i].active=false;_attractedPool[i].data=null;}attractedCount=0;
    const normalCount=Math.max(3,Math.floor(GRID_SIZE*.1));
    for(let i=0;i<normalCount;i++){let x,y,attempts=0;do{x=Math.floor(Math.random()*GRID_SIZE);y=Math.floor(Math.random()*GRID_SIZE);attempts++;}while(attempts<800&&((x===player.x&&y===player.y)||collectibles.some(c=>c.x===x&&c.y===y)));if(attempts<800)collectibles.push({x,y});}
    if(currentWaveMessage&&GRID_SIZE>=8){const coords=messageToCoordsAdvanced(currentWaveMessage,currentWaveConfig,GRID_SIZE);for(const c of coords){if(c.x>=0&&c.x<GRID_SIZE&&c.y>=0&&c.y<GRID_SIZE&&!(c.x===player.x&&c.y===player.y)){if(!collectibles.some(p=>p.x===c.x&&p.y===c.y)&&!powerUpsOnMap.some(p=>p.x===c.x&&p.y===c.y))messageCollectibles.push(c);}}}
  }

  function resizeGameElements(){
    CELL_SIZE=LOGICAL_SIZE/GRID_SIZE;player.x=Math.floor(GRID_SIZE/2);player.y=Math.floor(GRID_SIZE/2);
    playerDrawX=player.x*CELL_SIZE+CELL_SIZE/2;playerDrawY=player.y*CELL_SIZE+CELL_SIZE/2;
    moving=false;pendingDirection=null;currentDirection=null;enemies=[];wallAlerts=[];
    for(let i=0;i<ATTRACTED_POOL_SIZE;i++){_attractedPool[i].active=false;_attractedPool[i].data=null;}attractedCount=0;
    _bgBuilt=false;rebuildBackground();rebuildGridCache();generateCollectibles();lastBossTime=performance.now();
    powerUpsOnMap=[];activeEffects=[];for(const k of Object.keys(_zoneGradCache))_zoneGradCache[k].key='';updateUI();
  }

  // ══ MAGNETIC ATTRACTION ══
  function updateAttracted(){
    if(!attractedCount)return;const tx=playerDrawX,ty=playerDrawY,now=performance.now();
    for(let i=0;i<ATTRACTED_POOL_SIZE;i++){
      const a=_attractedPool[i];if(!a.active)continue;
      if(now-a.startTime>1500){a.drawX=tx;a.drawY=ty;}
      const dx=tx-a.drawX,dy=ty-a.drawY,distSq=dx*dx+dy*dy,threshold=CELL_SIZE*0.8;
      if(distSq<threshold*threshold){
        if(a.isMessage&&a.data){
          const totalCells=messageCollectibles.length+attractedCount,collectedCount=totalCells-messageCollectibles.length-attractedCount+1;
          let pts=calculatePointsPerCell(currentWaveConfig,comboCount,totalCells,collectedCount,{x:Math.round(a.drawX/CELL_SIZE),y:Math.round(a.drawY/CELL_SIZE)},GRID_SIZE);
          if(doublePointsActive)pts*=2;score+=pts;scoreSinceLastDoubleBonus+=pts;premiumCollectedSinceLastTripleBonus++;
          createExplosion(a.drawX,a.drawY,12,'#ff88ff');createFloatingText(a.drawX,a.drawY,pts,true);playPremiumCollect();comboCount++;
          if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}updateUI();releaseAttracted(a);
          const remMsg=messageCollectibles.length+attractedCount;
          if(remMsg===0&&currentWaveMessage){const elapsed=performance.now()-waveStartTime;let bonus=calculateCompletionBonus(currentWaveConfig,totalCells,comboCount,elapsed);if(doublePointsActive)bonus*=2;if(currentWaveConfig.bonusOnCompleteEnabled!==false&&bonus>0){score+=bonus;if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}createExplosion(LOGICAL_SIZE/2,LOGICAL_SIZE/2,50,'#ffd700',2.5);acquireFloatingText(LOGICAL_SIZE/2,LOGICAL_SIZE/2-40,`MSG COMPLETO! +${bonus}`,'#FFD700',true,true,true);playTripleBonusCollect();updateUI();}}
        }else{
          let pts=doublePointsActive?16:8;score+=pts;scoreSinceLastDoubleBonus+=pts;
          createExplosion(a.drawX,a.drawY,8,'#ffd700');createFloatingText(a.drawX,a.drawY,pts);playNormalCollect();
          if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}updateUI();releaseAttracted(a);
          const remNorm=collectibles.length+attractedCount;if(remNorm===0)completeWave();
        }
        continue;
      }
      const dist=Math.sqrt(distSq),force=Math.min(2.5,0.5+800/(distSq+1));
      a.vx+=(dx/dist)*force;a.vy+=(dy/dist)*force;
      const maxSpd=CELL_SIZE*0.5,spd=Math.sqrt(a.vx*a.vx+a.vy*a.vy);
      if(spd>maxSpd){a.vx=(a.vx/spd)*maxSpd;a.vy=(a.vy/spd)*maxSpd;}
      a.drawX+=a.vx;a.drawY+=a.vy;
    }
  }

  function checkCollectibles(){
    let magnetRadius=0;
    for(const ef of activeEffects)if(ef.type.startsWith('magnet')){const r=POWERUP_CONFIG.types[ef.type]?.radius||0;if(r>magnetRadius)magnetRadius=r;}
    const isLegendaryMagnet=magnetRadius>=999;
    if(isLegendaryMagnet){
      for(let i=collectibles.length-1;i>=0;i--){const c=collectibles[i];if(c.x!==player.x||c.y!==player.y){startAttraction(c,false);collectibles[i]=collectibles[collectibles.length-1];collectibles.pop();}}
      for(let i=messageCollectibles.length-1;i>=0;i--){const c=messageCollectibles[i];if(c.x!==player.x||c.y!==player.y){startAttraction(c,true);messageCollectibles[i]=messageCollectibles[messageCollectibles.length-1];messageCollectibles.pop();}}
    }
    function inRange(cx,cy){if(magnetRadius===0||isLegendaryMagnet)return cx===player.x&&cy===player.y;return Math.abs(cx-player.x)<=magnetRadius&&Math.abs(cy-player.y)<=magnetRadius;}
    for(let i=collectibles.length-1;i>=0;i--){
      const c=collectibles[i];if(!inRange(c.x,c.y))continue;
      if(magnetRadius>0&&!isLegendaryMagnet&&(c.x!==player.x||c.y!==player.y)){startAttraction(c,false);collectibles[i]=collectibles[collectibles.length-1];collectibles.pop();}
      else if(c.x===player.x&&c.y===player.y){const pts=doublePointsActive?16:8;score+=pts;scoreSinceLastDoubleBonus+=pts;createExplosion(player.x*CELL_SIZE+CELL_SIZE*0.5,player.y*CELL_SIZE+CELL_SIZE*0.5,15,'#ffd700');createFloatingText(player.x*CELL_SIZE+CELL_SIZE*0.5,player.y*CELL_SIZE+CELL_SIZE*0.5,pts);playNormalCollect();collectibles[i]=collectibles[collectibles.length-1];collectibles.pop();if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}updateUI();if(collectibles.length===0&&attractedCount===0)completeWave();return;}
    }
    for(let i=messageCollectibles.length-1;i>=0;i--){
      const cell=messageCollectibles[i];if(!inRange(cell.x,cell.y))continue;
      if(magnetRadius>0&&!isLegendaryMagnet&&(cell.x!==player.x||cell.y!==player.y)){startAttraction(cell,true);messageCollectibles[i]=messageCollectibles[messageCollectibles.length-1];messageCollectibles.pop();}
      else if(cell.x===player.x&&cell.y===player.y){
        const totalCells=messageCollectibles.length+1,collectedCount=totalCells-messageCollectibles.length;
        let pts=calculatePointsPerCell(currentWaveConfig,comboCount,totalCells,collectedCount,{x:cell.x,y:cell.y},GRID_SIZE);
        if(doublePointsActive)pts*=2;score+=pts;scoreSinceLastDoubleBonus+=pts;premiumCollectedSinceLastTripleBonus++;
        createExplosion(player.x*CELL_SIZE+CELL_SIZE*0.5,player.y*CELL_SIZE+CELL_SIZE*0.5,20,'#ff88ff');createFloatingText(player.x*CELL_SIZE+CELL_SIZE*0.5,player.y*CELL_SIZE+CELL_SIZE*0.5,pts,true);playPremiumCollect();messageCollectibles[i]=messageCollectibles[messageCollectibles.length-1];messageCollectibles.pop();comboCount++;
        if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}updateUI();
        const remMsg=messageCollectibles.length+attractedCount;
        if(remMsg===0&&currentWaveMessage){const elapsed=performance.now()-waveStartTime;let bonus=calculateCompletionBonus(currentWaveConfig,totalCells,comboCount,elapsed);if(doublePointsActive)bonus*=2;if(currentWaveConfig.bonusOnCompleteEnabled!==false&&bonus>0){score+=bonus;if(score>highScore){highScore=score;localStorage.setItem('odparHighScore',highScore);}createExplosion(LOGICAL_SIZE*0.5,LOGICAL_SIZE*0.5,50,'#ffd700',2.5);acquireFloatingText(LOGICAL_SIZE*0.5,LOGICAL_SIZE*0.5-40,`MSG COMPLETO! +${bonus}`,'#FFD700',true,true,true);playTripleBonusCollect();updateUI();}}
        return;
      }
    }
    const nowMs=Date.now();
    for(let i=powerUpsOnMap.length-1;i>=0;i--){if(nowMs>powerUpsOnMap[i].expires)continue;if(powerUpsOnMap[i].x===player.x&&powerUpsOnMap[i].y===player.y){tryActivatePowerUp(powerUpsOnMap[i]);return;}}
  }

  // ══ WAVE EVENTS ══
  function triggerWaveEvent(waveNum){
    const event=WAVE_EVENTS[waveNum];if(!event)return;
    acquireFloatingText(LOGICAL_SIZE/2,LOGICAL_SIZE/2-60,event.message,'#FFD700',true,true,false);
    switch(event.type){
      case 'doubleScore':doublePointsActive=true;registerTimeout(()=>{if(!activeEffects.some(e=>e.type==='doubleScore'))doublePointsActive=false;},event.duration||15000);break;
      case 'weather':WeatherManager.setWeather(event.weather||'clear');break;
      case 'bossRush':for(let i=0;i<(event.count||8);i++)registerTimeout(()=>{if(!gameOver)spawnEnemy(['down','up','left','right'][i%4],true);},i*300);break;
      case 'megabomb':enemies=[];createExplosion(LOGICAL_SIZE/2,LOGICAL_SIZE/2,60,'#ff6644',2.5);SPECIAL_SOUNDS.megaExplosion();break;

  // ══ COMPLETE WAVE ══

    bonusZoneCurrentWaveCount=0;doubleBonusZoneCurrentWaveCount=0;tripleBonusZoneCurrentWaveCount=0;

if (wave % 3 === 0) {
  const biomeKeys = Object.keys(BIOME_PROFILES);
  BiomeManager.setCurrent(biomeKeys[(Math.floor(wave/3)) % biomeKeys.length]);
}
    updateUI();createWaveCompleteText(wave-1);generatePowerUps();

  // ══ MOVEMENT ══
  function executeMove(dir){
    let newX=player.x,newY=player.y;
    switch(dir){case 'up':newY--;break;case 'down':newY++;break;case 'left':newX--;break;case 'right':newX++;break;case 'up-left':newX--;newY--;break;case 'up-right':newX++;newY--;break;case 'down-left':newX--;newY++;break;case 'down-right':newX++;newY++;break;}
    if(newX<0||newX>=GRID_SIZE||newY<0||newY>=GRID_SIZE)return false;
    moving=true;const startX=playerDrawX,startY=playerDrawY;const endX=newX*CELL_SIZE+CELL_SIZE/2,endY=newY*CELL_SIZE+CELL_SIZE/2;
    player.x=newX;player.y=newY;
    const speedActive=activeEffects.some(e=>e.type==='speed');const duration=Math.max(MIN_MOVE_DELAY,speedActive?currentMoveDelay/2:currentMoveDelay);const animStart=performance.now();
    function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
    function animateMove(now){
      if(gameOver){moving=false;moveAnimId=null;return;}
      const elapsed=now-animStart,t=Math.min(1,elapsed/duration);
      playerDrawX=startX+(endX-startX)*easeInOutCubic(t);playerDrawY=startY+(endY-startY)*easeInOutCubic(t);
      if(t<1){moveAnimId=requestAnimationFrame(animateMove);}
      else{moveAnimId=null;playerDrawX=endX;playerDrawY=endY;moving=false;lastMoveTimestamp=performance.now();if(currentMoveDelay>MIN_MOVE_DELAY)currentMoveDelay=Math.max(MIN_MOVE_DELAY,currentMoveDelay*.9);startNextMove();}
    }
    moveAnimId=requestAnimationFrame(animateMove);playMoveSound();startMotor();
    const tiltMap={'up':[-.3,0],'down':[.3,0],'left':[0,-.4],'right':[0,.4],'up-left':[-.2,-.3],'up-right':[-.2,.3],'down-left':[.2,-.3],'down-right':[.2,.3]};
    const[tx,tz]=tiltMap[dir]||[0,0];targetTiltX=tx;targetTiltZ=tz;setTimeout(()=>{targetTiltX=0;targetTiltZ=0;},150);
    if(rotationResetTimer)clearTimeout(rotationResetTimer);
    const rotMap={'up':'rotateX(48deg)','down':'rotateX(35deg)','left':'rotateX(40deg) rotateY(-8deg)','right':'rotateX(40deg) rotateY(8deg)','up-left':'rotateX(46deg) rotateY(-7deg)','up-right':'rotateX(46deg) rotateY(7deg)','down-left':'rotateX(37deg) rotateY(-7deg)','down-right':'rotateX(37deg) rotateY(7deg)'};
    setCanvasTransform(rotMap[dir]||'rotateX(40deg)');rotationResetTimer=setTimeout(()=>setCanvasTransform('rotateX(40deg)'),150);
    const angleMap={'up':0,'right':Math.PI/2,'down':Math.PI,'left':-Math.PI/2,'up-right':Math.PI/4,'up-left':-Math.PI/4,'down-right':3*Math.PI/4,'down-left':-3*Math.PI/4};targetAngle=angleMap[dir]||0;
    const backAngleMap={'up':Math.PI/2,'down':-Math.PI/2,'left':0,'right':Math.PI,'up-right':-3*Math.PI/4,'up-left':3*Math.PI/4,'down-right':-Math.PI/4,'down-left':Math.PI/4};const backAngle=backAngleMap[dir]||0;
    for(let i=0;i<6;i++){const ox=(Math.random()-.5)*12,oy=(Math.random()-.5)*12;createSpark(playerDrawX+ox,playerDrawY+oy,backAngle+(Math.random()-.5)*.8);}
    const nowInSafe=isInSafeZone();if(nowInSafe&&!wasInSafeZone){playSafeZoneEnter();createExplosion(player.x*CELL_SIZE+CELL_SIZE/2,player.y*CELL_SIZE+CELL_SIZE/2,20,'#00ffcc',1.2);}wasInSafeZone=nowInSafe;
    checkCollectibles();return true;
  }

  function startNextMove(){if(moving||gameOver)return;const nextDir=pendingDirection||currentDirection;if(!nextDir)return;pendingDirection=null;if(currentDirection!==nextDir)currentMoveDelay=110;currentDirection=nextDir;executeMove(currentDirection);}
  function startMove(dir){if(gameOver){resetGame();return;}if(moving){pendingDirection=dir;return;}if(currentDirection!==dir)currentMoveDelay=110;currentDirection=dir;executeMove(dir);}
  function cancelCurrentMovement(){pendingDirection=null;currentDirection=null;stopMotor();currentMoveDelay=110;}

  // ══ WAVE SCAN ══

      const globeRadius=Math.min(cw,ch)*0.18,globeY=cy-ch*0.05;const globeAlpha=Math.min(1,(progress<0.12?progress/0.12:1)*(progress>0.78?(1-progress)/0.22:1));

        ctx.fillStyle=bg2;ctx.beginPath();ctx.arc(0,0,globeRadius,0,_TWO_PI);ctx.fill();ctx.strokeStyle='#ffaa00';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,globeRadius,0,_TWO_PI);ctx.stroke();
        ctx.save();ctx.rotate(baseRotation*1.5);ctx.fillStyle='#ff8800';ctx.strokeStyle='#ffcc44';ctx.lineWidth=0.8;ctx.globalAlpha=0.75;ctx.beginPath();ctx.moveTo(-globeRadius*0.2,-globeRadius*0.5);ctx.lineTo(globeRadius*0.35,-globeRadius*0.05);ctx.lineTo(globeRadius*0.05,globeRadius*0.35);ctx.lineTo(-globeRadius*0.3,globeRadius*0.05);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
        const nc=6,nodes=[];for(let n=0;n<nc;n++){const na=(n/nc)*_TWO_PI+baseRotation*0.5,nr=globeRadius*0.55+fastSin(now*0.004+n)*globeRadius*0.22;nodes.push({x:fastCos(na)*nr,y:fastSin(na)*nr});}
        ctx.save();ctx.beginPath();ctx.arc(0,0,globeRadius*0.97,0,_TWO_PI);ctx.clip();ctx.strokeStyle='#ffcc44';ctx.lineWidth=0.7;ctx.globalAlpha=0.4;ctx.beginPath();for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;if(dx*dx+dy*dy<globeRadius*globeRadius*0.81){ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);}}ctx.stroke();

  // ══ MAIN DRAW ══
  function draw(now) {
    if(!_bgBuilt)rebuildBackground();
    ctx.drawImage(bgCanvas,0,0,LOGICAL_SIZE,LOGICAL_SIZE);

    if(Quality.weatherEnabled) WeatherManager.draw(ctx, now);

    if(premiumFlash>0){ctx.fillStyle=powerFlashColor+'55';ctx.fillRect(0,0,LOGICAL_SIZE,LOGICAL_SIZE);premiumFlash--;}
    if(waveTransition>0){ctx.fillStyle=`rgba(255,255,255,${waveTransition/120})`;ctx.fillRect(0,0,LOGICAL_SIZE,LOGICAL_SIZE);waveTransition=Math.max(0,waveTransition-2);}

    drawGrid();
    drawSafeZone();drawBonusZone();drawDoubleBonusZone();drawTripleBonusZone();
    drawPowerUpsOnMap();

    if(collectibles.length){
      ctx.fillStyle='#ffcc33';ctx.beginPath();
      for(const c of collectibles){const px=c.x*CELL_SIZE+CELL_SIZE*0.5,py=c.y*CELL_SIZE+CELL_SIZE*0.5;ctx.moveTo(px+CELL_SIZE*0.33,py);ctx.arc(px,py,CELL_SIZE*0.33,0,_TWO_PI);}
      ctx.fill();
    }

    drawMessageCollectibles();drawAttractedItems();drawAllEnemies();drawWallAlerts();

    // ── Gameplay particles ──
    if(_particleActiveCount>0||_sparkActiveCount>0){
      ctx.save();
      if(_particleActiveCount>0){
        for(let i=0;i<PARTICLE_POOL_SIZE;i++){
          const p=particlePool[i];if(!p.active)continue;
          p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.life--;p.alpha=Math.max(0,p.life/30);p.size*=0.96;
          if(p.life<=0){p.active=false;_particleActiveCount--;continue;}
          ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size*0.5,p.y-p.size*0.5,p.size,p.size);
        }
      }
      // FIXED: Spark rendering uses save/translate/rotate/restore — preserves DPR scaling
      if(_sparkActiveCount>0){
        for(let i=0;i<SPARK_POOL_SIZE;i++){
          const s=sparkPool[i];if(!s.active)continue;
          s.x+=s.vx;s.y+=s.vy;s.life--;s.alpha=s.life/20;s.length*=0.92;
          if(s.life<=0){s.active=false;_sparkActiveCount--;continue;}
          ctx.save();
          ctx.globalAlpha=Math.max(0,s.alpha);
          ctx.translate(s.x,s.y);ctx.rotate(Math.atan2(s.vy,s.vx));
          ctx.fillStyle='#00ddff';ctx.fillRect(-s.width*0.5,-s.length*0.5,s.width,s.length);
          ctx.fillStyle='#88ffff';ctx.fillRect(-s.width*0.33,-s.length*0.33,s.width*0.6,s.length*0.6);
          ctx.restore();
        }
      }
      ctx.globalAlpha=1;ctx.restore();
    }

    drawPlayer();drawZoneIndicator();drawActiveEffectsHUD();

    if(_ftActiveCount>0){
      ctx.save();let _lastFontStr='';
      for(let i=0;i<FT_POOL_SIZE;i++){
        const ft=floatingTextPool[i];if(!ft.active)continue;
        ft.y+=ft.vy;ft.vy*=0.975;ft.life--;if(ft.scale<(ft.big?1.0:1.05))ft.scale+=0.02;if(ft.entryScale<1)ft.entryScale=Math.min(1,ft.entryScale+0.12);
        ft.alpha=Math.max(0,ft.life/ft.maxLife);if(ft.life<=0){ft.active=false;_ftActiveCount--;continue;}
        const es=ft.entryScale;ctx.globalAlpha=ft.alpha*es;ctx.textAlign='center';ctx.textBaseline='middle';
        const fs=ft.isTriple?40:(ft.big?34:Math.floor(38*ft.scale));const fontStr=`900 ${fs}px "Press Start 2P","Courier New",monospace`;
        if(fontStr!==_lastFontStr){ctx.font=fontStr;_lastFontStr=fontStr;}
        ctx.lineWidth=ft.isTriple?3:2.2;ctx.strokeStyle='#000000';ctx.strokeText(ft.text,ft.x,ft.y);
        ctx.fillStyle=ft.isTriple?'#FFD700':(ft.big?'#FFFFAA':(ft.isPremium?'#ffccff':'#ffffcc'));ctx.fillText(ft.text,ft.x,ft.y);
        if(ft.isTriple){ctx.fillStyle='#FFAA00';ctx.fillText(ft.text,ft.x,ft.y);}
      }
      ctx.restore();
    }

    drawWaveScan();
    if(!moving&&!gameOver)drawGlitchEffect();
    if(!moving&&!gameOver){playerDrawX=player.x*CELL_SIZE+CELL_SIZE*0.5;playerDrawY=player.y*CELL_SIZE+CELL_SIZE*0.5;}

    if(gameOver){
      const elapsed=performance.now()-gameOverTime;
      ctx.fillStyle=`rgba(0,0,0,${Math.min(0.85,elapsed/600)})`;ctx.fillRect(0,0,LOGICAL_SIZE,LOGICAL_SIZE);
      if(elapsed>300){
        ctx.globalAlpha=Math.min(1,(elapsed-300)/400);
        ctx.font='900 42px "Press Start 2P",monospace';ctx.fillStyle='#ff4466';ctx.textAlign='center';ctx.fillText('GAME OVER',LOGICAL_SIZE*0.5,LOGICAL_SIZE*0.5-40);
        ctx.font='16px "Press Start 2P",monospace';ctx.fillStyle='#ffffff';ctx.fillText('Toca cualquier boton',LOGICAL_SIZE*0.5,LOGICAL_SIZE*0.5+20);ctx.fillText('para REINICIAR',LOGICAL_SIZE*0.5,LOGICAL_SIZE*0.5+50);
        ctx.globalAlpha=1;
      }
    }
  }

  function createButton(svg){const btn=document.createElement('div');btn.className='boton';btn.innerHTML=svg;return btn;}
  function createEmptyButton(){const btn=document.createElement('div');btn.className='boton vacio';return btn;}
  const svgUp=`<svg viewBox="0 0 24 24"><path d="M12 5l7 8h-4v6h-6v-6H5l7-8z"/></svg>`,svgDown=`<svg viewBox="0 0 24 24"><path d="M12 19l-7-8h4V5h6v6h4l-7 8z"/></svg>`,svgLeft=`<svg viewBox="0 0 24 24"><path d="M5 12l8-7v4h6v6h-6v4l-8-7z"/></svg>`,svgRight=`<svg viewBox="0 0 24 24"><path d="M19 12l-8 7v-4H5v-6h6V5l8 7z"/></svg>`;
  const svgUL=`<svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 6v8M6 6h8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svgUR=`<svg viewBox="0 0 24 24"><path d="M18 6L6 18M18 6v8M18 6h-8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svgDL=`<svg viewBox="0 0 24 24"><path d="M6 18l12-12M6 18v-8M6 18h8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svgDR=`<svg viewBox="0 0 24 24"><path d="M18 18L6 6M18 18v-8M18 18h-8" stroke="#bbffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const upLeftBtn=createButton(svgUL),upBtn=createButton(svgUp),upRightBtn=createButton(svgUR);
  const leftBtn=createButton(svgLeft),centerEmpty=createEmptyButton(),rightBtn=createButton(svgRight);
  const downLeftBtn=createButton(svgDL),downBtn=createButton(svgDown),downRightBtn=createButton(svgDR);
  const centerbotones=document.getElementById('centerbotones');centerbotones.innerHTML='';
  const f1=document.createElement('section');f1.className='fila-botones';f1.appendChild(upLeftBtn);f1.appendChild(upBtn);f1.appendChild(upRightBtn);
  const f2=document.createElement('section');f2.className='fila-botones';f2.appendChild(leftBtn);f2.appendChild(centerEmpty);f2.appendChild(rightBtn);
  const f3=document.createElement('section');f3.className='fila-botones';f3.appendChild(downLeftBtn);f3.appendChild(downBtn);f3.appendChild(downRightBtn);
  centerbotones.appendChild(f1);centerbotones.appendChild(f2);centerbotones.appendChild(f3);
  const buttonMap=new Map([[upLeftBtn,'up-left'],[upBtn,'up'],[upRightBtn,'up-right'],[leftBtn,'left'],[rightBtn,'right'],[downLeftBtn,'down-left'],[downBtn,'down'],[downRightBtn,'down-right']]);
  const buttonRects=new Map();
  function cacheButtonRects(){buttonRects.clear();for(const[btn,dir]of buttonMap){const r=btn.getBoundingClientRect();buttonRects.set(dir,{left:r.left,right:r.right,top:r.top,bottom:r.bottom,btn});}}
  function getButtonAt(x,y){for(const[dir,rect]of buttonRects){if(x>=rect.left&&x<=rect.right&&y>=rect.top&&y<=rect.bottom)return{btn:rect.btn,dir};}return null;}
  function activateButton(btn,dir){if(currentActiveBtn===btn)return;if(currentActiveBtn)currentActiveBtn.classList.remove('activo');currentActiveBtn=btn;startMove(dir);btn.classList.add('activo');}
  function deactivateAll(){if(currentActiveBtn)currentActiveBtn.classList.remove('activo');currentActiveBtn=null;cancelCurrentMovement();}
  let _lastTouchX=0,_lastTouchY=0;const TOUCH_THRESHOLD_SQ=25;
  function handleStart(x,y){_lastTouchX=x;_lastTouchY=y;const d=getButtonAt(x,y);if(d)activateButton(d.btn,d.dir);}
  function handleMove(x,y){const dx=x-_lastTouchX,dy=y-_lastTouchY;if(dx*dx+dy*dy<TOUCH_THRESHOLD_SQ)return;_lastTouchX=x;_lastTouchY=y;const d=getButtonAt(x,y);if(d)activateButton(d.btn,d.dir);else deactivateAll();}
  const gameSection=document.querySelector('.display');
  gameSection.addEventListener('touchstart',e=>{e.preventDefault();resumeAudio();const t=e.touches[e.touches.length-1];handleStart(t.clientX,t.clientY);},{passive:false});
  gameSection.addEventListener('touchmove', e=>{e.preventDefault();const t=e.touches[e.touches.length-1];handleMove(t.clientX,t.clientY);},{passive:false});
  gameSection.addEventListener('touchend',  e=>{if(e.touches.length===0)deactivateAll();else{const t=e.touches[e.touches.length-1];handleStart(t.clientX,t.clientY);}});
  gameSection.addEventListener('touchcancel',deactivateAll);
  document.addEventListener('mousedown',e=>{resumeAudio();_lastTouchX=e.clientX;_lastTouchY=e.clientY;handleStart(e.clientX,e.clientY);});
  document.addEventListener('mousemove',e=>{if(e.buttons)handleMove(e.clientX,e.clientY);});
  document.addEventListener('mouseup',  deactivateAll);
  document.addEventListener('keydown',e=>{
    if(gameOver){resetGame();return;}
    switch(e.key.toLowerCase()){case 'arrowup':case 'w':startMove('up');break;case 'arrowdown':case 's':startMove('down');break;case 'arrowleft':case 'a':startMove('left');break;case 'arrowright':case 'd':startMove('right');break;case 'q':startMove('up-left');break;case 'e':startMove('up-right');break;case 'z':startMove('down-left');break;case 'c':startMove('down-right');break;}
  });

  let _resizeTimer=null;
  function handleResize(){
    clearTimeout(_resizeTimer);_resizeTimer=setTimeout(()=>{
      _bgBuilt=false;_lastGridSize=-1;
      for(const k of Object.keys(_zoneGradCache))_zoneGradCache[k].key='';
      FakeShaderSystem._vigBuilt=false;AtmosphericRenderer._fogBuilt=false;
      rebuildBackground();rebuildGridCache();cacheButtonRects();updateUI();
    },150);
  }
  window.addEventListener('resize',handleResize);
  window.addEventListener('orientationchange',()=>{setTimeout(()=>handleResize(),300);});

  // ══ UPDATE ══
  let nextNormalSpawnTime=performance.now()+4000;
  function update(now, delta) {
    if(gameOver)return;
    WeatherManager.update(now, delta);
    updateActiveEffects();updateAttracted();updateZones();updateBonusScore();updateDoubleBonusScore();updateTripleBonusScore();
    for(let i=powerUpsOnMap.length-1;i>=0;i--){if(Date.now()>powerUpsOnMap[i].expires){powerUpsOnMap[i]=powerUpsOnMap[powerUpsOnMap.length-1];powerUpsOnMap.pop();}}
    for(let i=enemies.length-1;i>=0;i--){enemies[i].update();if(enemies[i].isOffScreen()){evadedThisWave++;evadedSinceLastDoubleBonus++;if(enemies[i].isBoss)bossesEvadedSinceLastTripleBonus++;updateUI();enemies[i]=enemies[enemies.length-1];enemies.pop();}}
    checkEnemyCollision();
    if(safeZone&&now-lastHumTime>2100&&Math.random()<0.3){playSafeZoneHum();lastHumTime=now;}
    if(now>=nextNormalSpawnTime){const dirs=['down','up','left','right'];const count=enemySpawnConfig.normal.baseCount+Math.floor(Math.random()*(enemySpawnConfig.normal.countVariance+1));for(let i=0;i<count;i++)spawnEnemy(dirs[Math.floor(Math.random()*4)],false);nextNormalSpawnTime=now+enemySpawnConfig.normal.minInterval+Math.random()*(enemySpawnConfig.normal.maxInterval-enemySpawnConfig.normal.minInterval);}
    if(now-lastBossTime>enemySpawnConfig.boss.interval){if(Math.random()<0.65)triggerBossWave();else lastBossTime=now;}
  }

  // ══ GAME LOOP ══
  let lastFrameTime=performance.now();let frameCount=0;
  function gameLoop(timestamp){
    const rawDelta=timestamp-lastFrameTime;
    const delta=Math.min(rawDelta,50);
    lastFrameTime=timestamp;
    Quality.update(delta);WeatherPerformanceController.update(delta);
    frameCount++;
    if(frameCount%120===0)hardCleanup();
    update(timestamp, delta);
    draw(timestamp);
    requestAnimationFrame(gameLoop);
  }

  // ── INIT ──
  currentWaveConfig=getMessageConfig(1);currentWaveMessage=currentWaveConfig.text;
  rebuildBackground();rebuildGridCache();generateCollectibles();updateUI();updateDifficulty();
  WeatherManager.init();
  WeatherManager.setWeather('clear');
  requestAnimationFrame(()=>{cacheButtonRects();});
  requestAnimationFrame(gameLoop);

  console.log('%cODPAR PREMIUM v4.0 — Optimized Build', 'color:#FFD700;font-size:14px;font-weight:bold');
  console.log('%cFixes: EM_STORM unified case, spark save/restore DPR, drawMessageCollectibles single-pass, pre-allocated batch buckets, active pool counter guards, lastZoneColor init', 'color:#00ffcc;font-size:11px');
})();
</script>
